<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mady 中观智能体 — 架构图</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d1117;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="arch"></canvas>
<script>
const canvas = document.getElementById('arch');
const ctx = canvas.getContext('2d');

const W = Math.min(window.innerWidth, 1600);
const H = Math.min(window.innerHeight, 1200);
canvas.width = W;
canvas.height = H;

// Scale factor for retina
const dpr = window.devicePixelRatio || 1;
canvas.width = W * dpr;
canvas.height = H * dpr;
canvas.style.width = W + 'px';
canvas.style.height = H + 'px';
ctx.scale(dpr, dpr);

// Colors - GitHub dark theme inspired
const C = {
  bg:       '#0d1117',
  surface:  '#161b22',
  border:   '#30363d',
  borderH:  '#58a6ff',
  text:     '#c9d1d9',
  textDim:  '#8b949e',
  textBold: '#f0f6fc',
  blue:     '#58a6ff',
  blueBg:   'rgba(56,139,253,0.12)',
  green:    '#3fb950',
  greenBg:  'rgba(63,185,80,0.12)',
  orange:   '#d2991d',
  orangeBg: 'rgba(210,153,29,0.12)',
  purple:   '#a371f7',
  purpleBg: 'rgba(163,113,247,0.12)',
  red:      '#f85149',
  redBg:    'rgba(248,81,73,0.12)',
  cyan:     '#39d2c0',
  cyanBg:   'rgba(57,210,192,0.12)',
  pink:     '#f778ba',
  pinkBg:   'rgba(247,120,186,0.12)',
};

// ---- Helper functions ----

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function drawBox(x, y, w, h, color, title, subtitle, fontSize) {
  ctx.fillStyle = C.surface;
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.5;
  roundRect(x, y, w, h, 6);
  ctx.fill();
  ctx.stroke();

  ctx.fillStyle = C.textBold;
  ctx.font = 'bold ' + (fontSize || 13) + 'px -apple-system, BlinkMacSystemFont, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(title, x + w/2, y + 22);

  if (subtitle) {
    ctx.fillStyle = C.textDim;
    ctx.font = '9px -apple-system, BlinkMacSystemFont, sans-serif';
    ctx.fillText(subtitle, x + w/2, y + 36);
  }
}

function drawSmallBox(x, y, w, h, color, text) {
  ctx.fillStyle = C.bg;
  ctx.strokeStyle = color;
  ctx.lineWidth = 1;
  roundRect(x, y, w, h, 4);
  ctx.fill();
  ctx.stroke();

  ctx.fillStyle = C.text;
  ctx.font = '10px -apple-system, BlinkMacSystemFont, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, x + w/2, y + h/2);
  ctx.textBaseline = 'alphabetic';
}

function drawArrow(x1, y1, x2, y2, color, dashed) {
  ctx.strokeStyle = color || C.border;
  ctx.lineWidth = 1.2;
  ctx.setLineDash(dashed ? [4, 3] : []);
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();
  ctx.setLineDash([]);

  const angle = Math.atan2(y2 - y1, x2 - x1);
  const len = 6;
  ctx.fillStyle = color || C.border;
  ctx.beginPath();
  ctx.moveTo(x2, y2);
  ctx.lineTo(x2 - len * Math.cos(angle - 0.5), y2 - len * Math.sin(angle - 0.5));
  ctx.lineTo(x2 - len * Math.cos(angle + 0.5), y2 - len * Math.sin(angle + 0.5));
  ctx.closePath();
  ctx.fill();
}

function colorByName(name) {
  const m = { blue: C.blue, green: C.green, orange: C.orange, purple: C.purple,
              red: C.red, cyan: C.cyan, pink: C.pink };
  return m[name] || C.textDim;
}

// ---- Clear ----
ctx.fillStyle = C.bg;
ctx.fillRect(0, 0, W, H);

// ---- TITLE ----
ctx.fillStyle = C.textBold;
ctx.font = 'bold 22px -apple-system, BlinkMacSystemFont, sans-serif';
ctx.textAlign = 'center';
ctx.fillText('Mady（中观智能体）架构总览', W/2, 38);

ctx.fillStyle = C.textDim;
ctx.font = '12px -apple-system, BlinkMacSystemFont, sans-serif';
ctx.fillText('github.com/xujian519/mady  ·  Go 1.25  ·  419 files  ·  ~108K lines', W/2, 60);

// ---- Data-driven layer definitions ----

const GAP = 14;         // horizontal gap between boxes
const VGAP = 14;        // vertical gap between small boxes inside a row
const ROW_GAP = 40;     // vertical gap between layers
const coreW = 440;
const coreX = (W - coreW) / 2;

// Helper: center a row of boxes and return the start X
function centerRow(count, boxW, gap) {
  const total = count * boxW + (count - 1) * gap;
  return (W - total) / 2;
}

// ---- 1. EXTERNAL LAYER ----
const extY = 80, extH = 105, extW = 125;
const extItems = [
  { t: 'A2A', s: 'Agent-to-Agent', c: 'cyan' },
  { t: 'A2UI', s: 'Agent-to-UI', c: 'pink' },
  { t: 'Server', s: 'HTTP/SSE API', c: 'green' },
  { t: 'AGUI', s: 'Agent GUI Events', c: 'purple' },
  { t: 'MCP', s: 'Model Context Protocol', c: 'orange' },
  { t: 'ACP', s: 'Agent Comm Protocol', c: 'purple' },
];
const extStartX = centerRow(extItems.length, extW, GAP);

ctx.fillStyle = C.textDim;
ctx.font = 'bold 11px -apple-system, BlinkMacSystemFont, sans-serif';
ctx.textAlign = 'left';
ctx.fillText('外部接口层', extStartX, extY - 8);

extItems.forEach(function(item, i) {
  const x = extStartX + i * (extW + GAP);
  drawBox(x, extY, extW, extH, colorByName(item.c), item.t, item.s, 13);
});

// ---- 2. CORE ENGINE LAYER ----
const coreY = 220, coreH = 220;

// Draw core box outline
ctx.fillStyle = C.blue;
ctx.strokeStyle = C.blue;
ctx.lineWidth = 2;
ctx.setLineDash([]);
roundRect(coreX - 6, coreY - 6, coreW + 12, coreH + 12, 10);
ctx.stroke();

ctx.fillStyle = C.textDim;
ctx.font = 'bold 12px -apple-system, BlinkMacSystemFont, sans-serif';
ctx.textAlign = 'left';
ctx.fillText('核心引擎层  agentcore', coreX, coreY - 12);

drawBox(coreX, coreY, coreW, coreH, C.blue, 'agentcore',
  'Agent · Config · Provider · Tool · EventBus · Lifecycle · State · Stream · Message', 13);

// Core sub-component rows
const subY = coreY + 55, subH = 26;
const coreRows = [
  [
    { t: 'Agent', w: 52 }, { t: 'Config', w: 58 }, { t: 'Provider', w: 66 },
    { t: 'Tool', w: 40 }, { t: 'EventBus', w: 66 }, { t: 'Lifecycle', w: 66 },
    { t: 'State', w: 46 }, { t: 'Stream', w: 54 }, { t: 'Message', w: 64 },
  ],
  [
    { t: 'ContextEngine', w: 110 }, { t: 'Executor', w: 64 }, { t: 'Extension', w: 72 },
    { t: 'Handoff', w: 64 }, { t: 'Compaction', w: 84 }, { t: 'Orchestrate', w: 82 },
    { t: 'ReasoningRouter', w: 110 }, { t: 'Blocks', w: 52 },
  ],
  [
    { t: 'Store', w: 46 }, { t: 'Tracer', w: 54 }, { t: 'Checkpoint', w: 82 },
    { t: 'Middleware', w: 78 }, { t: 'Skill/SkillExt', w: 92 }, { t: 'Schema', w: 54 },
    { t: 'Retry', w: 44 }, { t: 'Steering', w: 62 }, { t: 'Budget', w: 54 }, { t: 'Token', w: 50 },
  ],
];

// Row 1 & 2 colored blue, Row 3 (interfaces) in dim
coreRows.forEach(function(row, ri) {
  const totalW = row.reduce(function(s, sb) { return s + sb.w; }, 0) + (row.length - 1) * (VGAP - 2);
  var rowX = coreX + (coreW - totalW) / 2;
  var c = ri === 2 ? C.textDim : C.blue;
  row.forEach(function(sb) {
    drawSmallBox(rowX, subY + ri * (subH + 6), sb.w, subH, c, sb.t);
    rowX += sb.w + VGAP - 2;
  });
});

// ---- SIDE PANELS ----

// Provider layer (right of core)
const provY = 235, provH = 75, provW = 145;
const provItems = [
  { t: 'chatcompat', s: 'OpenAI Compat (DeepSeek/GLM/Kimi/Qwen)', c: 'green' },
  { t: 'smartrouter', s: '智能路由 (Task + Priority)', c: 'cyan' },
];
const provStartX = coreX + coreW + 28;

ctx.fillStyle = C.textDim;
ctx.font = 'bold 11px -apple-system, BlinkMacSystemFont, sans-serif';
ctx.textAlign = 'left';
ctx.fillText('Provider 层', provStartX, provY - 8);

provItems.forEach(function(p, i) {
  drawBox(provStartX, provY + i * (provH + 8), provW, provH, colorByName(p.c), p.t, p.s, 11);
});

// Tools layer (right of core, below provider)
const toolY = 330, toolH = 75, toolW = 112;
const toolItems = [
  { t: 'browser', c: 'orange' }, { t: 'bash', c: 'orange' },
  { t: 'read/edit', c: 'orange' }, { t: 'write/delete', c: 'orange' },
  { t: 'grep/find', c: 'orange' }, { t: 'web_search', c: 'orange' },
  { t: 'web_fetch', c: 'orange' }, { t: 'execute_code', c: 'orange' },
  { t: 'git', c: 'orange' }, { t: 'mcp_bridge', c: 'orange' },
];
const toolStartX = coreX + coreW + 28;

ctx.fillStyle = C.textDim;
ctx.font = 'bold 11px -apple-system, BlinkMacSystemFont, sans-serif';
ctx.textAlign = 'left';
ctx.fillText('内置工具层  tools/', toolStartX, toolY - 8);

const toolsPerRow = 5;
toolItems.forEach(function(t, i) {
  const tx = toolStartX + (i % toolsPerRow) * (toolW + 5);
  const ty = toolY + Math.floor(i / toolsPerRow) * (toolH + 8);
  drawBox(tx, ty, toolW, toolH, colorByName(t.c), t.t, '', 11);
});

// TUI (left of core)
const tuiX = 40, tuiY = 240, tuiW = 112, tuiH = 310;

ctx.fillStyle = C.textDim;
ctx.font = 'bold 11px -apple-system, BlinkMacSystemFont, sans-serif';
ctx.textAlign = 'left';
ctx.fillText('终端 UI', tuiX, tuiY - 8);

drawBox(tuiX, tuiY, tuiW, tuiH, C.pink, 'tui/', '8-layer Elm Style', 12);

const tuiLayers = [
  { t: 'agentadapter (7)', s: 'Agent→Chat 桥接' },
  { t: 'stdio (6)', s: '过程式 stdout/stdin' },
  { t: 'chat (5)', s: '聊天应用层' },
  { t: 'component (4)', s: 'UI 组件库' },
  { t: 'tui/engine (3)', s: '事件循环+差异渲染' },
  { t: 'theme (2)', s: '语义调色板' },
  { t: 'terminal (1)', s: 'Terminal I/O (Kitty)' },
  { t: 'core (0)', s: 'Component 接口' },
];
tuiLayers.forEach(function(l, i) {
  drawSmallBox(tuiX + 8, tuiY + 52 + i * 20, tuiW - 16, 17, C.pink, l.t);
});

// ---- 3. DOMAIN EXTENSION LAYER (NEW) ----
const domY = 485, domH = 90, domW = 132;
const domItems = [
  { t: 'psychological/', s: '心理引擎 (VAD/OCC/EMA/SDT/CBT)', c: 'cyan' },
  { t: 'domains/', s: '领域配置 + 推理引擎', c: 'blue' },
  { t: 'guardrails/', s: '三级护栏 (Light/Std/Strict)', c: 'red' },
  { t: 'knowledge/', s: '知识图谱 + 文档加载器', c: 'green' },
  { t: 'retrieval/', s: '关键词/BM25/向量嵌入', c: 'cyan' },
  { t: 'workflows/', s: 'Legal/Patent 领域工作流', c: 'purple' },
];
const domStartX = centerRow(domItems.length, domW, GAP);

ctx.fillStyle = C.textDim;
ctx.font = 'bold 11px -apple-system, BlinkMacSystemFont, sans-serif';
ctx.textAlign = 'left';
ctx.fillText('领域扩展层', domStartX, domY - 8);

domItems.forEach(function(item, i) {
  const x = domStartX + i * (domW + GAP);
  drawBox(x, domY, domW, domH, colorByName(item.c), item.t, item.s, 11);
});

// ---- 4. INFRASTRUCTURE LAYER ----
const infraY = 615, infraH = 95, infraW = 118;
const infraItems = [
  { t: 'graph/', s: 'DAG + Pregel', c: 'purple' },
  { t: 'session/', s: 'JSONL Tree', c: 'cyan' },
  { t: 'workflow/', s: 'Pipeline/Router', c: 'purple' },
  { t: 'skill/', s: 'SKILL.md 热重载', c: 'pink' },
  { t: 'prompt/', s: 'Templates', c: 'cyan' },
  { t: 'store/', s: 'SnapshotStore', c: 'cyan' },
  { t: 'mcp/', s: 'stdio + HTTP/SSE', c: 'orange' },
  { t: 'knowledge/graph', s: '图谱存储/查询/增量', c: 'green' },
  { t: 'filequeue/', s: 'Mutex Queue', c: 'textDim' },
  { t: 'fuzzy/', s: 'Fuzzy Match', c: 'textDim' },
];
const infraStartX = centerRow(infraItems.length, infraW, 8);

ctx.fillStyle = C.textDim;
ctx.font = 'bold 11px -apple-system, BlinkMacSystemFont, sans-serif';
ctx.textAlign = 'left';
ctx.fillText('基础设施层', infraStartX, infraY - 8);

infraItems.forEach(function(item, i) {
  const x = infraStartX + i * (infraW + 8);
  drawBox(x, infraY, infraW, infraH, colorByName(item.c), item.t, item.s, 11);
});

// ---- 5. APPLICATION ENTRY LAYER (NEW) ----
const appY = 748, appH = 75, appW = 150;
const appItems = [
  { t: 'cmd/mady', s: 'mady tui | mady acp', c: 'blue' },
  { t: 'server/', s: 'HTTP/SSE API Server', c: 'green' },
  { t: 'example/', s: '9 个示例应用', c: 'purple' },
];
const appStartX = centerRow(appItems.length, appW, GAP);

ctx.fillStyle = C.textDim;
ctx.font = 'bold 11px -apple-system, BlinkMacSystemFont, sans-serif';
ctx.textAlign = 'left';
ctx.fillText('应用入口', appStartX, appY - 8);

appItems.forEach(function(item, i) {
  const x = appStartX + i * (appW + GAP);
  drawBox(x, appY, appW, appH, colorByName(item.c), item.t, item.s, 12);
});

// ---- ARROWS ----

// Provider → Core (solid green)
drawArrow(provStartX + provW/2, provY + provH/2, coreX + coreW, coreY + 70, C.green, false);
// Provider (smartrouter) → Core (dashed conditional)
drawArrow(provStartX + provW/2, provY + provH + 8 + provH/2, coreX + coreW, coreY + 100, C.cyan, true);

// Tools → Core (solid orange)
drawArrow(toolStartX + toolW/2, toolY + toolH/2, coreX + coreW, coreY + coreH - 50, C.orange, false);

// Core → Domain Extension (dashed)
drawArrow(coreX + coreW/2, coreY + coreH + 6, coreX + coreW/2, domY, C.border, true);

// Domain Extension → Infrastructure (dashed)
infraItems.forEach(function(item, i) {
  const x = infraStartX + i * (infraW + 8) + infraW/2;
  drawArrow(coreX + coreW/2 + (i - 4.5) * 45, domY + domH + 6, x, infraY, C.border, true);
});

// Infrastructure → App Entry (dashed)
appItems.forEach(function(item, i) {
  const x = appStartX + i * (appW + GAP) + appW/2;
  drawArrow(coreX + coreW/2 + (i - 1) * 90, infraY + infraH + 6, x, appY, C.textDim, true);
});

// TUI ↔ Core (dashed pink)
drawArrow(tuiX + tuiW, tuiY + tuiH/2, coreX, coreY + 80, C.pink, true);

// Domain Extension → Core (dashed, feedback)
drawArrow(domStartX + domW/2, domY + domH, domStartX + domW/2, domY + domH + 8, C.border, false);

// ---- LEGEND ----
const legX = W - 265, legY = 80;
ctx.fillStyle = C.surface;
ctx.strokeStyle = C.border;
ctx.lineWidth = 1;
roundRect(legX - 10, legY - 5, 250, 155, 6);
ctx.fill();
ctx.stroke();

ctx.fillStyle = C.textBold;
ctx.font = 'bold 11px -apple-system, BlinkMacSystemFont, sans-serif';
ctx.textAlign = 'left';
ctx.fillText('图例', legX + 5, legY + 15);

const legendItems = [
  { c: C.blue, t: '实线: 直接依赖/调用' },
  { c: C.orange, t: '虚线: 数据流/事件流' },
  { c: C.green, t: 'Provider 实现 agentcore.Provider' },
  { c: C.purple, t: 'Extension 扩展点 (SOP 接口探测)' },
  { c: C.cyan, t: '存储/持久化组件' },
  { c: C.pink, t: 'UI / 用户交互' },
  { c: C.red, t: '领域扩展层: 领域特定模块' },
];

legendItems.forEach(function(item, i) {
  const y = legY + 40 + i * 17;
  ctx.fillStyle = item.c;
  ctx.fillRect(legX + 5, y - 3, 12, 3);
  ctx.fillStyle = C.textDim;
  ctx.font = '11px -apple-system, BlinkMacSystemFont, sans-serif';
  ctx.fillText(item.t, legX + 24, y + 2);
});

// ---- BOTTOM NOTE ----
ctx.fillStyle = C.textDim;
ctx.font = 'italic 11px -apple-system, BlinkMacSystemFont, sans-serif';
ctx.textAlign = 'center';
ctx.fillText('"离二边，行中道" — 不落有无，不执生灭，恰到好处的抽象，克制的工程实践', W/2, H - 15);

</script>
</body>
</html>
