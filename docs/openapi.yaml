components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: 用于技能管理 API 的可选认证

  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
        time:
          type: string
          format: date-time
          example: "2026-07-21T12:00:00Z"

    ReadyResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
        time:
          type: string
          format: date-time
        checks:
          type: object
          properties:
            agents:
              type: integer
              description: Agent 池总数量
            agents_idle:
              type: integer
              description: 空闲 Agent 数量
            disclosure_tasks:
              type: integer
              description: 运行中的 disclosure 分析任务数

    ChatRequest:
      type: object
      required: [message]
      properties:
        message:
          type: string
          description: 用户消息内容
        thread_id:
          type: string
          description: 会话线程 ID（可选，用于保持上下文）
        stream:
          type: boolean
          default: false
          description: 是否使用 SSE 流式返回
        model:
          type: string
          description: 覆盖默认模型
        response_format:
          type: object
          description: 结构化输出格式配置
        thinking:
          type: object
          description: 推理过程配置
          properties:
            display:
              type: string
              enum: [collapsed, expanded, summarized, omitted]
            effort:
              type: string
              enum: [none, low, medium, high]
            budget:
              type: integer
              description: 推理 Token 预算
        skills:
          type: array
          items:
            type: string
          description: 启用的技能列表

    ChatResponse:
      type: object
      properties:
        output:
          type: string
          description: Agent 响应文本
        thread_id:
          type: string
          description: 会话线程 ID
        error:
          type: string
          description: 错误信息（失败时存在）

    Skill:
      type: object
      properties:
        name:
          type: string
          description: 技能名称
        description:
          type: string
          description: 技能描述
        domain:
          type: string
          description: 所属领域

    Thread:
      type: object
      properties:
        id:
          type: string
          description: 线程唯一标识
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        message_count:
          type: integer

    DisclosureAnalyzeRequest:
      type: object
      required: [text]
      properties:
        text:
          type: string
          description: 技术交底书纯文本内容（非空）

    DisclosureAnalyzeResponse:
      type: object
      properties:
        task_id:
          type: string
          description: 任务 ID（格式 disclosure-{时间戳}-{序号}）；失败时为空
        status:
          type: string
          description: 受理成功为 pending；请求被拒绝为 failed

    DisclosureReviewRequest:
      type: object
      required: [decision]
      properties:
        decision:
          type: string
          enum: [adopted, modified, rejected]
          description: 复核决定：adopted（采纳）/ modified（修改后采纳）/ rejected（拒绝）
        modified_output:
          type: string
          description: modified 决策时的改后内容
        feedback:
          type: string
          description: 复核反馈意见
        case_id:
          type: string
          description: 关联案件 ID

    DisclosureReviewResponse:
      type: object
      properties:
        task_id:
          type: string
          description: 任务 ID
        status:
          type: string
          description: 受理后状态（reviewed）

    DisclosureTaskStatus:
      type: object
      properties:
        task_id:
          type: string
          description: 任务 ID
        status:
          type: string
          enum: [pending, running, awaiting_review, reviewed, completed, failed]
          description: |
            任务状态：pending 排队中 / running 执行中 /
            awaiting_review 分析完成待人工复核 /
            reviewed 已人工复核 / completed 已完成 / failed 失败
        progress:
          $ref: "#/components/schemas/DisclosureProgress"
        result:
          $ref: "#/components/schemas/DisclosureReport"
        error:
          type: string
          description: 失败原因（status=failed 时存在）
        review_decision:
          type: string
          description: 人工复核决定（adopted/modified/rejected）
        inventiveness:
          type: object
          description: 创造性三步法评估结果

    DisclosureProgress:
      type: object
      properties:
        current_node:
          type: string
          description: 当前执行中的 Pregel 节点
        nodes_done:
          type: array
          items:
            type: string
          description: 已完成节点列表

    DisclosureReport:
      type: object
      description: 结构化分析报告（disclosure.AnalysisReport）
      properties:
        id:
          type: string
          description: 报告 ID
        document:
          type: object
          description: 解析后的交底书文档（标题/格式/段落）
        extraction:
          type: object
          description: 提取结果（技术问题/技术特征/技术效果/PFE 三元组）
        consistency:
          type: object
          description: 一致性校验结果（得分/问题列表/重试状态）
        search_keywords:
          type: array
          items:
            type: string
          description: 推荐检索关键词
        novelty:
          type: object
          description: 新颖性初判（assessed/conclusion/notes）
        report_text:
          type: string
          description: LLM 生成的报告正文（Markdown）
        generated_at:
          type: string
          format: date-time
        reviewed_by_human:
          type: boolean
          description: 是否已通过人工复核
