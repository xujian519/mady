openapi: "3.0.3"
info:
  title: Mady API
  description: |
    Mady（中观智能体）是一个面向专利/法律/IP 专业人士的智能 Agent 平台。

    ## 版本
    当前稳定版本 v1（2026-07-21）。所有端点通过 `/api/v1/*` 前缀标识。
    旧版 `/api/*` 路径保留向后兼容，但标记为已废弃（`deprecated: true`）。

    ## 认证
    技能管理端点（`/api/v1/skills/*`）支持可选的 Bearer Token 认证。
    配置 `SkillAPIAuthToken` 后，需要在请求头中携带 `Authorization: Bearer <token>`。

    ## 流式响应
    `/api/v1/chat` 支持两种模式：
    - `stream: false`（默认）— 返回 JSON
    - `stream: true` — 返回 SSE（Server-Sent Events）流

    ## 运维端点
    - `/health` — 存活检查（负载均衡）
    - `/ready` — 就绪检查（Agent 池 + Disclosure 健康度）
    - `/metrics` — Prometheus 格式指标
  version: "1.0.0"
  contact:
    name: Mady Authors
    url: https://github.com/xujian519/mady

servers:
  - url: http://localhost:8080
    description: 本地开发服务器

tags:
  - name: Chat
    description: 聊天与 Agent 交互
  - name: Threads
    description: 会话线程管理
  - name: Skills
    description: 技能管理
  - name: Disclosure
    description: 技术交底书分析
  - name: States
    description: 状态快照
  - name: AG-UI
    description: Agent GUI 事件流
  - name: Operations
    description: 运维与可观测性端点

paths:
  # ======================================================
  # 运维端点
  # ======================================================
  /health:
    get:
      tags: [Operations]
      summary: 存活检查
      description: 轻量级存活探测，适用于负载均衡器健康检查。返回固定 JSON 结构。
      responses:
        "200":
          description: 服务器存活
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /ready:
    get:
      tags: [Operations]
      summary: 就绪检查
      description: |
        检查服务器及其依赖组件是否就绪。
        - Agent 池：统计池中 Agent 数量
        - Disclosure 任务管理器：统计运行中的分析任务
      responses:
        "200":
          description: 服务器就绪
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyResponse"

  /metrics:
    get:
      tags: [Operations]
      summary: 监控指标
      description: |
        返回 Prometheus 格式的运行时指标：
        - `http_requests_total` — 请求总数
        - `http_request_errors_total` — 5xx 错误数
        - `http_active_connections` — 当前活跃连接数
      responses:
        "200":
          description: 指标文本
          content:
            text/plain:
              schema:
                type: string

  # ======================================================
  # Chat API (v1)
  # ======================================================
  /api/v1/chat:
    post:
      tags: [Chat]
      summary: 发送消息并获取 Agent 响应
      description: |
        主聊天端点。支持同步（JSON）和流式（SSE）两种模式。
        可携带 `thread_id` 实现多轮对话上下文保持。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
      responses:
        "200":
          description: 同步响应（stream=false 时）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResponse"
        "200 (SSE)":
          description: 流式响应（stream=true 时）

  /api/chat:
    post:
      tags: [Chat]
      summary: 发送消息并获取 Agent 响应（已废弃）
      deprecated: true
      description: |
        旧版聊天端点。请迁移至 `/api/v1/chat`。
        主聊天端点。支持同步（JSON）和流式（SSE）两种模式。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
      responses:
        "200":
          description: 同步响应
          content:
            application/json:
              schema:
                type: object
        "200 (SSE)":
          description: 流式响应

