  # ======================================================
  # Disclosure API (v1)
  # ======================================================
  /v1/disclosure/analyze:
    post:
      tags: [Disclosure]
      summary: 提交技术交底书，启动异步分析
      description: |
        接收交底书纯文本，后台运行 Pregel 分析管线（提取 → 一致性校验 →
        检索关键词 → 新颖性初判 → 报告生成 → 人工复核关卡）。
        返回任务 ID，通过轮询或 SSE 流获取进度与结果。
        任务结果保留 30 分钟后自动清理。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DisclosureAnalyzeRequest"
      responses:
        "202":
          description: 任务已受理，返回任务 ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisclosureAnalyzeResponse"
        "400":
          description: 请求体非法或 text 为空（返回 status=failed）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisclosureAnalyzeResponse"
        "500":
          description: 服务端未配置 LLM Provider（返回 status=failed）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisclosureAnalyzeResponse"

  /v1/disclosure/analyze/{task_id}:
    get:
      tags: [Disclosure]
      summary: 轮询分析任务状态与结果
      description: |
        查询指定任务的状态。完成时携带完整的分析报告和创造性评估结果。
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
          description: 提交分析时返回的任务 ID
      responses:
        "200":
          description: 任务当前状态（完成时携带分析结果）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisclosureTaskStatus"
        "404":
          description: 任务不存在（或已过保留期被清理）
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string

  /v1/disclosure/analyze/{task_id}/stream:
    get:
      tags: [Disclosure]
      summary: SSE 流式获取分析进度
      description: |
        以 Server-Sent Events 实时推送执行进度：
        - 连接建立后先发送 `: connected` 注释行
        - 每 500ms 推送一次 `event: progress`，data 为 DisclosureTaskStatus
          （含 progress，不含 result）
        - 任务结束时推送一次 `event: done`，data 为含 result/error 的
          最终 DisclosureTaskStatus，随后连接关闭
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
          description: 提交分析时返回的任务 ID
      responses:
        "200":
          description: "SSE 事件流（event: progress / done）"
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/DisclosureTaskStatus"
        "404":
          description: 任务不存在（或已过保留期被清理）
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string

  /v1/disclosure/analyze/{task_id}/review:
    post:
      tags: [Disclosure]
      summary: 提交人工复核结论
      description: |
        受理 awaiting_review 状态任务的人工复核结论。
        决策留痕到 ApprovalStore（P3 专家盲测数据收集触点）。
        仅在任务状态为 awaiting_review 时可用。
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
          description: 待复核的任务 ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DisclosureReviewRequest"
      responses:
        "200":
          description: 复核结论已受理
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisclosureReviewResponse"
        "400":
          description: 请求体非法（decision 非 adopted/modified/rejected）
        "404":
          description: 任务不存在
        "409":
          description: 任务状态非 awaiting_review（无法复核）
        "503":
          description: ApprovalStore 未配置

