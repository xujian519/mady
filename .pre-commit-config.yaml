repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: check-yaml
        args: [--allow-multiple-documents]

  - repo: local
    hooks:
      - id: go-fmt
        name: go fmt
        entry: gofmt -l -w
        language: system
        files: \.go$
      - id: go-imports
        name: go imports
        # 跨机器兼容：优先 $(go env GOPATH)/bin/goimports，缺失则回退 PATH 中的 goimports。
        entry: bash -ec 'G="$(go env GOPATH)/bin/goimports"; [ -x "$G" ] || G=goimports; "$G" -l -w -local github.com/xujian519/mady "$@"' --
        language: system
        files: \.go$
      - id: go-vet
        name: go vet
        # go.work 多模块结构：必须分别 vet 根模块和 tools/ 子模块，
        # 否则根目录 `go vet ./...` 不会覆盖 tools/。
        entry: bash -ec 'go vet ./... && (cd tools && go vet ./...)' --
        language: system
        files: \.go$
        pass_filenames: false
      - id: golangci-lint
        name: golangci-lint
        # go.work 多模块结构：必须分别 lint 根模块和 tools/ 子模块。
        # 脚本处理跨机器兼容（GOPATH/bin 优先，PATH 回退）与未安装时的非阻塞降级。
        # 与 Makefile lint target 行为对齐。
        entry: bash scripts/precommit-golangci-lint.sh
        language: system
        files: \.go$
        pass_filenames: false
      - id: check-sensitive-paths
        name: sensitive paths gate
        entry: bash scripts/check-sensitive-paths.sh --msg-file
        language: system
        stages: [commit-msg]

  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.22.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
        additional_dependencies: ['@commitlint/config-conventional']
