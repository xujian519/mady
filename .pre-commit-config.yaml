repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: check-yaml
        args: [--allow-multiple-documents]

  - repo: local
    hooks:
      - id: go-fmt
        name: go fmt
        entry: gofmt -l -w
        language: system
        files: \.go$
      - id: go-imports
        name: go imports
        entry: bash -ec 'G="$(go env GOPATH)/bin/goimports"; [ -x "$G" ] || G=goimports; "$G" -l -w -local github.com/xujian519/mady "$@"' --
        language: system
        files: \.go$
      - id: go-vet
        name: go vet
        entry: bash -ec 'go vet ./...'
        language: system
        files: \.go$
        pass_filenames: false
      - id: check-sensitive-paths
        name: sensitive paths gate
        entry: bash scripts/check-sensitive-paths.sh --msg-file
        language: system
        stages: [commit-msg]

  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.22.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
        additional_dependencies: ['@commitlint/config-conventional']
