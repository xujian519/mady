id: "invalidation"
name: "专利无效宣告事务"
caseType: "invalidation"
description: >
  对已授权专利提出无效宣告请求。无效宣告程序由专利复审和无效审理部审理，
  是专利授权后最重要的法律挑战途径。每项无效理由必须独立构建且有证据支持，
  多份对比文件组合时须论证组合动机。无效宣告请求费为发明3000元/实用新型1500元。
discoveryStages:
  - name: "专利解析"
    goal: "解析目标专利的权利要求、技术方案和已知的无效理由"
    suggestions:
      - "使用 parse_patent 解析目标专利的权利要求书和说明书"
      - "确定专利类型（发明/实用新型/外观设计）和优先权日"
      - "识别独立权利要求和从属权利要求的保护范围"
      - "评估专利的审查历史（如有）以发现审查员已考虑的现有技术"
      - "确认是否存在禁止反悔原则适用的情形"

  - name: "证据搜集与核实"
    goal: "检索和核实无效宣告证据（现有技术/使用公开/互联网公开等）"
    suggestions:
      - "检索专利/非专利文献：中国专利、PCT、EPO、USPTO、JPO 等全域检索"
      - "核实对比文件的公开日是否早于涉案专利的优先权日"
      - "收集使用公开证据（销售记录/展会资料/产品手册等）"
      - "收集互联网公开证据（需公证保全，注意时间戳）"
      - "对证据进行翻译（外文证据须提供中文译文）"
      - "核实证据的完整性和可采性"
      - "使用 domain_retriever 获取相关现有技术文献"

  - name: "无效理由构建"
    goal: "逐项构建无效理由，确保每项理由独立、有证据支持"
    suggestions:
      - "参考文献 a22.2_novelty 框架构建新颖性无效理由（单独对比原则）"
      - "参考文献 a22.3_inventiveness 框架构建创造性无效理由（三步法）"
      - "参考文献 a26.3_disclosure 框架构建公开不充分无效理由"
      - "参考文献 a26.4_clarity 框架构建权利要求不清楚/不支持无效理由"
      - "参考文献 a33_amendment 框架构建修改超范围无效理由"
      - "评估A2保护客体、A22.4实用性等补充无效理由的适用性"
      - "每项无效理由必须独立撰写，不得以\"综合来看\"代替逐项分析"
      - "多篇对比文件组合时须明确论证组合动机和技术启示"
      - "一项无效理由对应一条法条，不得在同一理由中混用多个法条"

  - name: "结论整合"
    goal: "综合评估各无效理由的成功概率，形成完整分析报告"
    suggestions:
      - "逐项评估每项无效理由的成立可能性（高/中/低）"
      - "综合评估整体无效策略的有效性"
      - "指出事实认定和法律适用中的争议焦点"
      - "提供口审策略建议：重点论述的理由和可能的应对预案"
      - "使用 analyze_slop 检查分析报告文本质量"
      - "生成无效宣告请求书草稿"
      - "标注置信度：对每项理由给出成立概率估算"

availableArticles:
  - articleId: "patent-law-a22.2"
    priority: 1
    description: "新颖性（无效宣告最主要理由之一，单独对比原则）"

  - articleId: "patent-law-a22.3"
    priority: 1
    description: "创造性（无效宣告最主要理由之一，三步法/组合动机）"

  - articleId: "patent-law-a22.4"
    priority: 2
    description: "实用性（可量产/可工业应用，较少单独使用但可作为补充理由）"

  - articleId: "patent-law-a26.3"
    priority: 3
    description: "充分公开（说明书公开不充分，本领域技术人员无法实现）"

  - articleId: "patent-law-a26.4"
    priority: 3
    description: "权利要求不清楚/得不到说明书支持"

  - articleId: "patent-law-a33"
    priority: 3
    description: "修改超范围（针对授权版本相对于申请文件的修改）"

  - articleId: "patent-law-a2"
    priority: 4
    description: "保护客体（不属于发明/实用新型/外观设计的保护对象）"

  - articleId: "patent-law-a9"
    priority: 4
    description: "重复授权（同样的发明创造不能授予两项专利权）"

  - articleId: "patent-law-a22.1"
    priority: 5
    description: "先申请原则（被无效专利与他人在先申请冲突）"

  - articleId: "patent-law-r30"
    priority: 5
    description: "保密审查（违反保密审查条款向外国申请专利）"

executionTemplate:
  artifactType: "无效宣告请求书"
  sections:
    - "案件基本信息（专利号/专利名称/专利权人/请求人信息）"
    - "目标专利概述（权利要求保护范围分析）"
    - "证据清单（对比文件/使用公开/互联网公开等）"
    - "无效理由逐项分析（每项理由独立成节，含法律依据和证据支持）"
    - "组合论证（多篇对比文件组合的动机和技术启示论证）"
    - "口审策略建议（重点理由/争议焦点/应对预案）"
    - "结论与请求（宣告专利权全部/部分无效的请求）"
    - "附件清单（证据副本/委托书/费用缴纳凭证等）"
