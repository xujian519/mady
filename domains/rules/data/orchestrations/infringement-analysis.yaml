name: infringement-analysis
description: 专利侵权判定分析事务编排
domain: patent
caseType: infringement

discoveryStages:
  - id: intake
    name: 案件信息收集
    fields:
      - patent_claims (必填)
      - accused_product (必填)
      - perspective (必填: patentee/defendant)
      - patent_type (必填: invention/utility_model)
      - patent_spec (可选)
      - prosecution_history (可选)
      - prior_art_refs (可选)

  - id: knowledge_enrichment
    name: 知识检索增强
    actions:
      - search_guidelines: 专利侵权判定相关审查指南
      - search_cases: 类似技术领域侵权案例

  - id: analysis
    name: 侵权判定分析
    tool: evaluate_infringement

availableArticles:
  - patent-law-infringement

executionTemplate: |
  请使用 evaluate_infringement 工具进行专利侵权判定分析。

  视角: {{.perspective}}
  专利类型: {{.patent_type}}
  权利要求: {{.patent_claims}}
  被控产品: {{.accused_product}}
