# Reasoning Patterns — 18 standardized legal reasoning templates
# from the patent re-examination knowledge base.
#
# Each pattern is a canonical reasoning form used by patent examiners and
# agents during invalidation and examination proceedings. Patterns are
# organized in four priority batches: creativity (1-6), novelty (7-9),
# claims/specification (10-14), and other (15-18).
patterns:
  # ============================================================================
  # Batch 1 — Creativity (创造性)
  # ============================================================================

  - patternId: "RP-CREATIVITY-01"
    name: "单对比文件+公知常识"
    category: creativity
    frequency: 54.0
    invalidationRate: 95.9
    coreLogic: >
      区别特征属于公知常识是实践中最常用的创造性否定路径，根据三步法第三步，
      如果区别技术特征属于本领域的公知常识，则无需引入额外的对比文件即可认定不具备创造性。
    template: >
      最接近的现有技术为...，区别技术特征在于...，该区别特征属于本领域的公知常识/
      惯用技术手段，因此本领域技术人员在面对技术问题时不需付出创造性劳动即可获得该技术方案。
    steps:
      - "确定最接近的现有技术"
      - "确定区别技术特征"
      - "认定区别特征属于公知常识"
      - "论证无需创造性劳动"

  - patternId: "RP-CREATIVITY-02"
    name: "多对比文件结合"
    category: creativity
    frequency: 14.3
    invalidationRate: 73.7
    coreLogic: >
      将多篇对比文件结合时需要论证本领域技术人员具有结合的技术启示，
      不能仅因为多篇对比文件覆盖了全部区别特征就认定不具备创造性。
    template: >
      对比文件1公开了...，对比文件2公开了...，本领域技术人员有动机将对比文件2的
      技术方案结合到对比文件1中，因为...，从而得出要求保护的发明。
    steps:
      - "确定最接近的现有技术"
      - "确定区别技术特征"
      - "论证结合动机/技术启示"

  - patternId: "RP-CREATIVITY-03"
    name: "技术启示判断"
    category: creativity
    frequency: 8.1
    invalidationRate: 83.8
    coreLogic: >
      三步法第三步的核心：判断现有技术整体上是否存在技术启示，该技术启示会使本领域
      技术人员面对所解决的技术问题时改进最接近的现有技术并获得要求保护的发明。
    template: >
      现有技术整体上是否存在技术启示，使得本领域技术人员在面对实际解决的技术
      问题...时，有动机改进最接近的现有技术...并获得要求保护的发明...
    steps:
      - "确认实际解决的技术问题"
      - "分析现有技术整体是否存在技术启示"
      - "判断是否显而易见"

  - patternId: "RP-CREATIVITY-04"
    name: "惯用手段与常规选择"
    category: creativity
    frequency: 0
    invalidationRate: 0
    coreLogic: >
      本领域惯用技术手段或常规设计选择可直接认定区别技术特征不具备创造性，
      无需额外对比文件佐证。
    template: >
      该区别特征...是本领域的惯用技术手段/常规设计选择，本领域技术人员在面对
      技术问题...时会常规性地选择该手段，无需付出创造性劳动。
    steps:
      - "认定惯用技术手段/常规选择"
      - "论证无需创造性劳动"

  - patternId: "RP-CREATIVITY-05"
    name: "用途限定的影响"
    category: creativity
    frequency: 0
    invalidationRate: 0
    coreLogic: >
      用途特征对创造性判断的影响取决于该用途特征是否隐含了产品在结构/组成/工艺上的变化，
      不改变产品结构的单纯用途限定对创造性无明显贡献。
    template: >
      用途特征...是否隐含了产品在结构/组成/工艺上的变化。如果用途特征仅限定了使用方式
      而未改变产品本身，则该用途特征对创造性判断不具有实质性贡献。
    steps:
      - "分析用途特征是否隐含结构/组成/工艺变化"
      - "判断用途特征对创造性的贡献"

  - patternId: "RP-CREATIVITY-06"
    name: "预料不到的效果认定"
    category: creativity
    frequency: 0
    invalidationRate: 0
    coreLogic: >
      预料不到的技术效果是创造性辅助判断因素之一，当发明产生了本领域技术人员无法
      合理预期的技术效果时，可作为具备创造性的有力证据。
    template: >
      本发明产生了预料不到的技术效果...，该效果超出了本领域技术人员在申请日前的
      合理预期，因此可作为创造性存在的辅助判断依据。
    steps:
      - "确定发明产生的技术效果"
      - "论证效果超出本领域技术人员的合理预期"
      - "将预料不到的效果作为创造性辅助判断依据"

  # ============================================================================
  # Batch 2 — Novelty (新颖性)
  # ============================================================================

  - patternId: "RP-NOVELTY-01"
    name: "现有技术认定（单独对比+四相同）"
    category: novelty
    frequency: 0
    invalidationRate: 0
    coreLogic: >
      新颖性判断采用单独对比原则，将一项权利要求与一份现有技术单独对比，判断是否属于
      相同的技术领域、解决相同的技术问题、采用相同的技术方案、达到相同的预期效果
      （四相同标准）。
    template: >
      将权利要求...与一份现有技术文件...单独对比：技术领域是否相同（...），
      技术问题是否相同（...），技术方案是否相同（...），预期效果是否相同（...）。
    steps:
      - "单独对比一项权利要求与一份现有技术"
      - "比对技术领域"
      - "比对技术问题"
      - "比技术方案"
      - "比对预期效果"

  - patternId: "RP-NOVELTY-02"
    name: "公开方式判断"
    category: novelty
    frequency: 0
    invalidationRate: 0
    coreLogic: >
      现有技术的公开方式包括出版物公开（论文/期刊/书籍）、使用公开（销售/展出/公开实施）
      和互联网公开，核心判断标准是申请日前是否为公众所知。
    template: >
      现有技术通过...方式公开，公开日...，在申请日...之前，公众能够通过...途径
      获知其技术内容，因此构成现有技术。
    steps:
      - "认定公开方式（出版物/使用/互联网）"
      - "确认公开日"
      - "判断是否在申请日前为公众所知"

  - patternId: "RP-NOVELTY-03"
    name: "抵触申请与优先权"
    category: novelty
    frequency: 0
    invalidationRate: 0
    coreLogic: >
      抵触申请指在先申请在后公开的专利申请，仅可用于新颖性判断；优先权有效的以
      优先权日作为申请日判断现有技术时间节点。
    template: >
      专利申请...的申请日为...，优先权日为...（优先权有效），对比文件...属于/不属于
      抵触申请（构成要件分析），仅用于新颖性/创造性判断。
    steps:
      - "判断对比文件是否构成抵触申请"
      - "确认优先权是否有效"
      - "确定现有技术判断的时间基准"

  # ============================================================================
  # Batch 3 — Claims / Specification (权利要求/说明书)
  # ============================================================================

  - patternId: "RP-CLAIMS-01"
    name: "不清楚认定"
    category: claims
    frequency: 0
    invalidationRate: 0
    coreLogic: >
      权利要求应当清楚、简明地限定保护范围，本领域技术人员根据权利要求文本即可确定
      保护范围，不得使用含义不确定的术语（如'优选地''大约'等）。
    template: >
      权利要求...中使用的术语...含义不确定，本领域技术人员无法确定其具体范围，
      导致权利要求不清楚。
    steps:
      - "审查术语是否含义明确"
      - "判断本领域技术人员能否确定保护范围"

  - patternId: "RP-CLAIMS-02"
    name: "不支持认定"
    category: claims
    frequency: 0
    invalidationRate: 0
    coreLogic: >
      权利要求概括的范围应当在说明书记载的范围内，能够得到说明书的支持，
      不得超出具体实施方式和实施例的合理概括范围。
    template: >
      权利要求...概括的范围超出了说明书...记载的范围，说明书仅公开了...，
      而权利要求涵盖了...，构成不支持。
    steps:
      - "比对权利要求与说明书公开的范围"
      - "判断概括范围是否合理"

  - patternId: "RP-CLAIMS-03"
    name: "功能性限定"
    category: claims
    frequency: 0
    invalidationRate: 0
    coreLogic: >
      功能性限定的解释以说明书公开的实现该功能的具体实施方式为限，不得理解为
      覆盖能够实现该功能的所有方式。
    template: >
      权利要求中使用了功能性限定...，说明书公开了实现该功能的具体实施方式...，
      该功能性限定的保护范围应当以说明书公开的实施方式为限。
    steps:
      - "识别权利要求中的功能性限定"
      - "确认说明书公开的具体实施方式"
      - "确定功能性限定的解释范围"

  - patternId: "RP-CLAIMS-04"
    name: "充分公开认定"
    category: claims
    frequency: 0
    invalidationRate: 0
    coreLogic: >
      说明书应当清楚、完整地公开发明，使本领域技术人员能够实现该技术方案，
      解决技术问题并产生预期技术效果。
    template: >
      说明书对技术方案...的公开是否使本领域技术人员能够实现该发明：技术方案是否完整、
      技术问题是否明确、技术效果是否可预期。
    steps:
      - "技术方案完整性审查"
      - "可实施性判断"
      - "技术效果可预期性判断"

  - patternId: "RP-CLAIMS-05"
    name: "实验数据要求"
    category: claims
    frequency: 0
    invalidationRate: 0
    coreLogic: >
      在医药化学等领域，说明书应当提供足以证明技术方案能够实现所述用途/效果的
      实验数据，数据应真实可靠可重现。
    template: >
      说明书提供了实验数据...，该数据是否足以证明技术方案...能够实现所述用途.../
      效果...，数据是否真实、可靠、可重现。
    steps:
      - "审查实验数据是否足以证明技术效果"
      - "判断数据的真实性和可重现性"

  # ============================================================================
  # Batch 4 — Other (其他)
  # ============================================================================

  - patternId: "RP-OTHER-01"
    name: "保护客体-技术方案认定"
    category: other
    frequency: 0
    invalidationRate: 0
    coreLogic: >
      第2条规定的可专利主题应当是技术方案（产品或方法），利用自然规律解决技术问题，
      不属于科学发现、智力活动规则、疾病诊断治疗方法或原子核变换方法。
    template: >
      要求保护的主题...是否构成专利法第2条意义上的技术方案：是否利用自然规律，
      是否解决技术问题，是否属于排除客体（科学发现/智力活动规则/诊断治疗方法/原子核变换）。
    steps:
      - "判断是否构成技术方案"
      - "确认利用自然规律解决技术问题"
      - "逐一排除非可专利客体"

  - patternId: "RP-OTHER-02"
    name: "程序-修改超范围与优先权"
    category: other
    frequency: 0
    invalidationRate: 0
    coreLogic: >
      修改内容应当能够从原说明书和权利要求书记载的范围中直接且毫无疑义地确定；
      优先权主张需在申请日前完成优先权转让。
    template: >
      修改内容...是否能够从原说明书和权利要求书记载的范围中直接且毫无疑义地确定。
      优先权主张...是否在申请日前完成转让。
    steps:
      - "判断修改内容是否超出原申请文件范围"
      - "确认优先权程序合规性"

  - patternId: "RP-OTHER-03"
    name: "实用性-积极效果与产业应用"
    category: other
    frequency: 0
    invalidationRate: 0
    coreLogic: >
      第22条第4款规定发明应当能够在产业上制造或使用并产生积极效果，
      能够大规模工业化实施。
    template: >
      发明...是否具备实用性：是否能够在产业上制造/使用，是否能够产生积极效果，
      是否能够大规模工业化实施。
    steps:
      - "判断是否能够在产业上制造或使用"
      - "判断是否产生积极效果"

  - patternId: "RP-OTHER-04"
    name: "整体视觉效果对比"
    category: other
    frequency: 0
    invalidationRate: 0
    coreLogic: >
      外观设计对比以整体视觉效果为准，综合判断产品相同或相近种类的外观设计是否构成
      相同或近似，不进行局部细节的逐一比对。
    template: >
      产品种类：...，外观设计整体视觉效果：...，与对比设计...整体视觉效果相同/近似，
      局部差异...对整体视觉效果不产生显著影响。
    steps:
      - "确定产品种类是否相同或相近"
      - "明确整体视觉效果"
      - "对比整体视觉效果是否相同或近似"
      - "判断局部差异是否产生显著影响"
