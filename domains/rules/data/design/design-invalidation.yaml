id: "design_invalidation"
name: "外观设计专利无效宣告事务"
caseType: "design_invalidation"
description: >
  对已授权外观设计专利提出无效宣告请求。外观设计无效宣告遵循"整体观察、综合判断"原则，
  以一般消费者为判断主体，不同于发明/实用新型的单独对比原则和全面覆盖规则。
  无效宣告理由包括专利法第23条第1款（现有设计）、第23条第2款（抵触申请）
  和第23条第3款（与在先合法权利冲突）。

  外观设计专利与发明/实用新型的根本区别：
  - 判断主体：一般消费者 vs. 本领域技术人员
  - 判断方式：整体观察、综合判断 vs. 单独对比、三步法
  - 保护范围：以图片或照片为准 vs. 以权利要求为准
  - 设计空间：影响近似判断尺度 vs. 无对应概念
discoveryStages:
  - name: "外观设计解析"
    goal: "解析目标外观设计的图片/照片、产品类别和设计特征要素"
    suggestions:
      - "确定外观设计的产品名称和产品类别（洛迦诺分类）"
      - "解析设计特征要素：整体形状/图案/色彩/布局等"
      - "确定设计空间大小：评估该产品类别的设计自由度"
      - "识别惯常设计（通用/常见设计特征）"
      - "阅读简要说明，确认设计要求保护的内容"

  - name: "证据搜集与核实"
    goal: "检索和核实外观设计无效宣告证据"
    suggestions:
      - "检索现有设计：中国外观设计专利、海牙体系、各国外观设计数据库"
      - "检索使用公开证据：产品上市/销售记录/展会资料/产品图册"
      - "核实对比设计的公开日是否早于涉案专利的申请日"
      - "收集在先合法权利证据（商标注册证/著作权登记证/企业名称登记等）"
      - "互联网公开证据需公证保全"
      - "核实证据的完整性和可采性"

  - name: "近似判断分析"
    goal: "按'整体观察、综合判断'四步法构建近似判断论证"
    suggestions:
      - "第一步：确定设计特征（形状/图案/色彩及其结合）"
      - "第二步：以一般消费者视角对比整体视觉效果"
      - "第三步：基于整体观察判断是否构成近似"
      - "考虑设计空间大小对判断尺度的影响：空间大→宽松，空间小→严格"
      - "排除惯常设计：通用/常见设计在对比中不予考虑"
      - "如涉及GUI，适用GUI外观设计特殊审查规则"
      - "评估设计特征组合与转用是否构成明显区别"

  - name: "结论整合"
    goal: "综合评估各无效理由的成立可能性，形成完整分析报告"
    suggestions:
      - "逐项评估每项无效理由的成立可能性（高/中/低）"
      - "综合评估整体无效策略的有效性"
      - "分析设计空间对判断结果的影响"
      - "提供口审策略建议：重点论述的整体视觉差异"
      - "生成外观设计无效宣告请求书草稿"

availableArticles:
  - articleId: "patent-law-a23.1"
    priority: 1
    description: "现有设计（外观设计无效宣告最主要理由，整体观察/综合判断）"

  - articleId: "patent-law-a23.2"
    priority: 2
    description: "抵触申请（他人在先申请、在后公布的相同或近似外观设计）"

  - articleId: "patent-law-a23.3"
    priority: 3
    description: "与在先合法权利冲突（商标权/著作权/企业名称权/知名商品特有包装装潢）"

executionTemplate:
  artifactType: "外观设计无效宣告请求书"
  sections:
    - "案件基本信息（专利号/外观设计名称/专利权人/请求人信息）"
    - "目标外观设计概述（产品类别/设计特征/设计空间等级）"
    - "证据清单（现有设计/使用公开/在先权利等）"
    - "无效理由逐项分析（每项理由独立成节，含法律依据和证据支持）"
    - "整体近似判断论证（四步法分析框架）"
    - "设计空间分析及其对判断尺度的影响"
    - "惯常设计排除说明"
    - "口审策略建议（重点论述的整体视觉差异/应对预案）"
    - "结论与请求（宣告专利权全部/部分无效的请求）"
    - "附件清单（证据副本/委托书/费用缴纳凭证等）"
