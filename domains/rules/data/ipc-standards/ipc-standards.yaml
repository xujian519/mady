  - id: "创造性-道路铁路桥梁-E01"
    article: "patent-law-a22.3"
    ipcSection: "E"
    ipcDetail: "E01"
    name: "创造性-审查标准-道路铁路桥梁"
    keyPoints:
      - "三步法标准框架——存在技术启示则显而易见"
    tips:
      - "在道路路面结构、路基处理等领域，路面各结构层的材料选择和厚度设计已有大量行业标准和技术规范。当技术启示存在于多篇现有技术文献中时，三步法的标准适用即可否定创造性。"
      - "在桥梁工程领域（梁桥、拱桥、斜拉桥、悬索桥），主梁截面、桥墩结构、支座系统等核心构件的设计方法已高度成熟。桥梁结构的技术改进往往体现在构件形状或连接方式的微调上，这种常规改进难以满足创造性要求。"
      - "本案是道路工程领域认定\"非显而易见\"的典型案例。在路面材料配合比、特殊路基处理方案等技术方案中，如果确实不存在技术启示，创造性可以被认定。但专利权人需要注意，创造性成立并不意味着专利不会被其他理由宣告无效。"
      - "在道路附属设施（护栏、隔音墙、排水设施、标志标线等）领域，结构设计已高度标准化。技术方案的改进如果仅是现有标准件的不同排列组合，创造性很难成立。"
      - "在沥青路面、水泥混凝土路面等道路路面技术领域，路面结构层设计、材料配合比等已有大量行业标准和研究文献。当技术启示明确存在时，即使具体参数略有调整，仍可被认定为显而易见。"
    source: "宝宸知识库-复审无效/创造性/创造性-审查标准-道路铁路桥梁.md"
  - id: "创造性-金属加工-B22"
    article: "patent-law-a22.3"
    ipcSection: "B"
    ipcDetail: "B22"
    name: "创造性-审查标准-金属加工"
    keyPoints:
      - "区别被公开或属公知常识时不具备创造性"
    tips:
      - "冲压成形是金属加工中最为成熟的子领域之一，大量改进属于已知工艺的常规优化。专利撰写时应着重强调区别特征带来的超预期技术效果，而非仅仅描述结构上的差异。"
      - "\"足够的技术启示\"标准要求本领域技术人员能够从现有技术中找到明确的改进方向和具体手段。在答复审查意见或无效答辩时，应从\"本领域技术人员能否找到改进方向\"这一角度进行反驳。"
      - "在无效程序中，请求人常采用断章取义的方式解读对比文件，专利权人应从整体技术方案的角度进行反驳，强调对比文件的整体技术构思而非孤立的技术特征。"
      - "\"合理预期的技术效果\"是判断区别特征是否带来创造性贡献的重要考量因素。如果区别特征的效果在本领域技术人员的预期范围内，即使未被现有技术明确公开，也可能因属常规技术手段而被否定创造性。"
      - "\"无需付出创造性劳动\"是金属加工领域否定创造性的常用表述。专利撰写时需要突出技术方案中获得区别特征所需的非常规思考过程和实验探索。"
    source: "宝宸知识库-复审无效/创造性/创造性-审查标准-金属加工.md"
