  - id: "创造性-食品-A23"
    article: "patent-law-a22.3"
    ipcSection: "A"
    ipcDetail: "A23"
    name: "创造性-审查标准-食品"
    keyPoints:
      - "相似技术手段不等于技术启示——新问题新效果阻断结合动机"
    tips:
      - "\"相似不等于启示\"是食品设备领域创造性答辩的重要策略。即使对比文件存在表面上相似的结构，只要解决的问题和产生的效果不同，仍然可以争辩创造性。"
      - "食品加工设备类实用新型专利中，\"部分公开+部分公知\"的否定模式极为常见。专利撰写时应尽量使核心技术特征集中在一个区别点上，避免多个独立区别特征被分别攻破。"
      - "食品领域的实用新型专利在创造性判断中享有较发明专利更为严格的技术领域限制。专利权人在答辩时应充分利用这一规则，主张对比文件所属的技术领域与本专利不同。"
      - "\"无启示+有益效果\"是创造性成立的标准配置。在食品工艺方法类专利中，应着重强调新工艺步骤带来的超预期效果，如提高营养保留率、改善口感等。"
      - "该决定提供了一个完整的创造性判断框架，正反两面均需考量。在无效答辩中，专利权人应同时论证\"无技术启示\"和\"有益效果\"两个要件。"
    source: "宝宸知识库-复审无效/创造性/创造性-审查标准-食品.md"
