    name: "新颖性-审查标准-家具家电"
    keyPoints:
      - "**全部技术特征公开原则：** 当一份现有技术公开了权利要求的全部技术特征，且二者属于相同技术领域、采用实质上相同的技术方案、解决相同的技术问题并获得相同的技术效果，则该权利要求不具备新颖性（参见第565689号、第561396号决定）。"
      - "**抵触申请的认定：** 当一份专利文件的申请日在被比专利申请日之前、公开日在被比专利申请日之后，且其技术方案与被比专利实质相同时，构成抵触申请，被比专利不具备新颖性（参见第560759号决定）。"
      - "**区别技术特征与新颖性维持：** 当权利要求相对于抵触申请或现有技术存在区别技术特征，使得两者技术方案实质上不同，则该权利要求具备新颖性（参见第566184号决定）。"
