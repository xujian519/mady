  - id: "创造性-计算-G06"
    article: "patent-law-a22.3"
    ipcSection: "G"
    ipcDetail: "G06"
    name: "创造性-审查标准-计算"
    keyPoints:
      - "改进动机应基于现有技术整体水平而非事后分析"
    tips:
      - "在答辩中应重点论证本领域技术人员在申请日前基于现有技术整体水平不存在改进动机，避免被事后分析。"
      - "涉及商业方法的计算机程序权利要求应在撰写时着重体现技术特征而非商业逻辑，确保技术贡献的清晰表达。"
      - "计算机硬件的\"转用\"若未带来技术层面的实质性突破，仅靠应用场景不同不足以支撑创造性。"
      - "数据识别（G06K）领域的技术方案若与已有识别技术在功能和效果上高度一致，创造性难以成立。"
      - "权利要求中应避免仅以条件触发式逻辑限定技术方案，应补充具体的技术实现手段。"
    source: "宝宸知识库-复审无效/创造性/创造性-审查标准-计算.md"
  - id: "创造性-起重-B66"
    article: "patent-law-a22.3"
    ipcSection: "B"
    ipcDetail: "B66"
    name: "创造性-审查标准-起重"
    keyPoints:
      - "区别技术特征未被公开且无公知常识证据时认定具备创造性"
    tips:
      - "在提升设备领域，请求人主张不具备创造性时需全面举证。若区别特征既未被现有技术公开也无法证明属公知常识，专利权人可有效争辩创造性。专利撰写时应充分描述区别特征带来的有益技术效果。"
      - "电梯领域引用其他机械领域的对比文件时，需证明跨领域结合的动机。专利权人可通过强调技术领域差异来争辩创造性。在无效答辩中，应注意分析对比文件与涉案专利的技术领域是否真正相同或相近。"
      - "起重机领域的结构改进若属于已知手段的等效替换，且未产生预料不到的技术效果，则难以维持创造性。专利撰写时应注重描述结构改进带来的意外效果，而非常规的等效功能。"
      - "电梯牵引系统的绳轮结构改进需仔细对比现有技术，确定真正的区别特征后再评价创造性。专利撰写时应明确记载各技术特征的具体结构和功能，以便在无效程序中进行精准的特征对比。"
      - "电梯补偿链的复合结构涉及多种材料的组合，创造性判断需考察组合是否超出常规选择范围。复合材料的选用若属于本领域常规选择且功能可预期，则不具备创造性。"
    source: "宝宸知识库-复审无效/创造性/创造性-审查标准-起重.md"
  - id: "创造性-车辆通用-B60"
    article: "patent-law-a22.3"
    ipcSection: "B"
    ipcDetail: "B60"
    name: "创造性-审查标准-车辆通用"
    keyPoints:
      - "区别属公知常识且显而易见且无预料不到效果——不具备创造性"
    tips:
      - "车轮（B60B）领域的结构改进若仅为常规公知手段的简单应用，创造性论证难以成立，应在说明书中充分论证非常规性。"
      - "撰写时应确保说明书对发明构思的充分公开，避免因撰写瑕疵导致权利要求被不当限缩或扩大。"
      - "多功能特征不等同于创造性，代理人应在答辩中着重论证至少一个效果是预料不到的。"
      - "车轮结构类改进应着重突出非常规设计理念，而非仅描述结构变化本身。"
      - "制动系统（B60T）领域技术成熟度高，常规改进面临的创造性挑战较大。"
    source: "宝宸知识库-复审无效/创造性/创造性-审查标准-车辆通用.md"
