  - id: "创造性-机床-B23"
    article: "patent-law-a22.3"
    ipcSection: "B"
    ipcDetail: "B23"
    name: "创造性-审查标准-机床"
    keyPoints:
      - "区别被公开且属常规技术手段时不具备创造性"
    tips:
      - "在车削加工等成熟技术领域，当区别特征的作用被对比文件明确公开且属常规手段时，创造性很难成立。专利撰写时应着重强调区别特征的非常规应用方式或协同效果。"
      - "焊接/切割领域的技术创新往往体现在工艺参数、设备结构的细微改进上。即使单个区别特征看似简单，只要未被现有技术公开且非公知常识，仍可能被认定为具备创造性。"
      - "这一原则对专利权人具有重要保护意义。当专利技术方案中存在多个相互配合、协同作用的技术特征时，不能将它们分别剥离后各自寻找对比文件。专利撰写时应注重描述特征之间的关联关系和协同效果。"
      - "在车削加工领域，大量的技术改进属于现有技术的简单组合或公知常识的直接应用。专利申请应避免仅为已知技术的简单拼凑，而应体现实质性的技术贡献。"
      - "\"无改进启示+非公知常识\"是创造性成立的有力论据。在焊接/切割领域，如果现有技术中不存在改进方向的技术指引，即使改进本身在事后看来并不复杂，也不应认定为显而易见。"
    source: "宝宸知识库-复审无效/创造性/创造性-审查标准-机床.md"
