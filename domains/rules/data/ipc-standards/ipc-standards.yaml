  - id: "创造性-织物处理-D06"
    article: "patent-law-a22.3"
    ipcSection: "D"
    ipcDetail: "D06"
    name: "创造性-审查标准-织物处理"
    keyPoints:
      - "实用新型保护范围限于形状构造，特定组成成分不能使产品具有特定形状则排除"
    tips:
      - "织物涂层（D06N）领域的实用新型专利，撰写时应着重从形状、构造角度限定产品，避免过度依赖材料组分或制造方法限定。"
      - "洗涤设备（D06F）领域的技术方案，若区别特征仅是本领域技术人员基于常理能推导出的多种实现方式之一，创造性难以成立。"
      - "织物水洗/漂白（D06B）领域中三步法的标准适用。答辩中应着重论证现有技术中不存在将区别特征引入的技术启示。"
      - "洗涤设备（D06F）领域无效答辩中可从\"工作方式和工作原理不同\"角度论证区别特征未被真正公开，以及不存在结合动机。"
      - "缩绒机（D06B）领域中，当能证明区别特征未被公开且不存在技术启示时，创造性可获认可。"
    source: "宝宸知识库-复审无效/创造性/创造性-审查标准-织物处理.md"
  - id: "创造性-给排水-E03"
    article: "patent-law-a22.3"
    ipcSection: "E"
    ipcDetail: "E03"
    name: "创造性-审查标准-给排水"
    keyPoints:
      - "技术启示存在则显而易见，标准三步法适用"
    tips:
      - "排水系统专利的撰写应注重说明技术方案与现有技术的本质区别，特别是区别特征带来的非常规技术效果。"
      - "在无效答辩中，可重点论证现有技术中看似相关技术手段的实际作用与本专利不同，从而否定技术启示的存在。"
      - "给水装置领域的改进若涉及新型水路控制逻辑或非常规结构配置，且能解决特定技术问题，创造性论证空间较大。"
      - "马桶冲水结构的改进应突出与现有冲水原理的本质区别，避免被认定为现有冲水方式的简单变型。"
      - "智能马桶的结构改进若仅涉及已有功能的常规布局调整，创造性论证难度较大。"
    source: "宝宸知识库-复审无效/创造性/创造性-审查标准-给排水.md"
