  - id: "创造性-体育娱乐-A63"
    article: "patent-law-a22.3"
    ipcSection: "A"
    ipcDetail: "A63"
    name: "创造性-审查标准-体育娱乐"
    keyPoints:
      - "区别被公开或属公知常识且显而易见，不具备创造性"
    tips:
      - "游戏装置（A63F）领域的结构改进空间有限，撰写时应着重突出与现有技术的本质差异，避免被认定为公知常识的简单应用。"
      - "玩具类产品（A63H）的结构改进通常涉及已知技术要素的组合，代理人应在撰写时重点论述各要素之间的协同作用和非常规组合效果。"
      - "运动器材（A63B）领域中，非常规的结构设计若能产生有益效果，创造性论证的成功率较高，但需注意其他权利要求的保护强度。"
      - "体育训练器材中常见的手柄形状、配重方式、支撑结构等改进容易被认定为公知常识，撰写时应着重强调非常规的技术手段。"
      - "运动器材的连接方式和固定结构的等效替换难以获得创造性保护，应寻求非常规的技术路径。"
    source: "宝宸知识库-复审无效/创造性/创造性-审查标准-体育娱乐.md"
  - id: "创造性-供热通风-F24"
    article: "patent-law-a22.3"
    ipcSection: "F"
    ipcDetail: "F24"
    name: "创造性-审查标准-供热通风"
    keyPoints:
      - "区别特征被其他现有技术公开且作用相同则构成技术启示"
    tips:
      - "本案涉及热水循环系统的无线控制技术。合议组将证据1（智能家居热水循环系统）与证据2（公共浴室节水系统）结合，认定区别特征已被公开。在无效答辩中，专利权人应着重论证区别特征在功能和技术效果上的特殊性，避免仅强调结构细节差异。"
      - "部分无效决定展示了创造性判断中\"结构不同\"与\"功能相同\"之间的精细区分。专利权人在权利要求中限定具体的结构关系（如插槽固定方式），可以在无效程序中保留有价值的权利。"
      - "本案体现了\"技术启示\"判断的精确性要求。证据5关注的是交错防护，而本专利解决的是关闭时遮挡拼缝的技术问题，两者关注点不同，不能认定为存在技术启示。撰写时应在说明书中明确记载每个特征解决的具体技术问题。"
      - "专利权人主张本专利是\"小型\"空调系统，冷却水不循环，与证据1的\"大型\"系统不同。合议组认定空调系统采用循环或非循环冷却水与\"大型\"\"小型\"无直接关系。专利代理人在撰写时应避免以产品规格作为技术特征，而应聚焦于具体的技术手段差异。"
      - "本案涉及韩国专利文献与中国专利文献的组合使用。合议组将韩国格栅的弹性连接方式与中国地埋式空调格栅结构结合，认定不具备创造性。说明在全球化技术背景下，跨国文献组合审查已成常态。"
    source: "宝宸知识库-复审无效/创造性/创造性-审查标准-供热通风.md"
  - id: "创造性-光学-G02"
    article: "patent-law-a22.3"
    ipcSection: "G"
    ipcDetail: "G02"
    name: "创造性-审查标准-光学"
    keyPoints:
      - "区别特征未被公开且非常用手段，难以得到，具备创造性"
    tips:
      - "光学元件领域的非常规结构设计若能体现与现有技术的本质差异且难以从现有技术中推导得出，创造性论证的成功率较高。"
      - "光学系统中常见的参数调整和元件选择若无法超出常规设计范畴，创造性难以成立，应注重体现非常规的光学设计路径。"
      - "眼镜类产品（G02C）的技术改进空间有限，涉及镜片形状、镜架结构等方面的变化通常被认定为常识性选择。"
      - "在无效答辩中，应仔细分析请求人援引的对比文件是否在具体实施例中真正公开了区别特征，概括性描述不足以认定公开。"
      - "技术启示的判断应从现有技术整体出发，而非仅关注某一篇对比文件。代理人应注重分析多篇对比文件之间的结合可能性和结合障碍。"
    source: "宝宸知识库-复审无效/创造性/创造性-审查标准-光学.md"
  - id: "创造性-其他电技术-H05"
    article: "patent-law-a22.3"
    ipcSection: "H"
    ipcDetail: "H05"
    name: "创造性-审查标准-其他电技术"
    keyPoints:
      - "区别被公开且存在技术启示，不具备创造性"
    tips:
      - "印刷电路板（H05K）领域的布局优化改进若已被现有技术公开且存在技术启示，难以获得创造性保护。撰写时应着重体现非常规的设计理念和独特的技术效果。"
      - "电热器件（H05B）领域中的材料替换和温度控制方式改进容易被认定为公知常识，撰写时应重点论述技术效果的非显而易见性。"
      - "印刷电路板领域中非常规的布线设计或散热结构若能产生有益效果，创造性论证的成功率较高，但需注意整体权利要求的保护强度。"
      - "在撰写权利要求时应避免仅对现有技术进行简单的参数调整或部件替换，而应注重体现技术方案的整体创新性。"
      - "电热器件中常规的加热方式和安全保护措施等属于公知常识，撰写时应着重强调非常规的技术手段和意想不到的技术效果。"
    source: "宝宸知识库-复审无效/创造性/创造性-审查标准-其他电技术.md"
  - id: "创造性-农业-A01"
    article: "patent-law-a22.3"
    ipcSection: "A"
    ipcDetail: "A01"
    name: "创造性-审查标准-农业"
    keyPoints:
      - "现有技术给出结合启示且无预料不到效果，不具备创造性"
    tips:
      - "代理人在撰写时应充分论述区别技术特征带来的技术效果，同时在答复无效时需注意对方可能提供的新证据组合。"
      - "农业收割设备领域结构改进空间有限，撰写时应着重突出与现有技术的本质差异和非常规的技术效果。"
      - "代理人在无效答辩中应充分利用对比文件之间的结构差异论证结合障碍，这是农业机械领域常见的有效答辩策略。"
      - "撰写时对自创或非通用术语应在说明书中给出明确定义，避免在确权和无效程序中产生解释争议。"
      - "农业耕作设备的技术改进若仅为现有技术特征的简单替换或组合，难以获得创造性保护。"
    source: "宝宸知识库-复审无效/创造性/创造性-审查标准-农业.md"
  - id: "创造性-化工工艺-B01"
    article: "patent-law-a22.3"
    ipcSection: "B"
    ipcDetail: "B01"
    name: "创造性-审查标准-化工工艺"
    keyPoints:
      - "区别被公开且存在技术启示并属常规，不具备创造性"
    tips:
      - "分离技术（B01D）领域中常见的膜材料和过滤方式改进若已被公开且存在技术启示，难以获得创造性保护。撰写时应着重体现非常规的技术路径。"
      - "催化剂（B01J）领域中新型催化剂组成设计和独特的制备方法若能产生有益效果，创造性论证的成功率较高，但需注意整体权利要求的保护强度。"
      - "分离技术领域中常见的工艺参数调整和设备配置变化容易被认定为公知常识，撰写时应着重强调非常规的技术手段和意想不到的技术效果。"
      - "催化剂领域中已知催化组分的组合和常规制备工艺的调整难以获得创造性保护，应注重体现组分的协同效应和制备方法的独特性。"
      - "混合与搅拌（B01F）领域中常见的搅拌方式和混合比例调整属于公知常识，撰写时应着重体现非常规的混合工艺和出乎意料的技术效果。"
    source: "宝宸知识库-复审无效/创造性/创造性-审查标准-化工工艺.md"
  - id: "创造性-医药-A61"
    article: "patent-law-a22.3"
    ipcSection: "A"
    ipcDetail: "A61"
    name: "创造性-审查标准-医药"
    keyPoints:
      - "区别技术特征未被公开且非公知常识，具备创造性"
    tips:
      - "本案涉及阿斯利康的SGLT2抑制剂与二甲双胍复方双层片剂。对于药物制剂专利，请求人常以临床试验注册网站的网络证据作为最接近现有技术。本案明确了当网络证据存在关键内容不一致、公开时间无法确认时，不能用于评价创造性。在无效答辩中，专利权人应重点关注请求人证据的真实性和公开性，特别是网络证据的版本一致性问题。"
      - "本案涉及微电流美容面膜的连接件结构创新。合议组认定连接件（包括连通层和封装层的多层结构）这一区别技术特征未被任何对比文件公开，也不属于公知常识，且使得面膜微电流作用更加均匀。在医药美容器械领域，结构创新即使看似简单，只要未被现有技术公开并能带来有益效果，即可获得创造性保护。专利撰写时应充分描述结构特征的技术效果。"
      - "本案涉及医疗设备远程控制技术，合议组详细分析了本地控制系统改造为远程控制系统的技术路径。独立权利要求1-4因证据组合给出了远程控制的技术启示而被宣告无效，但权利要求5（操纵杆顶端设置拍摄按钮）因未被公开且方便医生操作而维持有效。这表明在医疗器械领域，即便是小的操作便利性改进，只要未被现有技术公开，也可能获得保护。"
      - "本案涉及牙齿正畸托槽的弓丝自锁结构。关键争议在于\"S\"形嵌入区是否被证据公开及是否属于公知常识。合议组认定证据1的螺旋形通道不等于\"S\"形，弓丝移动轨迹的弯折也不等同于嵌入区呈\"S\"形的客观结构。在医疗器械创造性判断中，应当严格区分\"客观存在的结构特征\"与\"使用过程中产生的动态效果\"，这一区分对专利撰写和无效答辩均具有重要指导意义。"
      - "本案涉及美容医疗器械的\"定位组件\"特征。合议组认为请求人引用的证据2中的连接件仅用于浇注过程中临时固定液体容器，与本专利定位组件在使用状态下持续起定位稳固作用完全不同，因此无法给出技术启示。这表明在医药器械创造性判断中，不仅要比较结构特征的相似性，更要分析其在整体技术方案中的实际功能和作用方式。"
    source: "宝宸知识库-复审无效/创造性/创造性-审查标准-医药.md"
  - id: "创造性-印刷-B41"
    article: "patent-law-a22.3"
    ipcSection: "B"
    ipcDetail: "B41"
    name: "创造性-审查标准-印刷"
    keyPoints:
      - "区别特征未被公开+无动机+非公知常识+有益效果→具备创造性"
    tips:
      - "在喷墨打印、激光打印等印刷机构领域，\"无动机+非公知常识+有益效果\"三要件同时满足时创造性论证最为有力。即使案件最终被宣告无效，创造性成立部分的认定为类似技术方案的撰写和答辩提供了重要参考。"
      - "在印刷机构领域，墨路系统、喷头结构、送纸机构等核心部件的技术改进空间有限。\"被公开或属常规+无预料不到效果\"是否定创造性的典型路径。专利撰写时应着重论证技术改进带来的特定效果。"
      - "在打印设备领域，技术启示的存在是判断创造性的关键。当多篇对比文件分别公开了不同技术特征且存在结合动机时，技术方案的整体难以获得创造性保护。"
      - "在制版工艺（如丝网制版、凹版制版）领域，制版流程中的感光、显影、蚀刻等步骤的技术手段已相当成熟，属于行业常规。技术方案的创新应跳出常规流程的框架，在工艺参数、材料选择或步骤顺序上寻求实质性突破。"
      - "该决定确立了印刷器材领域\"简单拼凑叠加\"的判断标准。在印章、标印器具等领域，如果技术方案仅是将几种已知的印章结构或印刷方式简单组合在一起，且各结构之间不存在功能上的协同作用，则难以获得创造性。专利撰写时应着力论证各部件之间的功能互动和协同效果。"
    source: "宝宸知识库-复审无效/创造性/创造性-审查标准-印刷.md"
  - id: "创造性-发电变电配电-H02"
    article: "patent-law-a22.3"
    ipcSection: "H"
    ipcDetail: "H02"
    name: "创造性-审查标准-发电变电配电"
    keyPoints:
      - "区别特征被其他现有技术公开且作用相同——不具备创造性"
    tips:
      - "实用新型创造性审查中，即使存在多个区别特征，仍需逐一判断每个特征是否被公开或属公知常识，同时关注特征间是否存在结合启示。"
      - "专利代理人在撰写时应明确突出发明点，有助于在无效程序中使审查员聚焦于真正的技术贡献。"
      - "电机领域结构类权利要求若区别特征仅在已有技术中进行了常规替换，则创造性难以成立。"
      - "若能证明区别特征既未被公开又不属公知常识，创造性论证成功的概率较高。"
      - "电力线路铺设类技术方案中，区别特征常被认定为公知常识，撰写时应着重强调非常规设计带来的预料不到效果。"
    source: "宝宸知识库-复审无效/创造性/创造性-审查标准-发电变电配电.md"
  - id: "创造性-喷射-B05"
    article: "patent-law-a22.3"
    ipcSection: "B"
    ipcDetail: "B05"
    name: "创造性-审查标准-喷射"
    keyPoints:
      - "部分被公开+部分属公知常识的叠加否定"
    tips:
      - "涂覆设备领域的\"部分公开+部分公知\"否定模式极为普遍。专利撰写时应尽量将核心技术特征整合为一个不可分割的整体，避免被逐个攻破。"
      - "当权利要求包含多个区别特征时，需要分别论证每个区别特征的创造性贡献。专利撰写时应注重描述多个特征之间的协同配合，形成整体性的技术贡献。"
      - "喷嘴和喷枪产品是喷射领域最为常见的专利客体。由于该类产品技术发展成熟，单纯的喷嘴结构改进很难满足创造性要求，应注重喷嘴与其他部件的配合创新。"
      - "工业用雾化器虽然技术含量较高，但其核心结构（如离心盘、流道设计）往往已被现有技术充分公开。创造性论证应关注雾化器在特定工业应用中的非常规设计选择。"
      - "发泡枪、喷胶枪等手持喷射工具的技术方案相对简单，市场上有大量现有技术。专利申请应避免对已知结构的简单变形。"
    source: "宝宸知识库-复审无效/创造性/创造性-审查标准-喷射.md"
  - id: "创造性-土层开采-E21"
    article: "patent-law-a22.3"
    ipcSection: "E"
    ipcDetail: "E21"
    name: "创造性-审查标准-土层开采"
    keyPoints:
      - "区别未被公开+无启示+非公知常识+有益效果→具备创造性"
    tips:
      - "在矿井支护、巷道衬砌等采矿技术领域，\"未被公开+无启示+非公知常识+有益效果\"四要件同时满足时创造性论证最为有力。即使案件最终因其他理由被宣告无效，创造性成立部分的认定仍具有独立的参考价值。"
      - "在钻头设计、钻具结构等钻井技术领域，当区别特征被另一篇对比文件公开且作用相同时，技术启示的认定几乎无争议。无效答辩时应着重论证区别特征在本专利中的作用与对比文件中的不同，或证明结合后产生了预料不到的效果。"
      - "在地下工程领域，隧道支护结构、锚杆布置方式等技术手段在国内外已有大量公开文献。技术方案的创新如果仅是已知支护手段的简单替换或惯用组合，难以获得创造性保护。"
      - "\"现有技术+公知常识\"的双重来源认定是钻井设备领域否定创造性的常见模式。当区别特征可以从多个现有技术来源中显而易见地获得时，创造性难以成立。"
      - "在矿井通风、防尘、防爆等安全装置领域，许多技术手段已在相关行业广泛应用。\"无需付出创造性劳动\"标准意味着本领域技术人员基于已有知识水平和设计能力即可想到该方案，这对专利权人的答辩提出了更高的论证要求。"
    source: "宝宸知识库-复审无效/创造性/创造性-审查标准-土层开采.md"
