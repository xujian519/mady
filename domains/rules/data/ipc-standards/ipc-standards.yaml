      []
    source: "宝宸知识库-复审无效/新颖性/新颖性-审查标准-手携物品.md"
  - id: "新颖性-教育密码-G09"
    article: "patent-law-a22.2"
    ipcSection: "G"
    ipcDetail: "G09"
    name: "新颖性-审查标准-教育密码"
    keyPoints:
      - "**区别技术特征与惯用手段置换的界限：** 如果一项权利要求要求保护的技术方案与作为现有技术的证据相比存在区别技术特征，且该区别技术特征不属于惯用手段的直接置换，二者技术方案实质不相同，则该权利要求具备新颖性。\"惯用手段的直接置换\"标准高于\"常用技术手段\"——前者破坏新颖性，后者仅影响创造性。在教育器具领域，许多结构变化容易被误认为是\"惯用替换\"，但只要不属于\"直接置换\"，就应当肯定新颖性（参见第563020号、第563018号、第563017号决定）。"
      - "**证据链的完整性要求：** 在无效宣告程序中，请求人提交的证据必须形成完整的证据链，才能证明现有技术已公开相关技术方案。教学器具领域的产品更新迭代快，使用公开证据的收集和举证要求严格，证据链中任一环节的缺失都可能导致举证失败（参见第20399号决定）。"
      - "**学术会议公开的认定：** 参加某一会议的名额有限定并不等于参加该会议的人员均是特定人员，更不能据此认定该会议属于专利法第24条所述的\"规定的学术会议\"。这一认定在教育密码领域尤其重要，因为教学器材常在教育展会和学术会议上展示（参见第121号决定）。"
    tips:
      []
    source: "宝宸知识库-复审无效/新颖性/新颖性-审查标准-教育密码.md"
  - id: "新颖性-无轨车辆-B62"
    article: "patent-law-a22.2"
    ipcSection: "B"
    ipcDetail: "B62"
    name: "新颖性-审查标准-无轨车辆"
    keyPoints:
      - "**区别特征与惯用手段直接置换的判断：** 权利要求与证据相比存在区别特征时，需要判断该区别是否属于本领域惯用手段的直接置换。若不属于惯用手段的直接置换，则权利要求具备新颖性。（参见第561013号）"
      - "**协同动作机构的创造性判断：** 当某一机构中部件彼此连接协同动作时，关键功能部件的细微改变通常需要对配套部件作配合改造，不能简单将系统性改造认定为常规技术。（参见第580758号）"
      - "**对比文件公开内容的客观确定：** 在确定对比文件公开内容时，不应带着对所需对比的技术方案的理解去解读对比文件，只有本领域技术人员基于文字和附图可以直接、毫无疑义确定的内容才属于公开内容。（参见第560255号）"
    tips:
      []
    source: "宝宸知识库-复审无效/新颖性/新颖性-审查标准-无轨车辆.md"
  - id: "新颖性-机床-B23"
    article: "patent-law-a22.2"
    ipcSection: "B"
    ipcDetail: "B23"
    name: "新颖性-审查标准-机床"
    keyPoints:
      - "**惯用手段直接置换的新颖性判断：** 在使用抵触申请文件评述新颖性时，需判断两者间的差别是否属于惯用手段的直接置换。应当考虑两种技术手段是否均为惯用手段且能达到相同技术效果；若无对应技术手段、或手段本身非惯用、或效果不同，则不应视为直接置换。（参见第266001号）"
      - "**公开使用证据链的完整要求：** 在无效宣告程序中，主张因申请日前公开状态而不具备新颖性的请求人，应提供完整的证据链来证明其主张，没有证据或证据不足的应承担不利后果。（参见第561351号）"
      - "**区别特征与创造性否定：** 权利要求与最接近现有技术存在区别技术特征，但该区别仅为本领域技术人员无需创造性劳动即可获得、且未带来预料不到的技术效果的，权利要求不具备创造性。（参见第282001号）"
    tips:
      []
    source: "宝宸知识库-复审无效/新颖性/新颖性-审查标准-机床.md"
  - id: "新颖性-水利工程-E02"
    article: "patent-law-a22.2"
    ipcSection: "E"
    ipcDetail: "E02"
    name: "新颖性-审查标准-水利工程"
    keyPoints:
      - "**区别技术特征与技术启示判断**：在判断一项权利要求的创造性时，首先要将权利要求请求保护的技术方案和最接近的现有技术进行特征对比并找出区别技术特征，进而考察现有技术中是否给出将上述区别技术特征应用到该最接近的现有技术以解决其存在的技术问题的启示，若存在这种启示，则权利要求的技术方案相对于现有技术是显而易见的（第561227号、第561209号决定）。"
      - "**权利要求技术领域的确定**：如果权利要求所要求保护的技术方案基于其自身功能可以在多种不同应用场景中使用，在权利要求未限定应用场景的情况下，则不能将该权利要求所要求保护方案的技术领域认定为属于说明书中所列出的具体应用场景的领域，而应认定为该技术方案本身所属的技术领域（第569137号决定）。"
      - "**使用公开与现有技术认定**：使用公开是指通过制造、使用、销售、进口等方式使公众能够了解该技术方案的内容。如果证据能够证明某项技术方案在申请日前已通过使用公开方式为公众所知，则该技术方案构成现有技术，可用于评价专利的新颖性（第17109号决定）。"
    tips:
      []
    source: "宝宸知识库-复审无效/新颖性/新颖性-审查标准-水利工程.md"
  - id: "新颖性-泵-F04"
    article: "patent-law-a22.2"
    ipcSection: "F"
    ipcDetail: "F04"
    name: "新颖性-审查标准-泵"
    keyPoints:
      - "**技术方案实质相同则不具备新颖性**：如果某一项权利要求所限定的技术方案与某一现有技术所公开的技术方案相比，技术领域、所解决的技术问题、技术方案和预期效果实质上相同，则认为二者为同样的发明或者实用新型，该权利要求所限定的技术方案不具有新颖性（第438001号、第561800号决定）。"
      - "**惯用手段直接置换与新颖性**：若证据公开了权利要求的全部技术特征，或证据与权利要求的区别属于惯用手段的直接置换，两者的技术方案实质相同，并解决了相同的技术问题、达到了相同的技术效果，则该权利要求相对于该证据不具备新颖性（第560606号决定）。"
      - "**结合启示与创造性判断**：如果一项权利要求与最接近的现有技术之间存在区别技术特征，现有技术给出了相应的结合启示促使本领域技术人员将该区别技术特征与最接近的现有技术相结合得到权利要求的技术方案，且该区别技术特征并未带来预料不到的技术效果，则该权利要求不具备创造性（第563864号决定）。"
    tips:
      []
    source: "宝宸知识库-复审无效/新颖性/新颖性-审查标准-泵.md"
  - id: "新颖性-测量测试-G01"
    article: "patent-law-a22.2"
    ipcSection: "G"
    ipcDetail: "G01"
    name: "新颖性-审查标准-测量测试"
    keyPoints:
      - "**惯用手段的直接置换与新颖性**：如果权利要求的技术方案与同一技术领域的对比文件相比存在区别，而该区别为本领域的惯用手段的直接置换，且权利要求的技术方案与对比文件实质相同，则不具备新颖性（第560257号决定）。"
      - "**新颖性的法定定义**：新颖性是指在申请日以前没有同样的发明或者实用新型在国内外出版物上公开发表过、在国内使用公开过或者以其他方式为公众所知，也没有同样的发明或者实用新型由他人向国务院专利行政部门提出过申请并且记载在申请日以后公布的专利申请文件中（第560635号决定）。"
      - "**区别特征与创造性联动**：权利要求与最接近现有技术存在区别特征，其他证据虽然公开了可实现相同功能的结构，但该结构与区别特征所限结构并不相同，且不存在结合到最接近现有技术的技术启示，则该权利要求具备创造性（第565592号决定）。"
    tips:
      []
    source: "宝宸知识库-复审无效/新颖性/新颖性-审查标准-测量测试.md"
  - id: "新颖性-照明-F21"
    article: "patent-law-a22.2"
    ipcSection: "F"
    ipcDetail: "F21"
    name: "新颖性-审查标准-照明"
    keyPoints:
      - "**技术方案实质不同的新颖性认定：** 权利要求与对比文件虽属相同技术领域，但若解决的技术问题不同、所能获得的技术效果亦不同，则二者技术方案实质上不同，权利要求具备新颖性。（参见第565966号）"
      - "**区别特征与技术启示的判断：** 权利要求与最接近现有技术相比存在区别特征，但该区别在现有技术中已被给出相应技术启示，对本领域技术人员而言将相应技术手段应用到最接近现有技术中是显而易见的，则不具备创造性。（参见第561197号）"
      - "**公知常识与常规技术手段的认定：** 区别特征属于本领域解决相关技术问题的常规技术手段或公知常识，且未带来预料不到的技术效果的，权利要求不具备创造性。（参见第564699号、第295001号）"
    tips:
      []
    source: "宝宸知识库-复审无效/新颖性/新颖性-审查标准-照明.md"
  - id: "新颖性-燃烧装置-F23"
    article: "patent-law-a22.2"
    ipcSection: "F"
    ipcDetail: "F23"
    name: "新颖性-审查标准-燃烧装置"
    keyPoints:
      - "**技术方案实质相同则不具备新颖性**：如果实用新型专利与证据公开的内容相比，其权利要求所限定的技术方案与证据公开的技术方案实质上相同，所属技术领域的技术人员根据两者的技术方案可以确定两者能够适用于相同的技术领域，解决相同的技术问题，并具有相同的预期效果，则认为两者为同样的实用新型（第560973号决定）。"
      - "**区别特征为常规技术手段则不具备创造性**：如果一项实用新型与最接近的现有技术之间存在区别特征，而该区别特征是本领域的常规技术手段，则该实用新型不具有实质性特点（第560576号决定）。"
      - "**全部技术特征被公开则丧失新颖性**：如果一项权利要求的全部技术特征都被相同领域的某现有技术公开，二者的技术领域、技术方案、解决的技术问题和预期效果均相同，则该权利要求不具备新颖性（第38387号决定）。"
    tips:
      []
    source: "宝宸知识库-复审无效/新颖性/新颖性-审查标准-燃烧装置.md"
  - id: "新颖性-电子通信-H04"
    article: "patent-law-a22.2"
    ipcSection: "H"
    ipcDetail: "H04"
    name: "新颖性-审查标准-电子通信"
    keyPoints:
      - "**未公开全部技术特征的新颖性认定：** 对比文件没有公开权利要求的全部技术特征，且区别特征未被其他现有技术公开、未给出技术启示、亦非公知常识，同时带来有益效果的，权利要求具备新颖性和创造性。（参见第563222号）"
      - "**区别特征与惯用技术手段的判断：** 针对权利要求与最接近现有技术间的区别特征，若其他对比文件已公开或给出技术启示，或属于本领域惯用技术手段，则权利要求不具备创造性。（参见第566331号）"
      - "**技术用语不同时的实质比对：** 当现有技术和本专利涉及的技术用语表述不同时，应站位所属领域技术人员，以现有技术整体方案为基础，结合说明书和附图客观确定其所表达的含义。（参见第561017号）"
    tips:
      []
    source: "宝宸知识库-复审无效/新颖性/新颖性-审查标准-电子通信.md"
  - id: "新颖性-织物处理-D06"
    article: "patent-law-a22.2"
    ipcSection: "D"
    ipcDetail: "D06"
    name: "新颖性-审查标准-织物处理"
    keyPoints:
      - "**附图公开内容的认定标准：** 在考量现有技术附图是否公开权利要求的技术特征时，需将附图内容结合于整体技术方案中综合考量，若附图公开内容无法达到本领域技术人员能直接地、毫无疑义地确定的程度，则不能认定公开了所述技术特征。（参见第560222号）"
      - "**创造性判断的三步法适用：** 首先对比权利要求与最接近现有技术找出区别特征，根据区别特征确定实际解决的技术问题，再考察现有技术中是否存在引入区别特征的技术启示。（参见第566302号、第562891号）"
      - "**替代方案与创造性的关系：** 当实用新型实际解决的技术问题是提供已知问题的替代方案时，若现有技术未给出技术启示使本领域技术人员能显而易见地获得该方案，则具备创造性。（参见第565280号）"
    tips:
      []
    source: "宝宸知识库-复审无效/新颖性/新颖性-审查标准-织物处理.md"
  - id: "新颖性-计算-G06"
    article: "patent-law-a22.2"
    ipcSection: "G"
    ipcDetail: "G06"
    name: "新颖性-审查标准-计算"
    keyPoints:
      - "**区别技术特征的惯用手段置换判断：** 一项权利要求与对比文件之间存在区别技术特征，且上述区别技术特征不属于本领域惯用技术手段的直接置换，则该权利要求与该对比文件的技术方案实质上并不相同，该权利要求具备新颖性。在计算领域，硬件接口的替换、数据处理步骤的调整是否构成\"惯用手段的直接置换\"是判断新颖性的关键（参见第561270号决定）。"
      - "**电商平台上电子证据的公开时间认定：** 天猫等电商平台同一链接下商品页面内容可由卖家随时修改且不留痕迹，因此用户评价时间不能直接作为商品页面中图片和文字的公开时间。在无其他证据佐证的情况下，合议组无法确认电子证据的公开时间。计算领域产品更新快、电商销售普遍，电子证据的公开时间认定是该领域的特有审查难题（参见第560840号决定）。"
      - "**全部技术特征公开原则：** 如果一篇对比文件中公开了权利要求的全部技术特征，并且二者属于相同的技术领域、采用实质上相同的技术方案，则该权利要求不具备新颖性。RFID标签、电子支付系统等计算领域产品的技术方案可能被专利文献、技术标准、产品手册等多种形式的证据公开（参见第20004号、第19998号、第19770号决定）。"
    tips:
      []
    source: "宝宸知识库-复审无效/新颖性/新颖性-审查标准-计算.md"
  - id: "新颖性-车辆通用-B60"
    article: "patent-law-a22.2"
    ipcSection: "B"
    ipcDetail: "B60"
    name: "新颖性-审查标准-车辆通用"
    keyPoints:
      - "**技术方案相同则不具备新颖性**：如果一项权利要求所请求保护的技术方案与现有技术的一项技术方案相比，两者技术领域相同、技术方案相同、能够解决相同的技术问题并达到相同的技术效果，则该项权利要求相对于现有技术不具备新颖性（第561020号决定）。"
      - "**惯用手段的直接置换**：权利要求所要求保护的技术方案与最接近的现有技术之间存在区别技术特征，如果该区别技术特征属于所属技术领域的惯用手段的直接置换，则该权利要求不具备新颖性（第560070号决定）。"
      - "**区别特征并非惯用手段则具备新颖性**：本专利与证据虽然实现相同的目的，但采用了不同的结构，导致权利要求与证据相比存在区别特征，且该区别特征并非本领域惯用手段的直接置换，则该权利要求相对于该证据具备新颖性（第565933号决定）。"
    tips:
      []
    source: "宝宸知识库-复审无效/新颖性/新颖性-审查标准-车辆通用.md"
  - id: "新颖性-输送包装-B65"
    article: "patent-law-a22.2"
    ipcSection: "B"
    ipcDetail: "B65"
    name: "新颖性-审查标准-输送包装"
    keyPoints:
      - "**惯用手段直接置换的认定：** 是否属于惯用手段的直接置换，需要综合考虑两种手段的功能和作用是否相同、是否为申请日前同一技术领域在解决同一技术问题时熟知和经常使用的手段、作出替换时是否会对整体技术方案的其它部分作出改变等多个因素（参见第259001号决定）。"
      - "**新颖性的独立判断地位：** 若权利要求所要求保护的技术方案与现有技术存在区别特征，且在案证据不足以表明该区别特征属于本领域惯用手段的直接置换，则该权利要求相对于该现有技术具备新颖性（参见第259001号决定）。"
      - "**公知常识的认定要素：** 认定区别特征属于公知常识需要考虑两个因素：本领域是否存在以相同技术手段解决相同技术问题的技术事实，以及本领域技术人员是否广泛知晓该技术事实（参见第560130号决定）。"
    tips:
      []
    source: "宝宸知识库-复审无效/新颖性/新颖性-审查标准-输送包装.md"
  - id: "新颖性-金属加工-B21"
    article: "patent-law-a22.2"
    ipcSection: "B"
    ipcDetail: "B21"
    name: "新颖性-审查标准-金属加工"
    keyPoints:
      - "**主题名称对保护范围的限定作用**：确定权利要求的保护范围时应当考虑权利要求书中包括主题名称在内的所有技术特征。如果该主题名称的限定隐含了或者导致了要求保护的产品具有某种特定的结构、组成、工艺等，则该限定的主题名称对于权利要求保护范围的确定具有明确的限定作用（第564531号决定）。"
      - "**技术领域、方案、问题、效果均相同则不具备新颖性**：一项权利要求如果与现有技术相比，二者的技术领域、技术方案、要解决的技术问题和所取得的技术效果均相同，则该权利要求不具备新颖性（第564249号决定）。"
      - "**使用公开证据的认定**：域外使用公开类证据必须履行完整的公证认证手续，并应同时提供其他证据予以佐证。若证据之间同一性的关联仅凭证人证言来证明，而证人未出庭接受质证，则该证据不能单独作为认定案件事实的依据（第21039号、第59080号决定）。"
    tips:
      []
    source: "宝宸知识库-复审无效/新颖性/新颖性-审查标准-金属加工.md"
  - id: "新颖性-门窗-E06"
    article: "patent-law-a22.2"
    ipcSection: "E"
    ipcDetail: "E06"
    name: "新颖性-审查标准-门窗"
    keyPoints:
      - "**区别技术特征未被公开则具备创造性**：如果权利要求相对于一篇证据存在区别技术特征，且该区别技术特征既未被其他证据公开，也没有被其他证据给出相应的技术启示，并取得了有益的技术效果，在无证据表明该区别技术特征为本领域公知常识的情况下，该权利要求具备创造性（第560250号决定）。"
      - "**区别属于公知常识则不具备创造性**：如果一项权利要求与作为最接近现有技术的证据相比存在多个区别，但该些区别均属于本领域公知常识，现有技术整体上给出了将上述内容相结合以解决其技术问题的技术启示，则该权利要求不具备创造性（第560893号决定）。"
      - "**申请日前公开销售导致丧失新颖性**：本专利产品在申请日前已公开销售，因而缺乏新颖性。使用公开是破坏新颖性的重要方式之一，即使技术方案本身未被书面文献记载，只要通过制造、使用、销售等方式使公众能够了解该技术方案的内容，即构成使用公开（第361号决定）。"
    tips:
      []
    source: "宝宸知识库-复审无效/新颖性/新颖性-审查标准-门窗.md"
  - id: "新颖性-门窗锁具-E05"
    article: "patent-law-a22.2"
    ipcSection: "E"
    ipcDetail: "E05"
    name: "新颖性-审查标准-门窗锁具"
    keyPoints:
      - "**全部技术特征公开原则：** 当一份现有技术公开了权利要求的全部技术特征，且二者技术方案实质上相同，属于相同技术领域并解决相同技术问题，则该权利要求不具备新颖性。在门窗锁具领域，许多专利涉及锁体结构、执手形状、插销机构等具体构造，审查时需逐一比对结构特征的对应关系（参见第661号决定）。"
      - "**技术特征整体比对原则：** 在进行技术特征比对时，应当从技术方案的整体出发，综合考虑技术特征在技术方案中的作用，从而正确认定二者的异同，不应简单依据特征的表面表述或名称进行判断。门窗锁具领域中，同一功能可通过不同结构实现，因此不能仅因名称不同就认定特征不同（参见第566061号、第36001号决定）。"
      - "**抵触申请认定：** 一份由他人在本专利申请日之前向专利局提出并在本专利申请日之后公开的专利文件，若公开了相同技术方案，则构成抵触申请，破坏新颖性。门窗插销、锁具等领域产品更新快，抵触申请的认定尤为常见（参见第576号决定）。"
    tips:
      []
    source: "宝宸知识库-复审无效/新颖性/新颖性-审查标准-门窗锁具.md"
  - id: "新颖性-抵触申请-G06计算-G06"
    article: "patent-law-a22.2"
    ipcSection: "G"
    ipcDetail: "G06"
    name: "新颖性-抵触申请-G06计算"
    keyPoints:
      - "在先申请（申请日在前、公开日在后）技术方案实质上相同 → 构成抵触申请，不具备新颖性"
      - "抵触申请全文公开技术方案（含说明书、附图） → 破坏新颖性"
      - "技术方案被抵触申请完全公开 → 不符合新颖性规定"
      - "区别仅为惯用手段的直接置换 → 不具备新颖性"
      - "技术方案与对比文件实质上不相同 → 具备新颖性"
    tips:
      - "计算机外设领域，抵触申请的认定采用\"四相同\"标准（技术领域、技术问题、技术方案、预期效果）。在专利布局时，应充分检索申请日前的在先申请，避免与尚未公开的在先申请构成抵触。"
      - "在判断抵触申请时，可以引用的范围包括在先申请的全文内容（权利要求书、说明书、附图）。这意味着即使权利要求书文字表述不同，只要说明书公开了相同技术方案，仍可构成抵触申请。"
      - "记忆卡等计算机存储设备领域，抵触申请的审查标准明确：只要技术方案被完全公开，即破坏新颖性。专利权人在申请前应进行全面的在先申请检索。"
      - "计算机硬件散热领域，惯用手段的直接置换不构成新颖性。专利撰写时应注意避免使用本领域技术人员容易想到的替代方案。"
      - "计算机输入设备领域，抵触申请的构成要件明确：申请日在前、公告日在后、技术方案相同。键盘、鼠标等外设的专利布局需特别关注时间节点的冲突。"
    source: "宝宸知识库-复审无效/新颖性/新颖性-抵触申请-G06计算.md"
  - id: "新颖性-相同与实质相同-A61医药-A61"
    article: "patent-law-a22.2"
    ipcSection: "A"
    ipcDetail: "A61"
    name: "新颖性-相同与实质相同-A61医药"
    keyPoints:
      - "全部技术特征被现有技术公开，技术领域/问题/效果相同 → 不具备新颖性"
      - "制药用途的疾病和疗效被现有技术公开 → 不具备新颖性"
      - "制备方法差异导致产品结构/组成改变 → 具备新颖性"
      - "隐含公开内容可直接、毫无疑义地确定 → 可用于新颖性判断"
      - "技术方案与现有技术实质上不同 → 具备新颖性"
      - "产品权利要求与对比文件技术方案实质上相同 → 不具备新颖性"
      - "区别特征属于本领域常规选择 → 不具备创造性"
    tips:
      - "在医药器械领域，如果现有技术已完整公开权利要求的全部技术特征，且技术领域、技术问题和技术效果均相同，则新颖性难以维持。专利权人在撰写时应注意突出与现有技术的实质性区别。"
      - "瑞士型制药用途权利要求的新颖性判断关键在于疾病和治疗效果是否被现有技术公开。在专利布局时，应充分检索现有技术中关于药物适应症和疗效的记载。"
      - "中药制剂专利中，制备方法特征可能为产品权利要求带来新颖性。说明书应充分记载制备工艺差异如何导致产品结构和/或组成的改变。"
      - "口腔医疗器械领域同样适用\"同样的发明创造\"标准，撰写时应确保技术方案与现有技术存在实质性差异。"
      - "中药复方专利的新颖性审查强调单独对比原则，权利要求的保护范围必须清楚界定，才能准确进行新颖性判断。"
    source: "宝宸知识库-复审无效/新颖性/新颖性-相同与实质相同-A61医药.md"
