    ipcDetail: "H01"
    name: "新颖性-审查标准-基本电气元件"
    keyPoints:
      - "**实质相同判断：** 当一份证据公开了权利要求的全部技术特征，且两者的技术领域相同，采用实质上相同的技术方案，解决了相同的技术问题，并获得了相同的技术效果，则该权利要求不具备新颖性（参见第561396号、第566581号、第560047号决定）。"
      - "**技术方案实质不同的新颖性维持：** 当权利要求与现有技术相比其技术方案实质上不同，则该权利要求具备新颖性（参见第565483号决定）。"
      - "**技术启示与创造性判断的区分：** 区别技术特征是否被其他现有技术公开或属于本领域公知常识，是创造性判断的范畴，而新颖性判断仅关注技术方案是否实质相同（参见第568647号、第560254号决定）。"
