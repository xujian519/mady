  - id: "创造性-水利工程-E02"
    article: "patent-law-a22.3"
    ipcSection: "E"
    ipcDetail: "E02"
    name: "创造性-审查标准-水利工程"
    keyPoints:
      - "区别被公开且属常规技术手段时不具备创造性"
    tips:
      - "在河道治理等水利工程建设领域，技术方案往往是对已知治理手段的组合应用。当各技术手段已被分别公开且存在结合启示时，创造性难以成立。专利撰写应突出组合方式的非常规性或组合后产生的协同效果。"
      - "\"部分公开+其余公知常识+无预料不到效果\"是水利工程领域最常见的否定创造性模式。专利权人在答辩时应重点论证未被公开的部分区别特征的技术贡献，以及整体方案是否产生了预料不到的技术效果。"
      - "本案是水利工程领域认定创造性成立的典型案例。\"未被公开+无启示+非公知常识\"三要件同时满足时，创造性成立的论证最为有力。即使在最终被宣告无效的案件中，创造性成立部分的认定也具有独立的参考价值。"
      - "\"作用相同\"是判断技术启示是否存在的核心标准。在基础工程领域，当技术手段在对比文件和专利中解决相同的技术问题、起到相同的作用时，技术启示的成立几乎是必然的。"
      - "在基础工程领域，新颖的施工方法或结构设计如果确实未被现有技术公开且非公知常识，有可能获得创造性认可。有益效果的论证应结合工程实际，以实验数据或工程案例为支撑。"
    source: "宝宸知识库-复审无效/创造性/创造性-审查标准-水利工程.md"
  - id: "创造性-水废水处理-C02"
