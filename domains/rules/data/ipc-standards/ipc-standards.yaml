  - id: "新颖性-塑料成型-B29"
    article: "patent-law-a22.2"
    ipcSection: "B"
    ipcDetail: "B29"
    name: "新颖性-审查标准-塑料成型"
    keyPoints:
      - "**技术方案实质相同性判断：** 如果权利要求的技术方案被现有技术文件公开，两者技术方案实质上相同，属于相同技术领域并解决相同技术问题，则该权利要求不具备新颖性。塑料成型领域的专利多涉及模具结构、成型工艺参数和设备构造，审查时需逐一比对模具型腔结构、进料方式、冷却系统等关键技术特征（参见第37457号、第34941号、第20266号决定）。"
      - "**使用公开的严格证明标准：** 要证明使用公开构成现有技术并破坏专利的新颖性，必须证明以下三方面内容：第一，使用行为发生在申请日之前；第二，使用行为导致了技术方案内容的公开；第三，公众能够从该使用行为中获知技术方案的全部内容。塑料制品的生产和销售行为较为常见，但证明产品所体现的技术方案已为公众所知则较为困难（参见第290号、第20567号、第37239号决定）。"
      - "**鉴定会文件的公开性认定：** 标有\"鉴定会\"字样的文件，通常情况下只能由公众中参加鉴定会的人阅读，而鉴定会参加人员属于特定人员范围，因此鉴定会文件一般不构成专利法意义上的公开。在橡胶、塑料等传统工业领域，鉴定会曾是技术评审的重要形式，相关文件的公开性认定具有实际意义（参见第168号决定）。"
    tips:
      []
    source: "宝宸知识库-复审无效/新颖性/新颖性-审查标准-塑料成型.md"
  - id: "新颖性-家具家电-A47"
    article: "patent-law-a22.2"
