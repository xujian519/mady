  - id: "新颖性-工程元件-F16"
    article: "patent-law-a22.2"
    ipcSection: "F"
    ipcDetail: "F16"
    name: "新颖性-审查标准-工程元件"
    keyPoints:
      - "**技术方案实质相同的认定：** 如果现有技术与本专利权利要求的技术方案实质相同，二者属于相同技术领域，解决相同的技术问题，并具有相同的预期效果，则该权利要求不具备新颖性（参见第561165号决定）。"
      - "**技术启示与新颖性的边界：** 如果权利要求的某些特征被现有证据公开的主张不成立，则在此基础上进一步主张该权利要求不具备新颖性的理由也不成立。新颖性评价以特征是否被完整公开为前提（参见第565952号决定）。"
      - "**证据认定标准：** 如果某书籍已具备公开发行的相关出版社、版次、统一书号等发行印刷信息，在没有相反证据的情形下，可认定该书籍是面向公众发行的正规公开出版物（参见第561165号决定）。"
    tips:
