  - id: "新颖性-互联网公开-A23食品-A23"
    article: "patent-law-a22.2"
    ipcSection: "A"
    ipcDetail: "A23"
    name: "新颖性-互联网公开-A23食品"
    keyPoints:
      - "网络证据无原件、无公证、无公开时间证明 → 真实性和公开性无法确认"
      - "微信私人聊天记录（非公开群组/平台） → 不构成\"为公众所知\""
      - "所有技术特征被现有技术明确或隐含公开 → 不具备新颖性"
      - "区别仅在于参数（常规选择） → 不具备创造性"
      - "转用未产生预料不到的技术效果 → 不具备创造性"
      - "技术方案实质上相同，领域/问题/效果相同 → 不具备新颖性"
    tips:
      - "食品加工设备领域，网络证据作为出版物公开的审查标准严格。请求人使用网络证据时，必须提供原件、公证认证或公开时间的证明；否则，该证据难以被采信。"
      - "虽然本决定为外观设计案件，但其确立的\"为公众所知\"标准同样适用于食品领域的发明和实用新型。社交媒体上的私人分享不构成公开，除非能够证明其处于公众可获知的状态。"
      - "食品加工机械领域，新颖性判断关注技术方案是否被\"明确地或隐含地\"公开。参数限定若属于常规选择，不能为实用新型带来创造性。"
      - "糖果食品领域，从已知可能性中选择而未取得预料不到技术效果的方案不具备创造性。新颖性判断则需确认该选择是否已被现有技术公开。"
      - "豆浆机等食品加工器具领域，转用发明的新颖性判断需确认转用后的技术方案是否已被现有技术公开。若现有技术已公开转用方案，则不具备新颖性。"
    source: "宝宸知识库-复审无效/新颖性/新颖性-互联网公开-A23食品.md"
  - id: "新颖性-使用公开-B23机床-B23"
    article: "patent-law-a22.2"
    ipcSection: "B"
    ipcDetail: "B23"
    name: "新颖性-使用公开-B23机床"
    keyPoints:
      - "公开销售产品达到技术协议要求 → 技术内容已公开"
      - "使用公开证据存在瑕疵，无其他证据印证 → 无法认定使用公开"
      - "现有技术给出相反技术教导 → 具备创造性"
      - "技术方案实质上相同，领域/问题/效果相同 → 不具备新颖性"
      - "现有技术内容存在多种可能性 → 不当然认定特征被公开"
      - "区别特征属于公知常识 → 不具备创造性"
    tips:
      - "机床附件领域，产品的公开销售可导致技术协议内容处于公开状态，从而构成使用公开。企业在产品上市前应评估是否会影响后续专利申请的新颖性。"
      - "焊接设备领域，使用公开的证据链要求严格。请求人主张使用公开时，需提供完整、相互印证的证据；专利权人则可从证据瑕疵角度进行抗辩。"
      - "机床主轴部件领域，现有技术的\"相反教导\"是创造性抗辩的有力武器。新颖性判断则需确认全部技术特征是否已被单一现有技术公开。"
      - "机械连接件领域，\"同样的发明\"判断标准适用于使用公开和出版物公开。技术方案的实质性相同是新颖性判断的核心。"
      - "机床工具领域，现有技术的公开内容必须\"明确记载或隐含公开\"，存在多种可能性的技术内容不当然破坏新颖性。这为专利权人提供了一定的抗辩空间。"
    source: "宝宸知识库-复审无效/新颖性/新颖性-使用公开-B23机床.md"
  - id: "新颖性-出版物公开-H01电气-H01"
    article: "patent-law-a22.2"
    ipcSection: "H"
    ipcDetail: "H01"
    name: "新颖性-出版物公开-H01电气"
    keyPoints:
      - "权利要求与现有技术存在区别特征，技术方案实质上不同 → 具备新颖性"
      - "区别特征不是惯用手段的直接置换 → 具备新颖性"
      - "技术问题、手段、效果均与现有技术相同 → 不具备新颖性"
      - "现有技术公开全部技术特征 → 不具备新颖性"
      - "专利文献公开技术内容存在多种可能性 → 不当然认定特征被公开"
      - "区别仅为用途限定（常规选择） → 不具备创造性"
    tips:
      - "电连接器领域，新颖性判断采用单独对比原则。即使权利要求具备新颖性，仍可能因创造性而被无效。专利权人应同时关注新颖性和创造性的证据链。"
      - "电气元件制造领域，新颖性和创造性的判断紧密衔接：新颖性关注是否为惯用手段直接置换，创造性关注区别特征是否被其他现有技术公开或属于公知常识。"
      - "半导体散热装置领域，新颖性的判断核心是\"实质性不同\"，包括技术问题和技术效果的差异。即使具备新颖性，若现有技术存在结合启示，仍可能因创造性被无效。"
      - "电气连接设备领域，新颖性判断关注\"三相同\"（技术问题、技术手段、技术效果）。值得注意的是，该决定中权利要求虽可能具备创造性，但因其他理由被无效，提示专利权人需全面关注所有无效理由。"
      - "电池材料领域，用途限定通常不能为产品权利要求带来新颖性。产品权利要求的新颖性应基于产品本身的结构、组成等物理化学特征来判断。"
    source: "宝宸知识库-复审无效/新颖性/新颖性-出版物公开-H01电气.md"
  - id: "新颖性-体育娱乐-A63"
    article: "patent-law-a22.2"
    ipcSection: "A"
    ipcDetail: "A63"
    name: "新颖性-审查标准-体育娱乐"
    keyPoints:
      - "**全部技术特征被公开的新颖性否定：** 现有技术公开了权利要求的全部技术特征，且二者属于相同技术领域、解决相同技术问题、达到相同技术效果的，权利要求不具备新颖性。（参见第279001号、第566155号）"
      - "**外文证据的翻译责任：** 请求人对提交的外文证据具有提供中文译文的责任。仅提供部分译文导致不能清楚理解技术方案的，请求人应承担举证不能的不利后果。（参见第560675号）"
      - "**公知常识与创造性判断：** 权利要求相对于最接近现有技术的区别特征属于本领域公知常识的，本领域技术人员有动机将公知常识应用到最接近现有技术以获得权利要求方案的，不具备创造性。（参见第580192号、第563300号）"
    tips:
      []
    source: "宝宸知识库-复审无效/新颖性/新颖性-审查标准-体育娱乐.md"
  - id: "新颖性-供热通风-F24"
    article: "patent-law-a22.2"
    ipcSection: "F"
    ipcDetail: "F24"
    name: "新颖性-审查标准-供热通风"
    keyPoints:
      - "**技术方案被现有技术公开则不具备新颖性**：若一项权利要求的技术方案已被现有技术公开，且两者技术领域相同，能解决相同的技术问题、达到相同的技术效果，则该权利要求不具备新颖性（第560778号、第561504号决定）。"
      - "**区别特征与技术启示联动判断**：权利要求与最接近的现有技术相比存在区别技术特征，若该区别特征被其他现有技术公开且作用相同，或属于本领域常规技术手段，则不具备创造性（第560778号、第561445号决定）。"
      - "**新颖性确认后的创造性递进分析**：若权利要求与最接近的现有技术存在区别特征，两者技术方案实质上不同，则具备新颖性；进一步地，若现有技术中没有给出将区别特征应用到最接近现有技术的技术启示，则也不能认定该权利要求是显而易见的（第560356号决定）。"
    tips:
      []
    source: "宝宸知识库-复审无效/新颖性/新颖性-审查标准-供热通风.md"
  - id: "新颖性-其他电技术-H05"
    article: "patent-law-a22.2"
    ipcSection: "H"
    ipcDetail: "H05"
    name: "新颖性-审查标准-其他电技术"
    keyPoints:
      - "**技术方案实质相同性判断：** 当权利要求的技术方案与对比文件公开的技术方案实质上相同，且二者技术领域、技术解决手段和预期效果都相同时，该权利要求不具备新颖性。在电热器和镇流器等领域，电路结构的比对是新颖性判断的核心，需要逐一比对电路拓扑、元器件参数和连接关系（参见第345号、第18814号、第15397号决定）。"
      - "**区别特征的新颖性与创造性双重审查：** 如果一项权利要求与对比文件存在区别特征，首先审查该区别是否导致技术方案实质不同以判断新颖性；若具备新颖性，再进一步审查现有技术是否给出采用该区别特征的技术启示以判断创造性。这种\"先新颖性后创造性\"的递进审查是标准流程（参见第560205号决定）。"
      - "**使用公开的认定标准：** \"为公众所知\"是指技术方案自身已处于向公众公开的状态，必须使得想要了解该技术的人能够了解。仅有产品销售行为而无法证明技术方案内容已向公众公开，不能认定构成使用公开。电热毯等消费电子产品常涉及此类问题（参见未编号\"一种电热褥控温开关\"决定）。"
      - "**抵触申请的特殊性：** 如果一项专利相对于一篇由他人在本专利申请日之前向国家知识产权局提出并在本专利申请日之后公开的专利申请文件不具备新颖性，且该专利申请文件构成了本专利的抵触申请，则该专利不具备新颖性。PCB板等电子元件领域，同一技术方案被多个主体先后申请的情况较为常见（参见第14656号决定）。"
    tips:
      []
    source: "宝宸知识库-复审无效/新颖性/新颖性-审查标准-其他电技术.md"
  - id: "新颖性-农业-A01"
    article: "patent-law-a22.2"
    ipcSection: "A"
    ipcDetail: "A01"
    name: "新颖性-审查标准-农业"
    keyPoints:
      - "**技术方案实质相同判断**：如果权利要求的技术方案与现有技术实质上相同，且属于相同技术领域、解决相同技术问题、达到相同预期效果，则不具备新颖性（第403001号、第566567号决定）。"
      - "**简单文字变换不具新颖性**：权利要求要求保护的技术方案与现有技术公开的技术内容完全相同，或者仅仅是简单的文字变换，二者属于相同技术领域、解决相同技术问题并预期技术效果相同的，不具备新颖性（第403001号决定）。"
      - "**区别特征与惯用手段直接置换**：若权利要求与现有技术之间存在区别技术特征，但该区别特征属于惯用手段的直接置换，则仍不具备新颖性；若区别特征未被公开且非公知常识，则具备新颖性和创造性（第562973号决定）。"
    tips:
      []
    source: "宝宸知识库-复审无效/新颖性/新颖性-审查标准-农业.md"
  - id: "新颖性-化工工艺-B01"
    article: "patent-law-a22.2"
    ipcSection: "B"
    ipcDetail: "B01"
    name: "新颖性-审查标准-化工工艺"
    keyPoints:
      - "**技术方案实质相同性判断：** 如果一项实用新型要求保护的技术方案已被对比文件公开，二者技术方案实质上相同，则该实用新型不具备新颖性。化工工艺领域的专利多涉及分离装置结构、混合器设计、过滤元件等，审查时需逐一比对设备结构和工艺参数（参见第561043号决定）。"
      - "**区别特征与技术启示的综合判断：** 如果一项权利要求与最接近的现有技术之间存在区别特征，但该区别特征已被另一现有技术所公开或者属于所属技术领域的公知常识，本领域技术人员基于现有技术的启示可显而易见地获得该技术方案，则该权利要求不具备创造性。化工工艺领域的技术发展较为成熟，许多改进属于常规设计或容易想到的变更（参见第568294号、第582654号、第582613号、第582615号决定）。"
      - "**保密技术与公开使用的认定：** 一项以购买方式引进的技术，无论在引进后是否是在保密状态下使用，需要考察引进行为本身是否导致技术方案内容向公众公开。化工工艺领域涉及大量技术引进和转让，使用公开的认定是该领域的常见争议点（参见第262号决定）。"
    tips:
      []
    source: "宝宸知识库-复审无效/新颖性/新颖性-审查标准-化工工艺.md"
  - id: "新颖性-医药-A61"
    article: "patent-law-a22.2"
    ipcSection: "A"
    ipcDetail: "A61"
    name: "新颖性-审查标准-医药"
    keyPoints:
      - "**抵触申请新颖性评价：** 当一项权利要求的技术方案被一份申请在前、公开在后的证据公开，且二者属于相同的技术领域、能够解决相同的技术问题并达到相同的技术效果，则该技术方案不具备新颖性（参见第565340号决定）。"
      - "**产品新颖性的组分判断：** 当产品权利要求限定的组分及其组分含量与对比文件公开的产品组分及其组分含量不同，则二者产品不属于实质相同的产品，该产品权利要求具备新颖性（参见第565225号决定）。"
      - "**证据公开性的前置审查：** 如果证据的公开性存疑，则其不能用于新颖性评价；如果证据并未构成本专利的现有技术，则其不能用于本专利创造性的评价（参见第564166号决定）。"
    tips:
      []
    source: "宝宸知识库-复审无效/新颖性/新颖性-审查标准-医药.md"
  - id: "新颖性-发电变电配电-H02"
    article: "patent-law-a22.2"
    ipcSection: "H"
    ipcDetail: "H02"
    name: "新颖性-审查标准-发电变电配电"
    keyPoints:
      - "**技术方案实质不同则具备新颖性**：如果权利要求相对于对比文件存在区别技术特征，导致二者技术方案实质上并不相同，则权利要求相对于该对比文件具备新颖性（第567508号、第560682号决定）。"
      - "**新颖性与创造性联动判断**：在确认具备新颖性后，需进一步判断区别特征是否被其他对比文件公开或属于公知常识，若非显而易见则具备创造性（第567508号、第568237号决定）。"
      - "**技术领域对结合启示的影响**：权利要求的主题名称限定应用技术领域时，判断对比文件之间的结合启示需考虑对比文件是否属于该技术领域，其工作原理是否相同或给出结合启示（第184001号决定）。"
    tips:
      []
    source: "宝宸知识库-复审无效/新颖性/新颖性-审查标准-发电变电配电.md"
  - id: "新颖性-土层开采-E21"
    article: "patent-law-a22.2"
    ipcSection: "E"
    ipcDetail: "E21"
    name: "新颖性-审查标准-土层开采"
    keyPoints:
      - "**区别技术特征非惯用置换且未被公开则具备新颖性**：如果一项权利要求所限定的技术方案和现有技术公开的技术内容相比，存在区别技术特征，且该区别技术特征不属于惯用手段的直接置换，由此使得两者的技术方案实质上不相同，则该权利要求具有新颖性（第561537号决定）。"
      - "**区别特征为公知常识或被其他现有技术公开则不具备创造性**：若一项权利要求限定的技术方案与最接近的现有技术相比存在区别技术特征，但采用该区别技术特征解决相关技术问题属于本领域的公知常识，而且该区别技术特征也未为该权利要求限定的技术方案带来预料不到的技术效果，则该权利要求不具备创造性（第338001号决定）。"
      - "**多份证据结合显而易见则不具备创造性**：如果一项权利要求请求保护的技术方案与作为最接近现有技术的对比文件相比存在区别技术特征，但是该区别技术特征被其他对比文件和公知常识所公开，并且在该对比文件的基础上结合其他对比文件和公知常识获得该权利要求的技术方案，对本技术领域的技术人员来说是显而易见的，则该项权利要求不具备创造性（第187001号决定）。"
    tips:
      []
    source: "宝宸知识库-复审无效/新颖性/新颖性-审查标准-土层开采.md"
  - id: "新颖性-基本电气元件-H01"
    article: "patent-law-a22.2"
