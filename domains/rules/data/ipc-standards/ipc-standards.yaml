    source: "宝宸知识库-复审无效/新颖性/新颖性-审查标准-工程元件.md"
  - id: "新颖性-房屋建筑-E04"
    article: "patent-law-a22.2"
    ipcSection: "E"
    ipcDetail: "E04"
    name: "新颖性-审查标准-房屋建筑"
    keyPoints:
      - "**抵触申请的区别特征审查：** 一项权利要求与请求人声称的抵触申请相比，如果存在区别技术特征而导致两者的技术方案并不相同，则该权利要求相对于请求人声称的抵触申请不具备新颖性的理由不能成立（参见第560686号决定）。"
      - "**技术方案完全相同的认定：** 如果一项权利要求与最接近的现有技术相比，二者技术领域相同、技术方案相同、解决的技术问题相同、获得的技术效果相同，则该权利要求相对于该现有技术不具备新颖性（参见第560170号决定）。"
      - "**抵触申请的新颖性否定效力：** 一项权利要求与请求人所主张的抵触申请相比，其技术方案相同，并且能够适用相同的技术领域、解决相同的技术问题、并达到相同的预期效果，则该权利要求不具备新颖性（参见第560204号决定）。"
    tips:
      []
    source: "宝宸知识库-复审无效/新颖性/新颖性-审查标准-房屋建筑.md"
  - id: "新颖性-手携物品-A45"
    article: "patent-law-a22.2"
    ipcSection: "A"
    ipcDetail: "A45"
    name: "新颖性-审查标准-手携物品"
    keyPoints:
      - "**区别技术特征未被公开且非常规手段则具备创造性**：如果一项要求保护的技术方案与一份作为最接近现有技术的对比文件相比存在区别技术特征，且其他作为证据的现有技术文件未能表明该区别技术特征已经属于本领域的现有技术，也没有充分理由或证据表明该区别技术特征属于本领域的公知常识，则该要求保护的技术方案具备创造性（第562334号决定）。"
      - "**技术效果相左的技术手段无法结合**：一份现有技术文件中记载了多个技术方案，这些技术方案基于不同的发明构思采用了不同的技术手段，如果某技术手段在其方案中的技术效果与另一技术方案的预期相左，那么该技术手段无法结合到另一方案中以评价本专利的创造性（第562983号决定）。"
      - "**区别特征属于公知常识则不具备创造性**：如果一项权利要求请求保护的技术方案与最接近的现有技术对比文件之间存在区别技术特征，但该区别技术特征属于本领域公知常识，则该权利要求不具备创造性（第565839号决定）。"
