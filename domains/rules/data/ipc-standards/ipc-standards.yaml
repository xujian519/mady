  - id: "修改超范围-综合"
    article: "patent-law-a33"
    ipcSection: "ALL"
    ipcDetail: "ALL"
    name: "修改超范围-审查标准-综合"
    keyPoints:
      - "修改内容可从原文直接导出 → 不超范围"
      - "修改内容在附图中有记载 → 不超范围"
      - "本领域技术人员可唯一确定 → 不超范围"
      - "新增内容无文字记载且不能唯一确定 → 超范围"
      - "补充必要技术特征（说明书中已有） → 不超范围"
      - "修改消除原驳回缺陷 → 允许修改"
      - "修改后请求人撤回无效请求 → 维持有效"
      - "部分内容失实需修改 → 允许（不超范围为前提）"
    tips:
      - "撰写申请时应尽量在说明书中提供充分的技术细节和可替换方案，为后续修改留出空间。"
      - "说明书附图不仅是辅助说明，更是修改依据的重要来源，撰写时应确保附图充分公开。"
      - "\"直接地、毫无疑义地\"标准要求的是唯一确定，而非多种可能的理解。"
      - "修改方式不受限，但修改结果必须满足两个条件：表述清楚、不超范围。"
