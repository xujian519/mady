  - id: "创造性-水泥陶瓷加工-C04"
    article: "patent-law-a22.3"
    ipcSection: "C"
    ipcDetail: "C04"
    name: "创造性-审查标准-水泥陶瓷加工"
    keyPoints:
      - "技术启示判断需考虑技术人员分析推理能力，合乎逻辑分析不能预见则具备创造性"
    tips:
      - "无效答辩中应着重论证本领域技术人员经过合乎逻辑的分析推理后仍不能从现有技术出发预见到技术方案，这是在水泥陶瓷加工领域论证创造性的有效策略。"
      - "石材切割加工（B28D）领域中，若区别特征在其他现有技术中存在明确的技术启示且存在结合动机，创造性难以成立。撰写时应着重强调区别特征的非显而易见性。"
      - "撰写时应对关键技术术语在说明书中给出明确定义，避免在确权和无效程序中因术语理解争议导致不利后果。"
      - "无效答辩中可充分利用\"证据不足以证明公知常识\"这一论点。请求人对公知常识的主张需承担举证责任，举证不足则主张不能成立。"
      - "最接近现有技术的选取是三步法的起点和基础，选取不同可能得出完全不同的结论。答辩中应积极质疑对方选取的最接近现有技术的合理性。"
    source: "宝宸知识库-复审无效/创造性/创造性-审查标准-水泥陶瓷加工.md"
  - id: "创造性-泵-F04"
    article: "patent-law-a22.3"
    ipcSection: "F"
    ipcDetail: "F04"
    name: "创造性-审查标准-泵"
    keyPoints:
      - "区别特征被公开或属公知常识+显而易见 → 不具备创造性"
      - "区别属常规技术手段+效果可预期 → 不具备创造性"
      - "区别特征未被公开+非公知常识 → 具备创造性"
      - "现有技术给出技术启示 → 不具备创造性"
      - "现有技术无启示 → 具备创造性"
      - "区别特征恰恰是其他证据要避免的 → 具备创造性"
      - "区别未被公开+无启示+非公知常识 → 具备创造性"
      - "不应引入使用环境作限缩解释 → 审查方法"
    tips:
      - "在撰写泵类专利时，应确保独立权利要求包含解决技术问题的所有必要技术特征，同时避免将非必要特征写入独立权利要求。"
      - "泵类专利撰写时，与使用环境相关的特征应谨慎处理，不宜过度依赖环境特征来限定保护范围。"
      - "权利要求中使用的技术术语应尽量采用本领域惯用表述，自创术语需在说明书中明确定义。"
      - "在无效答辩中，可以\"事后诸葛亮\"为由质疑对方关于公知常识的主张，要求对方提供公知常识证据。"
      - "往复泵领域的结构改进应注重体现与现有技术的本质差异，避免被认定为简单的常规手段替换。"
    source: "宝宸知识库-复审无效/创造性/创造性-审查标准-泵.md"
  - id: "创造性-测量测试-G01"
    article: "patent-law-a22.3"
    ipcSection: "G"
    ipcDetail: "G01"
    name: "创造性-审查标准-测量测试"
    keyPoints:
      - "现有技术文献中含糊内容的合理解读原则"
    tips:
      - "在三维测量领域的专利撰写中，投影装置的结构（特别是光栅编码方式）是创造性的核心，应当详细描述编码图案与多波长辐射之间的对应关系。无效答辩中应重点论证对比文件未公开的核心结构特征。"
      - "测量方法的创造性判断中，整体技术方案的比对至关重要。即使个别步骤（如测温）与现有技术相似，但如果整体方法所针对的对象、解决的问题和采用的手段不同，可以主张创造性。"
      - "实用新型专利无效答辩中，通过合并从属权利要求的技术特征可以增加区别特征的数量，从而提高创造性论证的成功率。同时应注意论证对比文件中类似部件与涉案专利的技术特征在功能作用上的差异。"
      - "即使基本测量原理相同，只要测试对象和具体实现手段存在差异，且现有技术未给出将原理应用于新对象的启示，仍可主张创造性。专利撰写时应着重描述测量对象与测量手段之间的关联性。"
      - "传感器类专利的创造性通常取决于电极结构和材料选择。在无效答辩中，如果请求人未能充分举证区别特征属于公知常识，应积极主张举证责任分配规则，强调\"谁主张谁举证\"。"
    source: "宝宸知识库-复审无效/创造性/创造性-审查标准-测量测试.md"
  - id: "创造性-热交换-F28"
    article: "patent-law-a22.3"
    ipcSection: "F"
    ipcDetail: "F28"
    name: "创造性-审查标准-热交换"
    keyPoints:
      - "区别特征被公开或属公知常识，作用相同则显而易见"
    tips:
      - "在无效答辩中应注重从整体技术方案的角度论证不存在改进动机，而非仅关注单个区别特征未被公开。"
      - "热交换器结构改进应注重体现整体技术构思的非常规性，避免被认定为特征的简单叠加或常规手段的直接应用。"
      - "撰写时应充分说明技术方案中各特征之间的协同关系和有机结合方式，以反驳\"简单组合\"的无效理由。"
      - "热交换器设计中的常规参数优化难以获得创造性保护，应突出非常规的技术路径或意料之外的技术效果。"
      - "换热器的防垢结构、逆流设计等常见改进，若与现有技术的作用相同，容易被否定创造性。"
    source: "宝宸知识库-复审无效/创造性/创造性-审查标准-热交换.md"
  - id: "创造性-照明-F21"
    article: "patent-law-a22.3"
    ipcSection: "F"
    ipcDetail: "F21"
    name: "创造性-审查标准-照明"
    keyPoints:
      - "区别特征属公知常识且无预料不到效果，不具备创造性"
    tips:
      - "照明灯具配件领域的改进通常涉及多个结构要素，代理人应在撰写时着重论证各要素之间的协同作用和非常规组合效果。"
      - "照明装置中常见的结构改进（如散热、防水、安装方式等）应着重体现非常规的技术手段。"
      - "涉及多个结构要素改进的照明灯具，应注重论证各要素之间的不可分割性和协同效果。"
      - "当多个对比文件分别公开了各区别特征时，答辩中应重点论证结合障碍和技术效果的不可预期性。"
      - "便携式照明设备领域的技术改进空间有限，应注重体现与现有技术的本质差异。"
    source: "宝宸知识库-复审无效/创造性/创造性-审查标准-照明.md"
