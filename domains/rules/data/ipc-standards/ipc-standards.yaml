  - id: "创造性-塑料成型-B29"
    article: "patent-law-a22.3"
    ipcSection: "B"
    ipcDetail: "B29"
    name: "创造性-审查标准-塑料成型"
    keyPoints:
      - "区别特征给出技术启示且无预料不到效果，理由不能成立，具备创造性"
    tips:
      - "塑料成型领域的无效案件中，若请求人无法证明区别特征被现有技术公开或存在技术启示，创造性抗辩的成功率较高，代理人应重点论证区别特征的非显而易见性。"
      - "在涉及新型模具结构或非常规成型方法的案件中，应着重说明该区别特征为何不容易从现有技术中推导得出。"
      - "专利权人在无效程序中通过修改权利要求缩小保护范围是常见的应对策略，修改后的文本若能克服创造性缺陷，请求人可能选择撤回请求。"
      - "塑料成型模具领域的结构创新若能体现与现有技术的本质差异，在创造性判断中具有优势，撰写时应充分描述结构差异及技术效果。"
      - "当区别特征可以在现有技术中找到明确对应时，创造性很难成立。撰写时应注重强调技术特征之间的协同作用和不可预期效果。"
    source: "宝宸知识库-复审无效/创造性/创造性-审查标准-塑料成型.md"
  - id: "创造性-家具家电-A47"
    article: "patent-law-a22.3"
    ipcSection: "A"
    ipcDetail: "A47"
    name: "创造性-审查标准-家具家电"
    keyPoints:
      - "技术特征公开应综合考虑功能、作用与整体技术效果"
    tips:
      - "即使功能相同，若工作原理和技术路线存在本质差异，不能简单认定为被公开。专利代理人在撰写时应充分描述技术方案的工作原理和动态过程，有助于在无效程序中确立创造性的基础。"
      - "当技术方案涉及解决特定使用场景下的特殊技术问题（如电暖桌中传感装置受发热装置影响）时，若证据仅公开了不同场景下的常规方案，不能认定给出了技术启示。撰写时应强调技术方案与特定应用场景之间的关联。"
      - "结构类似但工作方式（如流体方向）不同，且因此产生了不同技术效果的方案，可以具备创造性。专利代理人应注意在说明书中详细描述工作方式带来的技术效果。"
      - "家电领域中将已有部件进行位置调整以获得保护效果，若调整方式属于常规选择且效果可预期，通常难以获得创造性支持。"
      - "在扫地机器人等竞争激烈的技术领域，简单的功能叠加（如在已有驱动轴上加装偏心轮实现振动）通常难以满足创造性要求。"
    source: "宝宸知识库-复审无效/创造性/创造性-审查标准-家具家电.md"
  - id: "创造性-层状产品-B32"
    article: "patent-law-a22.3"
    ipcSection: "B"
    ipcDetail: "B32"
    name: "创造性-审查标准-层状产品"
    keyPoints:
      - "区别特征被其他现有技术公开并给出启示则不具备创造性"
    tips:
      - "层状产品的结构改进应注重体现区别特征的非常规性，避免被认定为已知层结构的简单移植。"
      - "无效答辩中应着重分析区别特征在本专利中的实际作用与现有技术中的不同，这是否定技术启示的有效策略。"
      - "在无效答辩中，若请求人未能充分举证区别特征被公开或属常规手段，应积极主张创造性成立。"
      - "层状产品专利的无效宣告中，证据的充分性至关重要，缺乏证据的创造性否定理由不被支持。"
      - "层状产品专利撰写时应充分检索教材和技术手册，避免权利要求方案被系统性文献覆盖。"
    source: "宝宸知识库-复审无效/创造性/创造性-审查标准-层状产品.md"
