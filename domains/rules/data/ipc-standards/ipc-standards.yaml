  - id: "创造性-手携物品-A45"
    article: "patent-law-a22.3"
    ipcSection: "A"
    ipcDetail: "A45"
    name: "创造性-审查标准-手携物品"
    keyPoints:
      - "实用新型简单叠加，可引用多项现有技术评价创造性"
    tips:
      - "伞具类产品的技术改进往往涉及多个独立的功能模块，若各模块之间缺乏协同作用，容易被认定为简单叠加，撰写时应注重体现各特征之间的配合关系和协同效果。"
      - "理发美容器具领域的技术改进通常涉及多个结构要素的组合，代理人应在撰写时着重论证各要素之间的协同作用和非常规组合效果。"
      - "当区别特征可以在现有技术中找到明确的教导或暗示时，创造性论证需要从结合障碍或预料不到效果角度切入。"
      - "在无效答辩中，若请求人无法举证证明区别特征属于公知常识，专利权人的创造性抗辩成功率较高。代理人应质疑请求人对公知常识的主张。"
      - "当对比文件中明确教导了某技术手段的应用方向时，本领域技术人员容易将其应用于最接近现有技术，创造性难以成立。"
    source: "宝宸知识库-复审无效/创造性/创造性-审查标准-手携物品.md"
  - id: "创造性-教育密码-G09"
    article: "patent-law-a22.3"
    ipcSection: "G"
    ipcDetail: "G09"
    name: "创造性-审查标准-教育密码"
    keyPoints:
      - "区别特征结合常用技术手段容易想到，不具备创造性"
    tips:
      - "显示装置（G09G）领域中，涉及显示驱动电路的常规改进若仅为常用技术手段的组合，创造性难以成立。撰写时应着重体现非常规的电路设计或控制逻辑。"
      - "显示驱动（G09G）领域答辩中，若能证明区别特征未被公开且产生了有益效果，创造性可获认可。但需注意整体权利要求的保护强度。"
      - "教育器具（G09B）领域中，当区别特征满足\"未被公开+非公知常识+有益效果\"三重条件时，创造性可获认可。"
      - "广告/标志装置（G09F）领域中，举证责任的分配对创造性判断结果具有重要影响。请求人需对\"公开\"\"技术启示\"\"公知常识\"均承担举证责任。"
      - "教育器具（G09B）领域中，若技术方案仅为已知部件的简单组合，应着重论证组合后产生的协同效应或预料不到的技术效果。"
    source: "宝宸知识库-复审无效/创造性/创造性-审查标准-教育密码.md"
  - id: "创造性-无轨车辆-B60"
    article: "patent-law-a22.3"
    ipcSection: "B"
    ipcDetail: "B60"
    name: "创造性-审查标准-无轨车辆"
    keyPoints:
      - "区别特征未被公开且非公知常识时具备创造性"
    tips:
      - "创造性判断需逐项分析权利要求，即使部分权利要求具备创造性，其他权利要求仍可能因区别特征被公开或属公知常识而被宣告无效。独立权利要求与从属权利要求的创造性应分别独立判断。"
      - "实用新型创造性判断中技术领域的考量范围相对较窄，但并非绝对限于所属领域。在有明确技术启示的情形下可扩展至相近领域，这与发明创造性判断中的\"相关技术领域\"考量存在程度差异。"
      - "权利要求的保护范围以其记载的内容为准，说明书及附图可以用于解释权利要求，但不能将实施例中的具体限定不当读入权利要求。在创造性判断中，应基于权利要求的文字表述确定技术方案，避免因不当限缩而改变对比结论。"
      - "不同应用领域并非创造性成立的当然理由。当技术需求和技术手段实质相同时，应用领域的转换不足以构成创造性贡献。这体现了\"实质重于形式\"的审查理念。"
      - "技术启示的判断应着眼于对比文件整体所公开的内容和其所起的作用，而非孤立地提取某个特征。对比文件中特征的作用与专利中区别特征的作用是否相同，是判断技术启示的关键因素。"
    source: "宝宸知识库-复审无效/创造性/创造性-审查标准-无轨车辆.md"
