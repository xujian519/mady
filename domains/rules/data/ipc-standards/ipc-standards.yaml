  - id: "说明书-供热通风-F24"
    article: "patent-law-a26.3"
    ipcSection: "F"
    ipcDetail: "F24"
    name: "说明书-审查标准-供热通风"
    keyPoints:
      - "**技术启示的整体判断**：供热通风领域的实用新型专利创造性判断，需要确定现有技术整体上是否存在使本领域技术人员在面对实际解决的技术问题时，有动机改进最接近的现有技术并获得要求保护的技术方案的技术启示（第561840号）。"
      - "**公知常识的认定标准**：如果权利要求相对于最接近现有技术的区别特征属于本领域的公知常识，本领域技术人员有动机采用该区别特征以解决相应的技术问题并产生预期技术效果，则该权利要求不具备创造性（第580817号）。"
      - "**说明书充分公开的判断**：供热通风领域涉及炉具、加热器具等装置时，说明书应当包括有关理解、实现发明或实用新型所需的全部技术内容，本领域技术人员根据说明书公开内容能够实现该技术方案（第19493号）。"
    tips:
      []
    source: "宝宸知识库-复审无效/说明书/说明书-审查标准-供热通风.md"
  - id: "说明书-农业-A01"
    article: "patent-law-a26.3"
    ipcSection: "A"
    ipcDetail: "A01"
    name: "说明书-审查标准-农业"
    keyPoints:
      - "**区别技术特征与技术启示的综合判断**：农业领域涉及大量机械结构类实用新型，说明书审查的核心在于判断区别技术特征是否已被现有技术公开或给出技术启示。若现有技术未给出相应的技术启示，且无证据表明属于本领域公知常识，则应认定权利要求具备创造性（第566550号、第566094号、第560152号）。"
      - "**预料不到技术效果的认定**：当权利要求与最接近的现有技术存在区别特征，该区别特征虽在其他现有技术中有相关记载，但说明书中给出的实验数据足以证明技术方案取得了预料不到的技术效果时，应认定权利要求具备创造性（第560152号）。"
      - "**公知常识的举证责任**：在无效宣告程序中，主张区别技术特征属于本领域公知常识的一方负有举证责任。若没有充分理由或证据表明区别特征属于常用技术手段或公知常识，则不能以此否定权利要求的创造性（第566550号、第560746号）。"
    tips:
      []
    source: "宝宸知识库-复审无效/说明书/说明书-审查标准-农业.md"
  - id: "说明书-化工工艺-B01"
    article: "patent-law-a26.3"
    ipcSection: "B"
    ipcDetail: "B01"
    name: "说明书-审查标准-化工工艺"
    keyPoints:
      - "**必要技术特征的判断标准**：判断独立权利要求是否缺少必要技术特征，应以发明或实用新型声称要解决的技术问题为准。当某一或某些技术特征与所要解决的技术问题之间存在密切联系，是解决技术问题的关键，缺少所述特征将导致相应技术方案无法解决技术问题时，则该特征属于不可缺少的必要技术特征（第562979号）。"
      - "**技术启示与公知常识的结合审查**：化工工艺领域的创造性判断中，若区别特征被其他现有技术公开并给出了将其应用于最接近现有技术的技术启示，或者属于本领域公知常识，则技术方案不具有实质性特点（第561944号、第582109号、第561496号）。"
      - "**说明书充分公开的认定**：化工领域涉及分离、过滤、催化等工艺时，专利法第26条第3款要求根据说明书和附图记载的内容，本领域技术人员能够实现该技术方案。所属技术领域的技术人员能够实现，是指按照说明书记载的内容并结合本领域的公知常识能够实施该技术方案（第35659号、第18572号）。"
    tips:
      []
    source: "宝宸知识库-复审无效/说明书/说明书-审查标准-化工工艺.md"
  - id: "说明书-医药-A61"
    article: "patent-law-a26.3"
    ipcSection: "A"
    ipcDetail: "A61"
    name: "说明书-审查标准-医药"
    keyPoints:
      - "**药物联用特征对医药用途权利要求的限定作用**：涉及\"药物联用\"的特征对于物质的医药用途权利要求是否具备限定作用，关键在于研判该特征能否实际影响制药过程，即能否有效地限定药品的原料及制备工艺。在包含两种或者多种药物联用特征的医药用途权利要求中，如果这些药物具有不同的给药方式，则应当认定该权利要求实质上保护包含两种或者多种药物的药包产品的制药用途发明（第560422号）。"
      - "**说明书充分公开与创造性判断的联动审查**：医药领域说明书审查往往与创造性判断紧密结合，当区别技术特征既没有被其他现有技术公开，也没有证据证明属于本领域公知常识时，应认定权利要求具备创造性（第560687号、第562708号、第565166号）。"
      - "**常规技术手段与创造性否定**：如果权利要求与最接近的现有技术之间存在的区别技术特征是本领域技术人员在不需要付出创造性劳动的基础上使用本领域的常规技术手段可以实现的，则该项权利要求不具备创造性（第561611号、第563955号、第565360号）。"
    tips:
      []
    source: "宝宸知识库-复审无效/说明书/说明书-审查标准-医药.md"
  - id: "说明书-发电变电配电-H02"
    article: "patent-law-a26.3"
    ipcSection: "H"
    ipcDetail: "H02"
    name: "说明书-审查标准-发电变电配电"
    keyPoints:
      - "**说明书与附图结合判断充分公开**：如果本领域普通技术人员根据说明书的描述并结合说明书附图，能够对本专利技术方案作出清楚、完整的理解，进而能够实现本专利的技术方案，则认为本专利的说明书公开是充分的（第582318号）。根据本专利说明书及其附图的全部内容对于整体方案的描述，本领域技术人员可以实施本专利的技术方案并预期到其能够解决本专利所声称的技术问题，则应认为说明书已满足公开充分的要求（第560812号）。"
      - "**笔误与公开不充分的区分**：如果本领域技术人员能够根据本领域的一般技术认知，判断权利要求书中限定的技术特征虽然与说明书所公开的内容所表述的技术方案相反，但是其实则为撰写过程中的笔误，则该权利要求的技术方案在说明书中公开充分（第567678号）。"
      - "**说明书充分公开但无法实现时的判断**：如果本领域技术人员根据说明书记载的内容无法实现本发明，进而无法解决相应的技术问题并取得相应的技术效果，则说明书的公开不充分（第563297号）。"
    tips:
      []
    source: "宝宸知识库-复审无效/说明书/说明书-审查标准-发电变电配电.md"
  - id: "说明书-基本电气元件-H01"
    article: "patent-law-a26.3"
    ipcSection: "H"
    ipcDetail: "H01"
    name: "说明书-审查标准-基本电气元件"
    keyPoints:
      - "**说明书充分公开的三要素判断**：如果本领域普通技术人员根据说明书的记载，并依据本领域的普通技术知识能够实现说明书中记载的技术方案，解决技术问题，并且能够产生预期的技术效果，则说明书公开充分（第580645号、第567600号、第582376号、第568602号）。判断时应站位于本领域技术人员的角度。"
      - "**化学产品发明中制备方法的充分公开**：当发明既涉及化学产品又涉及制备方法时，说明书中应当清楚、完整记载制备方法，包括原料物质、工艺步骤和条件、专用设备等。如果制备实施例存在明显不合理之处，导致本领域技术人员无法确定其制备过程是否可以获得所述化学产品，则说明书公开不充分（第566881号）。"
      - "**关键成分含义不确定导致公开不充分**：当发明涉及的某种关键成分具有不确切的含义，由于其组分和配比对化学特性影响较大，如果不对其进行具体说明，本领域技术人员难以理解该关键成分的技术含义、无法实施技术方案，则说明书不符合专利法第26条第3款的规定（第582906号）。"
      - "**权利要求概括合理性与说明书支持**：权利要求是对说明书记载的具体技术方案的概括，应当与发明人所作技术贡献相称。当说明书中给出的信息不充分，所属技术领域的技术人员用常规的实验或者分析方法不足以把说明书记载的内容扩展到权利要求所述的保护范围时，则权利要求的概括不合理，得不到说明书的支持（第560918号）。"
    tips:
      []
    source: "宝宸知识库-复审无效/说明书/说明书-审查标准-基本电气元件.md"
  - id: "说明书-家具家电-A47"
    article: "patent-law-a26.3"
    ipcSection: "A"
    ipcDetail: "A47"
    name: "说明书-审查标准-家具家电"
    keyPoints:
      - "**区别特征在其他现有技术中作用相同的判断**：如果一项权利要求与作为最接近的现有技术相比存在区别特征，上述区别特征被其他对比文件公开，且二者所起的作用相同，则认为现有技术中给出了将上述技术手段应用于最接近的现有技术的启示，本领域技术人员基于上述现有技术及其所应具备的知识水平和设计能力可以显而易见地得到该权利要求所限定的技术方案（第561183号、第564867号）。"
      - "**缺少必要技术特征的判断**：如权利要求未记载为解决其技术问题而必须限定的技术特征，则该权利要求缺少必要技术特征。应从所要解决的技术问题出发并考虑说明书描述的整体内容进行判断（第564653号）。"
      - "**区别特征作用不同时创造性的肯定**：如果一项权利要求与最接近的现有技术存在区别技术特征，而该区别技术特征在其他现有技术中所起的作用与其在本专利中所起的作用并不相同，那么不能认为其他现有技术公开了该区别技术特征，本领域技术人员也没有动机将二者结合以得到该权利要求的技术方案，则该权利要求具备创造性（第560088号）。"
    tips:
      []
    source: "宝宸知识库-复审无效/说明书/说明书-审查标准-家具家电.md"
  - id: "说明书-工程元件-F16"
    article: "patent-law-a26.3"
    ipcSection: "F"
    ipcDetail: "F16"
    name: "说明书-审查标准-工程元件"
    keyPoints:
      - "**无结合启示时创造性的肯定**：如果一项权利要求所要求保护的技术方案与最接近的现有技术之间存在区别技术特征，现有技术没有给出相应的结合启示促使本领域技术人员将该区别技术特征与最接近的现有技术相结合得到该权利要求所要求保护的技术方案，且该区别技术特征带来了有益的技术效果，则该权利要求所要求保护的技术方案相对于现有技术并非是显而易见的，其具备创造性（第563972号）。"
      - "**权利要求概括与说明书支持**：发明或实用新型专利的权利要求通常由说明书记载的一个或者多个实施方式或实施例概括而成，如果权利要求的概括使所属技术领域的技术人员有理由怀疑该上位概括所包含的一种或多种下位概念或选择方式不能解决发明或者实用新型所要解决的技术问题，并达到相同的技术效果，则应当认为该权利要求没有得到说明书的支持（第563014号）。"
      - "**公知常识与现有技术结合的综合判断**：若一项权利要求所限定的技术方案相对于最接近的现有技术存在多个区别技术特征，另一现有技术已经给出了采用其中部分区别技术特征解决相关技术问题的技术启示，本领域技术人员在不付出创造性劳动的前提下有动机将上述现有技术结合起来，而其他部分区别技术特征属于本领域的常用技术手段，同时上述区别技术特征的引入并未给该权利要求带来预料不到的技术效果，则该权利要求不具备创造性（第565350号）。"
    tips:
      []
    source: "宝宸知识库-复审无效/说明书/说明书-审查标准-工程元件.md"
  - id: "说明书-房屋建筑-E04"
    article: "patent-law-a26.3"
    ipcSection: "E"
    ipcDetail: "E04"
    name: "说明书-审查标准-房屋建筑"
    keyPoints:
      - "**公知常识与预料不到效果的双重否定**：房屋建筑领域的专利审查中，当区别技术特征属于本领域解决相同技术问题的公知常识，且未取得预料不到的技术效果时，权利要求不具备创造性。该标准在建筑材料、建筑构件类专利中频繁适用（第562098号）。"
      - "**技术启示与证据链审查**：建筑结构类技术方案的创造性判断，需要考察现有技术是否给出了将区别技术特征应用于最接近现有技术以解决其技术问题的技术启示。证据链的完整性对审查结论具有决定性影响（第60443号、第60430号、第60280号）。"
      - "**说明书附图的证明效力**：说明书附图是说明书的组成部分，只要附图清楚地显示了发明的技术方案，本领域技术人员据此能够实现该技术方案，即可认定说明书公开充分（第409号）。"
    tips:
      []
    source: "宝宸知识库-复审无效/说明书/说明书-审查标准-房屋建筑.md"
  - id: "说明书-无轨车辆-B62"
    article: "patent-law-a26.3"
    ipcSection: "B"
    ipcDetail: "B62"
    name: "说明书-审查标准-无轨车辆"
    keyPoints:
      - "**区别特征多重作用下的技术启示判断**：当区别技术特征在发明中具有多种作用，现有技术公开了该特征且该特征在现有技术中的作用与发明中的一种作用相同时，如果本领域技术人员基于该作用有动机采用该特征解决最接近现有技术存在的问题，进而在结合后方案的基础上应用常规知识和能力即可解决发明实际解决的技术问题，则认为该现有技术对发明的最终解决具有启示作用（第456001号）。"
      - "**技术构思差异对显而易见性的影响**：如果权利要求请求保护的技术方案与最接近现有技术的证据公开的技术内容相比，二者技术构思、实现方案差别较大，本领域技术人员难以将其作为改进起点，不容易想到朝向本专利方向改进，则在该证据的基础上不能显而易见地获得本专利权利要求保护的方案（第566490号）。"
      - "**基于背景技术理解专利方案**：对专利技术方案的理解，应基于专利背景技术中存在的技术问题，考虑该专利相对于背景技术的改进点、所采取的具体技术手段以及该手段所带来的技术效果（第561323号）。"
    tips:
      []
    source: "宝宸知识库-复审无效/说明书/说明书-审查标准-无轨车辆.md"
  - id: "说明书-有机化学-C07"
    article: "patent-law-a26.3"
    ipcSection: "C"
    ipcDetail: "C07"
    name: "说明书-审查标准-有机化学"
    keyPoints:
      - "**化合物充分公开的结构-制备-效果三要素**：如果本领域技术人员基于说明书公开的内容，能够确认要求保护的具体化合物的结构，知晓其如何制备得到，并能够预期到其用途和/或技术效果，则说明书对该具体化合物的公开符合专利法第26条第3款的规定（第560328号、第560194号）。"
      - "**充分公开的整体判断标准**：所属技术领域的技术人员能够实现，是指所属领域的技术人员按照说明书记载的内容，就能够实现该发明或者实用新型的技术方案，解决其技术问题，并且产生预期的技术效果。在判断是否能够实现时，应当以所属领域的技术人员的视角，根据说明书整体内容结合其所具有的知识和能力进行评价（第561477号、第565648号、第565255号）。"
      - "**公开不充分举证责任的分配**：如果专利权人在本专利说明书公开内容的基础上结合现有技术合理说明了本专利技术方案实现的途径，而请求人未能提供证据证明该途径无法实现本专利技术方案，则请求人关于本专利公开不充分的理由不能成立（第567208号）。"
    tips:
      []
    source: "宝宸知识库-复审无效/说明书/说明书-审查标准-有机化学.md"
  - id: "说明书-机床-B23"
    article: "patent-law-a26.3"
    ipcSection: "B"
    ipcDetail: "B23"
    name: "说明书-审查标准-机床"
    keyPoints:
      - "**必要技术特征与技术问题的对应关系**：独立权利要求应当包含必要技术特征，以保证其所限定的技术方案能够解决专利声称的其中一个技术问题，而非要求其必须包含实施方式中为实现其他技术效果而设置的技术特征。说明书清楚完整的要求并不意味着需要面面俱到，所属领域技术人员基于现有技术能够知晓的内容，未在说明书中详细说明也不影响对技术方案的理解（第560069号）。"
      - "**公知常识与合理预期的创造性否定**：机床领域的权利要求与现有技术相比具有区别特征时，若该区别特征被其他现有技术所公开或者是本领域的公知常识，且其取得的技术效果没有超出本领域技术人员的合理预期，则该权利要求不具备创造性（第565099号、第560447号）。"
      - "**说明书充分公开的判断标准**：专利法第26条第3款对说明书清楚、完整的要求是以所属技术领域的技术人员能够实现为准。若一项权利要求所要求保护的技术方案未在说明书中作出清楚、完整的说明，本领域技术人员无法实现，则说明书不符合充分公开的要求（第17274号、第37647号）。"
    tips:
      []
    source: "宝宸知识库-复审无效/说明书/说明书-审查标准-机床.md"
  - id: "说明书-水利工程-E02"
    article: "patent-law-a26.3"
    ipcSection: "E"
    ipcDetail: "E02"
    name: "说明书-审查标准-水利工程"
    keyPoints:
      - "**事后诸葛亮的防范**：在判断创造性时，考察本领域技术人员是否有动机改进现有技术，应基于申请日之前的现有技术判断，而非在知晓发明方案后反向寻找改进可能，否则将陷入事后诸葛亮的误区。这一标准在水利工程领域尤为重要，因该领域多为结构改进类技术方案（第560021号）。"
      - "**区别技术特征的系统化审查**：水利工程领域的审查通常需要将权利要求与最接近现有技术逐一对比，识别区别技术特征后，判断该区别是否被其他对比文件公开、所起作用是否相同，或是否属于本领域常规技术手段（第561423号、第374001号、第565902号）。"
      - "**笔误认定与文件解释**：水利工程领域专利文件中的笔误认定，需本领域技术人员根据全文内容能够意识到明显错误，且能直接地、毫无疑义地确定唯一正确内容，不存在作其他解释的可能（第561423号）。"
    tips:
      []
    source: "宝宸知识库-复审无效/说明书/说明书-审查标准-水利工程.md"
  - id: "说明书-测量测试-G01"
    article: "patent-law-a26.3"
    ipcSection: "G"
    ipcDetail: "G01"
    name: "说明书-审查标准-测量测试"
    keyPoints:
      - "**技术效果的说明方式多元化**：专利法第26条第3款规定的所属技术领域的技术人员能够实现，是指所属领域技术人员按照说明书记载内容，就能够实现该发明或者实用新型的技术方案。对于技术效果的说明，既可以通过列出实验数据的方式予以说明，也可以通过对发明技术方案的理论分析加以阐明，说明其产生技术效果的机制或原理。在具体的判断过程中，要根据说明书记载的内容、相关技术方案以及所属技术领域的公知常识进行判断（第561050号）。"
      - "**说明书无法解决技术问题即公开不充分**：如果本领域技术人员根据本专利说明书的记载，无法解决其声称要解决的技术问题并达到相应的技术效果，则本专利说明书公开不充分，不符合专利法第26条第3款的规定（第561117号）。"
      - "**创造性判断不能以权利要求为目标进行指向性推导**：判断某项权利要求是否具备创造性，需要确定现有技术整体上是否存在启示使本领域的技术人员有动机改进最接近的现有技术并获得要求保护的技术方案，而不能以该权利要求为目标进行指向性推导（第563501号）。"
    tips:
      []
    source: "宝宸知识库-复审无效/说明书/说明书-审查标准-测量测试.md"
  - id: "说明书-生物技术-C12"
    article: "patent-law-a26.3"
    ipcSection: "C"
    ipcDetail: "C12"
    name: "说明书-审查标准-生物技术"
    keyPoints:
      - "**生物材料保藏与充分公开的关系**：生物技术领域的发明专利涉及生物材料时，如果说明书中记载的生物材料已在国家知识产权局认可的保藏机构进行保藏，且本领域技术人员根据说明书公开内容能够实现该技术方案，则应认定说明书公开充分。保藏是生物技术领域实现充分公开的重要手段（第20174号）。"
      - "**权利要求得到说明书支持的判断**：权利要求书应当以说明书为依据，是指权利要求书应当得到说明书的支持。在生物技术领域，如果权利要求的概括超出了说明书公开的范围，本领域技术人员难以预期权利要求概括的范围均能解决发明所要解决的技术问题并产生预期技术效果，则该权利要求得不到说明书的支持（第16489号）。"
      - "**化学产品用途发明的说明书要求**：对于化学产品用途发明，说明书中应当记载所使用的化学产品、使用方法及所获得的效果。所属领域技术人员按照说明书记载的内容并结合本领域的公知常识能够实施该用途发明时，应当认定说明书公开充分（第20281号、第15694号）。"
    tips:
      []
    source: "宝宸知识库-复审无效/说明书/说明书-审查标准-生物技术.md"
  - id: "说明书-电子通信-H04"
    article: "patent-law-a26.3"
    ipcSection: "H"
    ipcDetail: "H04"
    name: "说明书-审查标准-电子通信"
    keyPoints:
      - "**说明书附图构成公开内容的一部分**：说明书公开的内容不仅包括文字记载，说明书附图也是说明书的公开信息，因此说明书附图中可以直接地、毫无疑义地确定的内容也是说明书公开的内容。在判断充分公开时应当综合文字和附图的全部信息（第560806号）。"
      - "**公知常识结合否定创造性**：如果权利要求保护的技术方案与作为最接近现有技术相比存在区别特征，但该区别特征属于本领域的公知常识，本领域技术人员基于上述现有技术及其所应具备的知识水平和设计能力可以显而易见地得到该权利要求所限定的技术方案，则不具备创造性（第560735号、第560872号）。"
      - "**技术启示判断的整体考量**：如果权利要求与最接近的现有技术相比存在区别特征，其他对比文件不存在权利要求要解决的技术问题，未就采用该区别特征解决相关技术问题给出相应技术启示，也没有充分的理由和证据表明该区别特征是本领域公知常识，同时该区别特征能为权利要求带来有益的技术效果，则该权利要求具备创造性（第561100号）。"
    tips:
      []
    source: "宝宸知识库-复审无效/说明书/说明书-审查标准-电子通信.md"
  - id: "说明书-计算-G06"
    article: "patent-law-a26.3"
    ipcSection: "G"
    ipcDetail: "G06"
    name: "说明书-审查标准-计算"
    keyPoints:
      - "**充分公开与技术方案可实现性**：如果所属领域的普通技术人员根据说明书的记载，基于其所知晓的所属技术领域的普通技术知识，能够实现说明书中记载的方案，则该说明书符合专利法第26条第3款的规定。判断重点在于本领域技术人员能否在说明书基础上实现技术方案、解决技术问题并产生预期效果（第565783号、第502号）。"
      - "**区别特征未被公开时创造性的肯定**：如果一项权利要求保护的技术方案与最接近的现有技术相比存在的区别特征，既未被其他现有技术公开，也没有证据表明其属于本领域的公知常识，并且其使得该权利要求的技术方案能够获得有益的技术效果，则该权利要求相对于现有证据具备创造性（第564945号）。"
      - "**公知常识与现有技术结合否定创造性**：如果一项权利要求与最接近的现有技术存在区别技术特征，但该区别技术特征或者被其他现有技术所公开，或者属于本领域的公知常识，那么对于本领域技术人员而言，该权利要求的技术方案是显而易见的，其不具备创造性（第563239号、第563469号、第561729号）。"
    tips:
      []
    source: "宝宸知识库-复审无效/说明书/说明书-审查标准-计算.md"
  - id: "说明书-车辆通用-B60"
    article: "patent-law-a26.3"
    ipcSection: "B"
    ipcDetail: "B60"
    name: "说明书-审查标准-车辆通用"
    keyPoints:
      - "**现有技术披露与技术启示的认定**：车辆通用领域的创造性判断中，当其他现有技术披露了与区别技术特征相应的技术手段，且该技术手段与区别技术特征具有相同作用时，如果本领域技术人员基于现有知识水平及常规设计思路能够容易地想到对该技术手段进行调整并应用于最接近现有技术中，则认为现有技术整体上存在技术启示（第582491号）。"
      - "**说明书清楚完整的标准**：车辆领域涉及机械结构的技术方案，说明书应当对发明或实用新型作出清楚、完整的说明，以所属技术领域的技术人员能够实现为准。这并不意味着需要面面俱到，但必须包括实现技术方案所必需的内容（第37000号）。"
      - "**区别特征的创造性审查**：若权利要求与最接近现有技术之间存在区别技术特征，其他现有技术未公开该区别特征，也没有充分理由或证据表明其属于本领域惯用技术手段或公知常识，则该技术方案具备创造性（第566114号）。"
    tips:
      []
    source: "宝宸知识库-复审无效/说明书/说明书-审查标准-车辆通用.md"
  - id: "说明书-输送包装-B65"
    article: "patent-law-a26.3"
    ipcSection: "B"
    ipcDetail: "B65"
    name: "说明书-审查标准-输送包装"
    keyPoints:
      - "**说明书充分公开的判断站位**：判断说明书公开是否充分要站位本领域技术人员，如果在说明书记载内容的基础上，本领域技术人员基于其掌握的本领域普通技术知识能够实现本专利权利要求的技术方案，解决其技术问题并达到相应的技术效果，则权利要求的技术方案已被说明书充分公开（第563814号）。"
      - "**功能性特征与说明书支持**：对于说明书中仅给出一个具体实施方式，权利要求采用相应的功能予以限定的情形，不能因此直接认定该功能性特征导致权利要求得不到说明书的支持，而是需要站位所属领域技术人员的视角，判断所述功能是否可以采用说明书中未提到的其他替代方式来完成（第560761号）。"
      - "**现有技术结合启示的综合判断**：判断一项权利要求的技术方案相对于不同现有技术的结合是否具备创造性，不能孤立地看待各技术特征是否分别被各现有技术公开，而应当以本领域技术人员的角度，判断现有技术之间是否存在明确的、合乎逻辑的结合启示（第580400号、第566476号）。"
    tips:
      []
    source: "宝宸知识库-复审无效/说明书/说明书-审查标准-输送包装.md"
  - id: "说明书-门窗锁具-E05"
    article: "patent-law-a26.3"
    ipcSection: "E"
    ipcDetail: "E05"
    name: "说明书-审查标准-门窗锁具"
    keyPoints:
      - "**说明书清楚完整的综合考量**：门窗锁具领域的说明书审查，应当结合说明书中记载的技术问题、技术方案、技术效果等内容，站位本领域技术人员的视角进行综合考量。权利要求的理解与认定也应站位本领域技术人员的视角，基于权利要求的文字记载，并与说明书的内容相适应，从而正确界定保护范围（第565440号）。"
      - "**技术效果应当在说明书中有明确记载**：专利权人主张的技术效果应当在说明书中有明确的记载，或者是本领域技术人员基于技术方案就能够直接地、毫无疑义地确定的技术效果。若说明书内容不足以合理预期权利要求限定的技术手段能够达到所称的技术效果，则该效果通常不被认可（第561803号）。"
      - "**举证责任与特征对比**：无效宣告请求人坚持认为证据中公开了权利要求的相应特征，但未论述改进是否为显而易见的，当证据中的结构与权利要求特征实质不同时，合议组不能支持关于权利要求不具备新颖性或创造性的意见（第552004号）。"
    tips:
      []
    source: "宝宸知识库-复审无效/说明书/说明书-审查标准-门窗锁具.md"
  - id: "说明书-食品-A23"
    article: "patent-law-a26.3"
    ipcSection: "A"
    ipcDetail: "A23"
    name: "说明书-审查标准-食品"
    keyPoints:
      - "**说明书公开充分与权利要求清楚性的综合判断**：食品领域的说明书审查，应当以所属领域技术人员的视角，在说明书记载内容的基础上结合现有技术的整体状况进行综合判断。说明书充分公开与权利要求保护范围是否清楚往往联动审查（第560852号）。"
      - "**宽泛型权利要求的保护范围控制**：生物医药及食品领域的发明中存在多种宽泛型权利要求的保护方式，包括上位概括型、通式型、功能性限定等。若权利要求保护范围过于宽泛，涵盖现有技术中的技术方案，则不具备新颖性；若系显而易见获得，则不具备创造性（第565772号）。"
      - "**创造性判断中的区别特征分析**：食品领域的技术方案与最接近现有技术存在区别技术特征时，需判断该区别特征是否基于本领域普通技术知识和常规技术手段容易得到。若现有证据不足以给出技术启示，则该权利要求具备创造性（第560874号、第560016号、第495001号）。"
    tips:
      []
    source: "宝宸知识库-复审无效/说明书/说明书-审查标准-食品.md"
  - id: "权利要求-供热通风-F24"
    article: "patent-law-a26.4"
    ipcSection: "F"
    ipcDetail: "F24"
    name: "权利要求-审查标准-供热通风"
    keyPoints:
      - "**创造性判断遵循\"三步法\"标准路径。** 首先将权利要求的技术方案与最接近现有技术进行特征对比找出区别特征，进而考察现有技术中是否给出将区别技术特征应用到最接近现有技术以解决技术问题的启示，若存在这种启示则权利要求不具备创造性（第561113号、第560305号）。"
      - "**优先权的判断须基于相同主题。** 如果在后申请是在在先申请所对应的下位概念技术特征基础上进行的上位概括，则通常认为二者不属于相同主题的发明或实用新型，在后申请不能享有在先申请的优先权（第560706号）。"
      - "**公知常识区别特征导致不具备创造性。** 如果一项权利要求相对于最接近现有技术的区别特征属于本领域的公知常识，本领域技术人员有动机采用该区别特征以解决相应的技术问题并产生预期技术效果，则该权利要求不具备创造性（第580364号）。"
    tips:
      []
    source: "宝宸知识库-复审无效/权利要求/权利要求-审查标准-供热通风.md"
  - id: "权利要求-光学-G02"
    article: "patent-law-a26.4"
    ipcSection: "G"
    ipcDetail: "G02"
    name: "权利要求-审查标准-光学"
    keyPoints:
      - "**区别特征被其他证据公开且作用相同则不具备创造性。** 如果一项权利要求的技术方案与最接近的现有技术证据之间存在区别技术特征，但该区别技术特征已被所属领域相同的其它证据所公开，且所起的作用与本专利中为解决实际的技术问题所起作用相同，则在相应技术启示下对于本领域技术人员而言容易想到将该区别技术特征应用到最接近现有技术以解决相应技术问题（第561015号）。"
      - "**不缺少必要技术特征的判断以能否解决技术问题为标准。** 如果权利要求所公开的特征能够解决该专利所要解决的技术问题，则该权利要求不缺少必要技术特征；如果权利要求的技术方案能够根据说明书公开的内容概括得到，则该权利要求能够得到说明书支持（第561334号）。"
      - "**区别特征属于公知常识直接否定创造性。** 如果一项权利要求的技术方案与最接近的现有技术之间存在区别技术特征，但该区别技术特征属于本领域公知常识，则该权利要求的技术方案不具备创造性（第560744号）。"
    tips:
      []
    source: "宝宸知识库-复审无效/权利要求/权利要求-审查标准-光学.md"
  - id: "权利要求-其他电技术-H05"
    article: "patent-law-a26.4"
    ipcSection: "H"
    ipcDetail: "H05"
    name: "权利要求-审查标准-其他电技术"
    keyPoints:
      - "**区别特征被公开与公知常识结合导致不具备创造性。** 如果一项权利要求与最接近现有技术相比存在区别，但该区别部分被其余现有技术公开，部分属于本领域公知常识，现有技术整体上给出了将两者结合以解决其技术问题的技术启示，则该权利要求所保护的技术方案是显而易见的（第241001号）。"
      - "**权利要求概括不得超出说明书公开范围。** 权利要求的概括不能超出说明书公开的范围，如果本领域技术人员根据说明书公开的内容无法合理预期权利要求概括的所有技术方案均能解决技术问题，则权利要求得不到说明书支持（第18680号）。"
      - "**性能特征限定方法权利要求的审查需结合对比文件具体判断。** 如果方法权利要求与对比文件的区别是性能特征的限定，该性能特征并未构成对方法步骤实质性的区别限定，则该区别不影响创造性的判断结论（第16471号）。"
    tips:
      []
    source: "宝宸知识库-复审无效/权利要求/权利要求-审查标准-其他电技术.md"
  - id: "权利要求-医药-A61"
    article: "patent-law-a26.3"
    ipcSection: "A"
    ipcDetail: "A61"
    name: "权利要求-审查标准-医药"
    keyPoints:
      - "**权利要求与说明书文字不完全一致不必然导致不支持。** 如果本领域技术人员根据说明书公开的内容以及权利要求所限定的技术方案能够判断出二者实质相同，则即使权利要求的技术方案与说明书的文字记载不完全一致，权利要求也能够得到说明书的支持（第561123号）。"
      - "**权利要求用语的清楚性需结合说明书理解。** 权利要求中词语含义清楚的要求指的是该词语含义本身是否清楚，至于该词语所指代的技术特征的含义，应当结合说明书的内容加以理解，并非必须都记载在权利要求中（第560465号）。反之，如果本领域技术人员无法确定权利要求中用语的含义，说明书中也未进行清楚地说明，则权利要求不清楚（第566461号）。"
      - "**创造性判断中的协同特征应整体考虑。** 对于紧密联系、相互依存、具有协同作用、共同解决同一技术问题、产生关联技术效果的技术特征，应作为整体考虑，不应割裂评价（第561123号）。"
    tips:
      []
    source: "宝宸知识库-复审无效/权利要求/权利要求-审查标准-医药.md"
  - id: "权利要求-发电变电配电-H02"
    article: "patent-law-a22.3"
    ipcSection: "H"
    ipcDetail: "H02"
    name: "权利要求-审查标准-发电变电配电"
    keyPoints:
      - "**权利要求保护范围的清楚性应站位本领域技术人员角度。** 权利要求的保护范围是否清楚，应当站位本领域技术人员角度，结合其上下文语境和应用场景来对其进行理解和判断。对于权利要求是否得到说明书的支持，也应当站位本领域技术人员角度进行合理的解读（第564742号）。"
      - "**独立权利要求不缺少必要技术特征的判断。** 如果独立权利要求的技术方案能够解决说明书记载的要解决的技术问题，则认为该技术方案不缺少必要技术特征（第564742号）。"
      - "**公知常识与常规技术手段的创造性评价。** 如果一项权利要求与最接近现有技术之间的区别技术特征属于公知常识或所属技术领域的常规技术手段，且该区别技术特征的应用也并未给权利要求带来预料不到的技术效果，则在现有技术的基础上得到该权利要求对于本领域技术人员来说是显而易见的（第562713号）。"
    tips:
      []
    source: "宝宸知识库-复审无效/权利要求/权利要求-审查标准-发电变电配电.md"
  - id: "权利要求-基本电气元件-H01"
    article: "patent-law-a26.3"
    ipcSection: "H"
    ipcDetail: "H01"
    name: "权利要求-审查标准-基本电气元件"
    keyPoints:
      - "**参数特征的数值范围概括必须与说明书充分对应。** 当权利要求中的数值范围大于说明书公开的范围，且说明书未给出端点值附近的具体实施方式或合理解释时，该数值范围不能得到说明书支持（第567396号、第568595号）。"
      - "**必要技术特征的判断应以技术问题为导向。** 判断权利要求是否缺少必要技术特征，应从所要解决的技术问题出发，考察该权利要求限定的技术方案能否解决该技术问题（第567277号）。"
      - "**权利要求的概括应当适当。** 如果权利要求的保护范围是对说明书内容的适当概括，则符合专利法第26条第4款；如果权利要求中技术方案与说明书记载实质相同但文字表述不完全一致，不必然导致不支持（第567860号）。"
    tips:
      []
    source: "宝宸知识库-复审无效/权利要求/权利要求-审查标准-基本电气元件.md"
  - id: "权利要求-家具家电-A47"
    article: "patent-law-a22.3"
    ipcSection: "A"
    ipcDetail: "A47"
    name: "权利要求-审查标准-家具家电"
    keyPoints:
      - "**权利要求技术特征的清楚性取决于本领域技术人员的理解能力。** 针对权利要求的某一技术特征，如果本领域技术人员根据自身的知识水平可以知晓其真实含义，则该技术特征不会导致权利要求保护范围不清楚（第561402号）。"
      - "**区别技术特征未被公开且非公知常识时，权利要求具备创造性。** 如果权利要求与最接近的现有技术存在区别特征，其他现有技术未给出采用该区别特征解决相关技术问题的技术启示，也没有充分理由或证据表明该区别特征是本领域公知常识，同时该区别特征带来有益技术效果，则权利要求具备创造性（第565495号、第323001号、第562763号）。"
      - "**公知常识结合的创造性判断。** 如果权利要求与最接近的现有技术存在区别技术特征，但该区别特征被其他对比文件公开或属于公知常识，将对比文件和公知常识结合得到权利要求的技术方案是容易想到的，则权利要求不具备创造性（第566586号、第565430号）。"
    tips:
      []
    source: "宝宸知识库-复审无效/权利要求/权利要求-审查标准-家具家电.md"
  - id: "权利要求-工程元件-F16"
    article: "patent-law-a22.3"
    ipcSection: "F"
    ipcDetail: "F16"
    name: "权利要求-审查标准-工程元件"
    keyPoints:
      - "**权利要求保护范围以记载的技术特征集合为界定基础。** 判断权利要求的创造性时，首先应当明确该权利要求的保护范围，权利要求的保护范围以权利要求记载的技术特征集合为界定基础，对于那些未限定在权利要求中的技术手段及其带来的效果，确定权利要求保护范围时通常不予考虑（第580510号）。"
      - "**权利要求用语的理解应站在本领域技术人员角度。** 对于权利要求中用语含义的理解，应当以所属技术领域技术人员的角度，在全面了解说明书描述的技术方案的前提下，理解权利要求中用语的正确含义（第560856号）。"
      - "**区别特征未被公开且无公知常识证据时具备创造性。** 如果权利要求与一篇现有技术相比存在区别特征，其他现有技术未就采用该区别特征解决相关技术问题给出相应技术启示，也没有充分的理由或相应的证据表明该区别特征是本领域公知常识，同时该区别特征能为权利要求带来有益的技术效果，则该权利要求具备创造性（第566509号）。"
    tips:
      []
    source: "宝宸知识库-复审无效/权利要求/权利要求-审查标准-工程元件.md"
  - id: "权利要求-房屋建筑-E04"
    article: "patent-law-a26.4"
    ipcSection: "E"
    ipcDetail: "E04"
    name: "权利要求-审查标准-房屋建筑"
    keyPoints:
      - "**创造性判断中请求人举证不能则创造性主张不成立。** 在权利要求创造性的判断中，如果权利要求所述技术方案与现有技术公开的技术方案之间存在区别技术特征，而请求人不能提供证据证明或以充分的理由说明采用该区别技术特征来解决所述技术问题对本领域技术人员来说是显而易见的，则请求人关于该权利要求不具备创造性的主张不能成立（第566135号）。"
      - "**区别特征被其他现有技术公开且给出动机则不具备创造性。** 如果一项实用新型的权利要求与最接近的现有技术相比存在区别特征，该区别特征在本领域其他现有技术文件中已经被公开，本领域技术人员有动机引入该区别特征并产生预期的技术效果，则所述实用新型的权利要求不具备创造性（第566122号）。"
      - "**现有技术中给出技术启示则技术方案显而易见。** 权利要求请求保护的技术方案与最接近的现有技术之间存在区别技术特征，如果现有技术中给出了将上述区别技术特征应用到该最接近现有技术中以解决其存在的技术问题的启示，则该权利要求所请求保护的技术方案是显而易见的（第582419号）。"
    tips:
      []
    source: "宝宸知识库-复审无效/权利要求/权利要求-审查标准-房屋建筑.md"
  - id: "权利要求-有机化学-C07"
    article: "patent-law-a26.4"
    ipcSection: "C"
    ipcDetail: "C07"
    name: "权利要求-审查标准-有机化学"
    keyPoints:
      - "**权利要求概括须得到说明书合理预期。** 如果基于说明书充分记载的内容，本领域技术人员能够合理地预期到权利要求概括的所有技术方案均能解决发明要解决的技术问题并达到预期技术效果，则权利要求书得到了说明书的支持（第561295号）。"
      - "**晶型权利要求的举证责任分配。** 如果权利要求保护的晶型已记载在说明书中，应由请求人举证证明权利要求保护的晶型包含了不可预期的其他晶型；化合物晶型创造性的关键在于是否具备预料不到的技术效果（第560786号）。"
      - "**方法权利要求的保护范围需结合目标产物综合判断。** 对于保护制备方法的技术方案，除方法本身外，反应原料或目标产物也是重要考量因素；若目标产物结构与现有技术差异较大且请求人未能否定其创造性，即使方法常规仍可能获得专利保护（第565300号）。"
    tips:
      []
    source: "宝宸知识库-复审无效/权利要求/权利要求-审查标准-有机化学.md"
  - id: "权利要求-机床-B23"
    article: "patent-law-a26.4"
    ipcSection: "B"
    ipcDetail: "B23"
    name: "权利要求-审查标准-机床"
    keyPoints:
      - "**常规技术手段加无预料不到效果则不具备创造性。** 若一项权利要求所限定的技术方案相对于现有技术所披露的技术内容存在区别技术特征，但该区别技术特征属于本领域技术人员解决相关技术问题的常规技术手段，且该区别技术特征没有为该权利要求所限定的技术方案带来预料不到的技术效果，则该权利要求不具备创造性（第566073号）。"
      - "**无技术启示且非公知常识则创造性理由不成立。** 如果一项权利要求与最接近的现有技术之间存在区别特征，本领域技术人员在上述最接近的现有技术的基础上也没有对其进行相应的改进而得到该区别特征的启示，在案证据也不足以认定其为本领域的公知常识，则请求人关于该权利要求不具备创造性的理由不成立（第565874号）。"
      - "**未记载且无法直接毫无疑义确定的内容不构成保护范围限制。** 权利要求以及说明书中均未记载，且从技术方案整体也无法直接、毫无疑义确定的内容不应考虑为对权利要求保护范围的限制（第564484号）。"
    tips:
      []
    source: "宝宸知识库-复审无效/权利要求/权利要求-审查标准-机床.md"
  - id: "权利要求-泵-F04"
    article: "patent-law-a22.3"
    ipcSection: "F"
    ipcDetail: "F04"
    name: "权利要求-审查标准-泵"
    keyPoints:
      - "**区别技术特征未被公开且非公知常识时具备创造性。** 如果权利要求所要求保护的技术方案相对于最接近的现有技术存在区别技术特征，其他现有技术也未给出应用该区别技术特征解决相关技术问题的启示，同时该区别技术特征也不属于本领域的公知常识，并且该区别技术特征给技术方案带来了有益的技术效果，则该权利要求所要求保护的技术方案具备创造性（第561409号）。"
      - "**使用状态限定的创造性评价。** 如果权利要求与现有技术之间存在的区别技术特征属于对部件使用状态的描述，其未对技术方案产生实质性影响，且本领域技术人员能够预期该现有技术的相关部件在相应的结构和工况下也具有上述区别技术特征所限定的状态，则权利要求中使用状态的限定不会给其带来创造性（第560677号）。"
      - "**权利要求技术内容的清楚性判断。** 如果权利要求中限定的技术内容在说明书中有清楚说明或披露，本领域技术人员基于说明书公开的技术内容、结合自身掌握的普通知识能够清楚该技术特征如何实现，能够知晓现有技术中实现该技术特征的各种具体方式，则该权利要求保护范围是清楚的（第563407号）。"
    tips:
      []
    source: "宝宸知识库-复审无效/权利要求/权利要求-审查标准-泵.md"
  - id: "权利要求-测量测试-G01"
    article: "patent-law-a22.3"
    ipcSection: "G"
    ipcDetail: "G01"
    name: "权利要求-审查标准-测量测试"
    keyPoints:
      - "**权利要求必要技术特征与保护范围清楚性的综合判断。** 如果独立权利要求的方案从整体上反映了发明的技术方案，记载了解决技术问题的必要技术特征，则其符合专利法的相关规定。如果本领域技术人员根据权利要求记载的各特征可以清楚地知晓该权利要求所请求保护的范围，那么该权利要求的保护范围是清楚的（第561463号）。"
      - "**权利要求修改的审查。** 申请人可以对其专利申请文件进行修改，但是，对发明和实用新型专利申请文件的修改不得超出原说明书和权利要求书记载的范围（第560269号）。专利权人在无效程序中修改权利要求书后，如果请求人在修改文本的基础上撤回无效宣告请求，则应当在修改后的权利要求书的基础上维持本专利权有效（第564887号）。"
      - "**证据链的证明标准。** 对于请求人主张采用多份证据构成证据链以证明在先使用公开事实的情况，如果涉及多份单方提供的企业内部证据，且内容无法一一对应，提供证人证言类证据的相关人员未能出席口头审理接受质询，同时也缺乏客观证据佐证，则仅凭目前这些证据不足以达到证明相关事实的程度（第565223号）。"
    tips:
      []
    source: "宝宸知识库-复审无效/权利要求/权利要求-审查标准-测量测试.md"
  - id: "权利要求-生物技术-C12"
    article: "patent-law-a26.4"
    ipcSection: "C"
    ipcDetail: "C12"
    name: "权利要求-审查标准-生物技术"
    keyPoints:
      - "**说明书支持判断需基于本领域技术人员知识结合说明书全部内容。** 在判断权利要求是否得到说明书的支持时，应当在所属领域技术人员所掌握的普通技术知识的基础上，结合说明书的全部内容予以考虑，而不是仅考虑说明书具体实施方式的内容（第561449号）。"
      - "**上位概括使所属领域技术人员有理由怀疑则不支持。** 如果权利要求的概括使所属技术领域的技术人员有理由怀疑该上位概括所涵盖的技术方案中存在不能解决发明技术问题、达不到预期技术效果的方案，则权利要求得不到说明书支持（第21289号）。"
      - "**必要技术特征须为解决技术问题所不可或缺。** 必要技术特征是指发明或者实用新型为解决其技术问题所不可缺少的技术特征，其总和足以构成发明或者实用新型的保护范围（第34953号）。"
    tips:
      []
    source: "宝宸知识库-复审无效/权利要求/权利要求-审查标准-生物技术.md"
  - id: "权利要求-电子通信-H04"
    article: "patent-law-a22.3"
    ipcSection: "H"
    ipcDetail: "H04"
    name: "权利要求-审查标准-电子通信"
    keyPoints:
      - "**权利要求技术方案的清楚性需结合说明书整体理解。** 对权利要求中技术方案的理解应基于本领域技术人员的技术水平和认知能力，将专利文件作为整体来看待。如果本领域技术人员能够确定权利要求中技术特征的含义，则保护范围清楚（第565167号）。"
      - "**说明书充分公开与权利要求清楚性相互关联。** 如果说明书中的特征含糊不清且自相矛盾，本领域技术人员无法具体实施技术方案，则说明书公开不充分，同时权利要求用语限定出不同保护范围的，保护范围不清楚（第382001号）。"
      - "**优先权基础的审查需严格对照权利要求。** 在后申请的权利要求要求保护的技术方案必须能从在先申请中直接和毫无疑义地得出，否则在先申请不能作为优先权基础（第564549号）。"
    tips:
      []
    source: "宝宸知识库-复审无效/权利要求/权利要求-审查标准-电子通信.md"
  - id: "权利要求-计算-G06"
    article: "patent-law-a22.3"
    ipcSection: "G"
    ipcDetail: "G06"
    name: "权利要求-审查标准-计算"
    keyPoints:
      - "**区别技术特征被公开且作用相同时存在技术启示。** 如果一项权利要求与最接近的现有技术存在区别技术特征，但该区别技术特征已经被其他现有技术所公开，且其在其他现有技术中所起的作用与其在该权利要求中所起的作用相同，则应当认为现有技术给出了将该区别技术特征应用于最接近的现有技术以解决相应技术问题的启示，该权利要求不具备创造性（第563077号）。"
      - "**递进式撰写方式下新颖性的判断。** 如果对比文件以递进式撰写的方式对技术方案的各个技术特征进行具体细化，而本领域技术人员依据其自身能力能够确定必然存在一个包含了各个具体技术特征的技术方案，则应当认为对比文件公开了该技术方案（第563057号）。"
      - "**公知常识或被公开的区别特征导致显而易见。** 如果区别技术特征或属于本领域的公知常识，或被其他现有技术公开且在该现有技术中的作用与该项权利要求中的作用相同，则该权利要求相对于现有技术而言是显而易见的（第563281号）。"
    tips:
      []
    source: "宝宸知识库-复审无效/权利要求/权利要求-审查标准-计算.md"
  - id: "权利要求-输送包装-B65"
    article: "patent-law-a22.3"
    ipcSection: "B"
    ipcDetail: "B65"
    name: "权利要求-审查标准-输送包装"
    keyPoints:
      - "**权利要求技术特征的理解应基于说明书和附图整体描述。** 若基于说明书的整体理解，本领域技术人员能够确定该技术特征的实际作用，且基于本领域的普通技术知识，能够清楚确定实现该技术特征的具体技术手段，并解决相应的技术问题，则该权利要求的技术方案清楚且能得到说明书的支持（第561168号）。"
      - "**产品权利要求通过公式限定参数的新颖性判断。** 对于产品权利要求而言，虽然其通过公式限定得到某一参数，但最后在产品结构中也仅体现单一参数值，若现有技术公开了除公式外的全部技术特征且公开了通过该公式计算得到的数值范围，则该权利要求不具备新颖性（第567955号）。"
      - "**常规技术手段的创造性判断。** 如果一项权利要求与最接近现有技术之间的区别特征被本领域其他现有技术公开并解决了同样的技术问题，或者是本领域解决相应技术问题的常规技术手段，则认为存在技术启示，该权利要求不具备创造性（第560826号、第284001号）。"
    tips:
      []
    source: "宝宸知识库-复审无效/权利要求/权利要求-审查标准-输送包装.md"
