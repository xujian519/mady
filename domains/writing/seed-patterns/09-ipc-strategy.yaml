id: "wp-ipc-strategy"
name: "IPC 分类驱动的撰写约束策略"
category: "ipc_strategy"
summary: "IPC分类号不仅是检索工具，更是撰写策略的依据。不同IPC段对应不同的审查标准侧重点，权利要求和说明书的撰写应主动适配IPC段的特有审查规则。"
context: "适用于确定IPC分类后的权利要求和说明书撰写阶段。"
quality: 0.82
version: 1
steps:
  - order: 1
    name: "确定主分类号"
    instruction: "根据发明的核心改进点确定主分类号（如呼吸阀防结晶→B65D 90/34）。主分类号决定了最可能分到哪个审查部门。"
  - order: 2
    name: "映射IPC段特有规则"
    instruction: "不同IPC段有不同审查侧重点。例如：B65D 90/34（呼吸阀）需要强调安全泄放功能；B65D 88/74（加热装置）需要描述热效率与温度控制。"
    example: "IPC段 B65D 90/34 特有规则：呼吸阀功能需与安全泄放结合描述，防结晶目的的最终效果是保障安全泄放功能。"
  - order: 3
    name: "将IPC规则转化为撰写约束"
    instruction: "在说明书中主动嵌入IPC段特有的描述角度，使审查员在阅读时即可感知到与分类号的一致性。"
dos:
  - rule: "主分类号和副分类号分别对应不同的撰写侧重点"
  - rule: "说明书中突出IPC段要求的技术效果描述"
donts:
  - rule: "不为了扩大保护范围而刻意扭曲IPC分类方向"
