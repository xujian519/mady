id: "wp-spec-background"
name: "说明书背景技术撰写——问题层次化+对比表"
category: "spec_drafting"
sub_category: "background"
summary: "背景技术采用三层递进结构：技术领域定位→现有方案分层阐述→缺陷汇总引出需求。核心技巧是’先立后破’——先客观描述现有方案，再分析其不足，最后自然引出本发明的技术问题。"
context: "适用于发明和实用新型专利说明书的背景技术部分。"
quality: 0.88
version: 1
steps:
  - order: 1
    name: "定位技术领域"
    instruction: "第一句写明所属具体技术领域。格式：’本发明/实用新型涉及……技术领域，具体涉及……’"
    example: "本实用新型涉及农业种植保护装置技术领域，具体涉及一种用于盐碱地苜蓿幼苗的简易保护装置，特别是一种集成盐分监测功能的幼苗保护罩。"
  - order: 2
    name: "分层阐述现有方案"
    instruction: "（1）先介绍技术背景和行业现状；（2）用对比表列出各现有方案的方法、优点和缺点。每个缺点对应一个要解决的技术问题。"
    example: "| 方法 | 优点 | 缺点 |\n|------|------|------|\n| 塑料地膜覆盖 | 成本低，保温保湿 | 不可移动，大风易破损，盐分表聚加剧 |\n| 简易育苗罩 | 成本较低，可移动 | 无透气设计，高温天气易烧苗 |"
  - order: 3
    name: "总结技术缺陷，引出需求"
    instruction: "在对比表后总结性地指出最关键的不足，用’因此，急需一种……’句式引出本发明。注意不要直接批评现有技术「不够好」，而是客观指出「存在以下问题……」"
    example: "因此，急需一种成本低廉、操作简便、功能完善的盐碱地苜蓿幼苗保护装置。"
dos:
  - rule: "对比表是背景技术的核心——让读者一目了然看到各方案的优劣"
  - rule: "引证的现有技术必须真实可查（专利号/文献号），不编造"
  - rule: "客观指出不足，避免’传统方法落后’等贬义表述"
    example: "好：’现有保护罩在高温天气下可能造成幼苗烧苗’\n坏：’传统保护罩设计落后，完全无法满足使用需求’"
donts:
  - rule: "背景技术不写本发明的技术方案"
  - rule: "不出现’如权利要求N所述’的表述"
