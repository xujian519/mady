id: "wp-oa-clarity-support"
name: "不清楚/不支持 OA 答复——功能性限定的支持问题"
category: "oa_clarity"
summary: "答复26条第4款（不清楚/不支持）的核心策略：区分’功能性限定’与’纯功能性定义’——前者是允许的（只要本领域技术人员能确定其范围），后者才是禁止的。重点论证说明书中给出了实现该功能的具体方式。"
context: "适用于答复审查意见中关于专利法第26条第4款（权利要求不清楚、得不到说明书支持）的驳回理由。"
quality: 0.85
version: 1
steps:
  - order: 1
    name: "确认审查员认定的不清楚点"
    instruction: "复述审查员认为不清楚的功能性限定或参数限定。区分是’功能性限定是否允许’还是’范围是否不确定’的问题。"
  - order: 2
    name: "援引审查指南关于功能性限定的规定"
    instruction: "审查指南允许功能性限定——只要本领域技术人员通过阅读说明书能够确定实现该功能的具体方式。审查指南第二部分第二章第3.2.1节。"
    example: "根据审查指南第二部分第二章第3.2.1节的规定，’对于权利要求中的功能性特征，应当理解为覆盖了所有能够实现所述功能的实施方式’。本领域技术人员通过阅读说明书第[XX]段的具体实施例，能够清楚确定实现’伴热’功能的具体结构方式。"
  - order: 3
    name: "引用说明书的支持内容"
    instruction: "明确指出说明书中哪些段落/附图给出了实现该功能/参数的具体方式。这是争辩的核心。"
    example: "说明书的实施例部分（第[XX]段）详细描述了伴热夹套的具体结构：螺旋形的加热介质通道、进出口布置方式、介质温度范围，本领域技术人员能够据此实现所述伴热功能。"
dos:
  - rule: "区分’功能性限定’和’纯功能性定义’——前者允许，后者禁止"
  - rule: "说明书中有实施例支持是关键——明确指出具体段落和附图标记"
donts:
  - rule: "不要说’这是本领域惯用手段’——这不能替代说明书中的支持"
  - rule: "功能性限定需要明确边界，避免’根据需要调节’等开放性表述"
