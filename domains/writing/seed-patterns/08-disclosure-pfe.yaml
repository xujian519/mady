id: "wp-disclosure-pfe"
name: "技术交底书撰写——PFE 三元组提取法"
category: "disclosure"
summary: "技术交底书的核心是PFE三元组：Problem（技术问题）、Feature（技术特征）、Effect（技术效果）。从发明人的原始描述中准确提取这三个要素，是撰写高质量交底书的第一步。采用九段式结构组织交底书正文。"
context: "适用于专利代理人/发明人撰写技术交底书。"
quality: 0.88
version: 1
steps:
  - order: 1
    name: "提取技术问题（Problem）"
    instruction: "从发明人的描述中析出现有技术存在的具体技术问题。问三个问题：现有方案是什么？它有什么不足？这个不足导致的直接后果是什么？"
  - order: 2
    name: "提取技术特征（Feature）"
    instruction: "将发明人提供的技术方案分解为特征清单。区分必要特征和附加特征。必要特征是解决技术问题不可或缺的，附加特征是可选的优化。"
  - order: 3
    name: "提取技术效果（Effect）"
    instruction: "每个技术特征对应一个技术效果。效果要有可验证性（测试数据、对比实验），而非主观评价。"
  - order: 4
    name: "九段式组织结构"
    instruction: "交底书正文按九段式组织：发明名称→技术领域→背景技术→发明内容（问题/方案/效果）→附图说明→具体实施方式→工业实用性→与最接近现有技术的区别→其他说明"
dos:
  - rule: "PFE 三元组要一一对应——每个特征解决什么问题、达到什么效果"
  - rule: "交底书包含至少一个完整的具体实施方式，含具体参数"
donts:
  - rule: "技术问题不能泛化为’成本高’’效率低’——必须是技术层面的具体问题"
  - rule: "效果不能是’效果好’’结构简单’——要有具体数据或客观标准"
