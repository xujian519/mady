id: "wp-embodiment-writing"
name: "说明书具体实施方式撰写——至少一个完整实施例"
category: "embodiment"
summary: "具体实施方式是说明书中最关键的部分——它决定了权利要求能否得到说明书的支持。核心要求：至少一个完整的具体实施例，包含可验证的具体参数。实施例的详细程度应使本领域技术人员能够实施。"
context: "适用于发明和实用新型专利说明书的具体实施方式部分。"
quality: 0.85
version: 1
steps:
  - order: 1
    name: "确定实施例的数量和覆盖范围"
    instruction: "至少1个完整实施例，覆盖独立权利要求的全部必要技术特征。对于较宽的上位概括，需要多个实施例支撑。一个实施例可以支撑一个合理范围的概括（审查指南P-CLM-002）。"
  - order: 2
    name: "参数具体化"
    instruction: "实施例中的所有参数必须具体（不能是范围）。包括但不限于：尺寸、温度、压力、时间、流量、功率、材料牌号等。"
    example: "本实施例中，采用裂解萘馏分100m³储罐，伴热夹套的加热介质为蒸汽，温度为85-95℃，内置加热棒功率为500W，氮气吹扫流量为0.5-5L/min。"
  - order: 3
    name: "效果数据"
    instruction: "实施例中应包含实施效果数据或对比数据——这是审查员判断’预料不到的技术效果’的依据。"
    example: "经测试，采用本实施例三重防堵机制的呼吸阀，在连续运行72小时后密封面无萘结晶现象，而传统方案在运行8小时后即出现明显结晶。"
dos:
  - rule: "实施例的参数必须具体（单一数值或窄范围），不能与权利要求一样宽"
  - rule: "效果数据要真实可验证——审查指南允许补交实验数据，但最好一次性给足"
donts:
  - rule: "实施例不写’本领域技术人员知晓’等模糊表述——每个参数都要明确"
  - rule: "不把多个可以拆分的实施例混在一起写"
