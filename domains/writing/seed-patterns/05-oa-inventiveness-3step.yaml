id: "wp-oa-inventiveness-3step"
name: "创造性三步法 OA 答复框架"
category: "oa_inventiveness"
summary: "答复创造性的核心框架：第一步确认最接近现有技术和区别特征；第二步重新确定实际解决的技术问题（可与申请文件不同）；第三步论证非显而易见性。核心是第三步的’结合启示’分析。"
context: "适用于答复审查意见中关于专利法第22条第3款（创造性）的驳回理由。"
quality: 0.95
version: 1
steps:
  - order: 1
    name: "确认最接近现有技术和区别特征"
    instruction: "首先复述审查员认定的最接近现有技术，然后逐一指出权利要求与之的区别特征。注意：区别特征必须是权利要求明确记载的技术特征。"
    example: "审查员认定对比文件1（CNXXXXXXA）作为最接近现有技术。权利要求1与对比文件1的区别在于：本申请的伴热夹套内部设有螺旋形加热介质通道，而对比文件1的加热管为直管布置。"
  - order: 2
    name: "重新确定实际解决的技术问题"
    instruction: "基于区别特征的技术效果确定实际解决的技术问题。这个技术问题可以和申请文件声称的不同——审查指南允许重新确定。关键：要客观、具体。"
    example: "基于上述区别特征，本申请实际解决的技术问题是如何在有限空间内提高伴热介质与阀体的热交换效率，确保密封面温度均匀。"
  - order: 3
    name: "论证非显而易见性"
    instruction: "从对比文件是否给出’结合启示’的角度论证。核心问题：现有技术整体上是否给出了将区别特征应用到最接近的现有技术以解决实际技术问题的启示。如果对比文件的目的、作用完全不同，则无启示。"
    example: "对比文件2虽然公开了螺旋形通道，但其目的是为了增加介质流路的长度以延长停留时间，而非提高热交换效率。本领域技术人员面对’提高热交换效率’这一技术问题时，没有动机将对比文件2的螺旋形通道引入对比文件1。"
dos:
  - rule: "每一个对比文件都必须给出具体的段落/附图标记引用"
  - rule: "区别特征必须是权利要求中明确记载的——不能从说明书中拿特征来比"
donts:
  - rule: "避免空的三步法架子——每步必须有实质论证，不能只有步骤标题"
  - rule: "不要只说’对比文件未公开’，要说明对比文件公开了什么、区别在哪里"
  - rule: "避免’本领域技术人员能够理解’等空泛套话"
