id: "wp-oa-novelty-separate"
name: "新颖性单独对比 OA 答复"
category: "oa_novelty"
summary: "答复新颖性驳回的核心要点：坚持单独对比原则——只能将一份对比文件与权利要求逐一比对，不得组合多篇对比文件。核心争辩路径：对比文件未公开全部技术特征→具备新颖性。"
context: "适用于答复审查意见中关于专利法第22条第2款（新颖性）的驳回理由。"
quality: 0.90
version: 1
steps:
  - order: 1
    name: "确认审查员的对比路径"
    instruction: "复述审查员引用的对比文件及其认定公开的内容。注意区分是’单独对比’还是’组合对比’——后者直接违反新颖性审查原则。"
    example: "审查员认为对比文件1公开了权利要求1的全部技术特征。经仔细比对，对比文件1并未公开权利要求1的如下技术特征：……"
  - order: 2
    name: "逐项比对技术特征"
    instruction: "将权利要求的每个技术特征与对比文件公开的内容逐一比对，列出对比表。对于未被公开的特征，明确指出对比文件中什么位置公开了哪些内容、缺少哪些内容。"
    example: "| 权利要求1的特征 | 对比文件1公开的内容 | 比对结果 |\n|——|——|——|\n| 伴热夹套 | 未公开 | ❌ 未公开 |\n| 内置加热棒 | 电热丝（位置不同） | ❌ 区别 |"
  - order: 3
    name: "新颖性结论"
    instruction: "存在至少一个未被对比文件公开的技术特征→具备新颖性。注意：惯用手段直接置换、上下位概念等特殊情况需要额外说明。"
    example: "权利要求1的技术方案与对比文件1相比，至少存在’伴热夹套’这一区别技术特征，该特征未被对比文件1公开，也不属于惯用手段的直接置换。因此，权利要求1具备专利法第22条第2款规定的新颖性。"
dos:
  - rule: "严格单独对比——不引入第二篇对比文件来否定新颖性"
  - rule: "对比表让审查员一目了然地看到差异点"
donts:
  - rule: "新颖性争辩中不使用多篇对比文件组合"
  - rule: "不要混淆新颖性和创造性——新颖性只看是否被单独一篇公开"
