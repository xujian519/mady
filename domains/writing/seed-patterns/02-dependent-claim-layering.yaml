id: "wp-claim-dependent-layering"
name: "从属权利要求分层策略——三层保护纵深"
category: "claim_drafting"
summary: "从属权利要求按三层结构布局：层1参数范围（核心Fallback）、层2控制细节（保护深度）、层3材料/场景（防御性边界）。每层从权逐步限定独权，形成递进保护网络。"
context: "适用于机械/化工/电学类实用新型和发明专利申请。"
quality: 0.90
version: 1
steps:
  - order: 1
    name: "层1——参数范围"
    instruction: "在独权的结构基础上，限定关键参数的具体数值或范围。这是最核心的Fallback position，当独权被挑战时优先退守至此。"
    example: "权利要求2：如权利要求1所述的重芳烃储罐，其特征在于，所述伴热夹套内部设有螺旋形加热介质通道，所述加热介质通道的螺距为30-45mm。"
  - order: 2
    name: "层2——控制细节"
    instruction: "在层1基础上进一步限定控制逻辑、传感器布置、联动关系等系统细节。增强保护深度，防止规避设计。"
    example: "权利要求5：如权利要求2所述的重芳烃储罐，其特征在于，所述温度控制器包括PID调节模块，根据所述温度传感器的反馈信号调节所述内置加热棒的功率。"
  - order: 3
    name: "层3——材料/场景"
    instruction: "限定材料选择、应用场景、可选配置等防御性边界。扩大保护范围的弹性空间。"
    example: "权利要求8：如权利要求1所述的重芳烃储罐，其特征在于，所述伴热夹套的加热介质为蒸汽或导热油。"
dos:
  - rule: "每层从权只限定一个新增维度，避免跨维度限定"
    example: "好：权2→参数，权3→材料，各自独立\n坏：权2→’加热温度为80-95℃，该温度为蒸汽温度’（同时限定温度和介质）"
  - rule: "层1的Fallback参数要预留合理宽度"
    example: "好：30-45mm（合理的经验范围）\n坏：42mm（单一数值，规避设计极易绕过）"
donts:
  - rule: "不跳级引用从属权利要求"
    example: "坏：权3引用权1（跳过权2）\n好：权3引用权2（逐级限定）"
  - rule: "从权不写入已经在前序中出现的特征"
