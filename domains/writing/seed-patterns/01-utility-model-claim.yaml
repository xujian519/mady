id: "wp-claim-utility-model"
name: "实用新型独立权利要求撰写——前序+特征两段式"
category: "claim_drafting"
summary: "实用新型独立权利要求采用前序+特征两段式结构，前序写最接近的现有技术共有特征，特征写改进特征。前序部分包含必要技术特征的最小集合。"
context: "适用于实用新型专利申请的独立权利要求撰写。对于结构改进型实用新型，保护主题应为整体装置而非单个部件。"
quality: 0.92
version: 1
steps:
  - order: 1
    name: "确定保护主题"
    instruction: "明确要求保护的整体产品/装置。即使改进点仅在于某个部件，保护主题仍为整体装置（如’一种重芳烃储罐’而非’一种呼吸阀’）。依据：审查指南——虽然只改进了照相机快门，但申请主题仍为相机。"
    example: "一种重芳烃储罐，包括罐体和设置于所述罐体顶部的呼吸阀"
  - order: 2
    name: "前序部分——最小必要特征"
    instruction: "前序部分写入与最接近现有技术共有的必要技术特征。判断标准：缺少该特征则不能实现发明目的。"
    example: "包括罐体和设置于所述罐体顶部的呼吸阀"
  - order: 3
    name: "特征部分——三选一标记"
    instruction: "使用’其特征在于’作为过渡语，写入改进特征。多个独立改进机制应全部入独权（除非独立起作用）。"
    example: "其特征在于，所述呼吸阀包括：阀体，设有进气口和出气口；伴热夹套，设置于所述阀体外壁……"
  - order: 4
    name: "使用开放式表达"
    instruction: "采用’包括’（开放式），不排除其他构件。实用新型一般不用’由……组成’（封闭式）。"
    example: "一种重芳烃储罐，包括……"
dos:
  - rule: "保护主题写整体装置，而非改进部件"
    example: "好：’一种重芳烃储罐’（整体）\n坏：’一种呼吸阀防结晶结构’（部件，保护范围过窄）"
  - rule: "前序部分写入与现有技术共有的必要技术特征"
    example: "好：’一种重芳烃储罐，包括罐体和设置于所述罐体顶部的呼吸阀’\n坏：’一种重芳烃储罐’（缺少必要的前序特征）"
  - rule: "多机制协同效果必须全部入独权"
    example: "三重防堵机制（伴热+加热棒+氮气吹扫）缺一不可→全部入独权"
donts:
  - rule: "避免’大约’’左右’’基本上’’适当调整’等模糊用语"
    example: "坏：’加热温度大约在80℃左右’\n好：’加热温度为80-95℃’"
  - rule: "独立权利要求不包含非必要特征"
    example: "坏：’呼吸阀包括……加热介质为蒸汽’（加热介质类型是从权内容）\n好：’呼吸阀包括……伴热夹套’（结构特征入独权，介质入从权）"
