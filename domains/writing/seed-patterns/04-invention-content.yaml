id: "wp-spec-invention-content"
name: "发明内容三要素——技术问题+技术方案+有益效果"
category: "spec_drafting"
sub_category: "invention_content"
summary: "发明内容部分必须包含三个要素：要解决的技术问题（基于现有技术的缺陷提炼）、技术方案（对应权利要求，但用自然语言描述）、有益效果（与技术方案一一对应，有数据支撑）。"
context: "适用于所有专利说明书的发明内容部分。"
quality: 0.85
version: 1
steps:
  - order: 1
    name: "要解决的技术问题"
    instruction: "直接从背景技术的缺陷提炼。每个缺陷对应一个技术子问题。注意：技术问题不等于’成本高’’效率低’——应该是技术层面的具体问题。"
    example: "本实用新型要解决的技术问题是：现有保护罩缺乏透气设计，在盐碱地高温+强光照环境下易导致幼苗烧苗。"
  - order: 2
    name: "技术方案"
    instruction: "与权利要求对应但用自然语言描述。对独立权利要求逐特征展开，对从属权利要求可省略或简要提及。格式：’为实现上述目的，本发明采用如下技术方案：……’"
    example: "为实现上述目的，本实用新型提供如下技术方案：一种盐碱地苜蓿幼苗保护罩，包括罩体和底座；所述罩体顶部设有透气调节装置……"
  - order: 3
    name: "有益效果"
    instruction: "与技术方案一一对应。每个效果都要能回溯到具体的结构/方法特征。最好有对比数据或定量分析。"
    example: "与现有技术相比，本发明的有益效果是：1. 通过设置透气调节装置，可使罩内温度较环境温度降低5-8℃，有效防止高温烧苗……"
dos:
  - rule: "技术问题必须是技术层面的，而非商业/管理层面的"
  - rule: "有益效果与技术方案一一对应，不编造不存在的好处"
donts:
  - rule: "技术方案不写入非必要特征——独立权利要求中没写的，这里也不写"
