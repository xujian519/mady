version: "2"
run:
  go: "1.25"
output:
  formats:
    text:
      path: stdout
linters:
  default: none
  enable:
    - errcheck
    - gocritic
    - gosec
    - govet
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - unconvert
    - unused
  settings:
    errcheck:
      # check-type-assertions/check-blank 过于严格（Go 惯用法 v,_:=x.(T) 和 _=fn() 会大量误报），关闭
      exclude-functions:
        - (net/http.ResponseWriter).Write
    gocritic:
      disabled-checks:
        - hugeParam
        - rangeValCopy
        - sprintfQuotedString  # tools/ 子模块大量 AppleScript 用 "%s"，%q 的 Go 转义不兼容
      enabled-tags:
        - diagnostic
        - performance
    govet:
      disable:
        - fieldalignment
        - shadow        # 实验性检查，Go 官方默认关闭，产生大量噪音
        - unusedwrite    # 测试代码中写入 mock 字段是正常的，大量误报
      enable-all: true
    misspell:
      locale: US
    revive:
      severity: warning
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-naming
        - name: error-strings
        - name: error-return
        - name: errorf
        - name: exported
          arguments:
            - disableStutteringCheck
        - name: increment-decrement
        - name: indent-error-flow
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unreachable-code
        - name: var-declaration
        - name: var-naming
    staticcheck:
      checks:
        - all
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - errcheck
          - gocritic
          - gosec
          - revive
        path: _test\.go
      - linters:
          - revive
          - gosec
        path: example/
      - linters:
          - revive
        path: cmd/
      # tools/ 子模块：browser_providers 包名带下划线是外部 API 约束
      - linters:
          - staticcheck
        path: tools/browser_providers/
        text: ST1003
      # 允许忽略确定性图构建、不可恢复的 I/O 写入和资源清理的错误
      - linters:
          - errcheck
        source: '\.(writeJSON|AddNode|AddEdge|AddConditionalEdge|WriteString|SetReadDeadline|SetWriteDeadline|WriteControl|SetLabel|Dispose|Register|Stop)\(|\.term\.Write\(|Process\.Kill\(|syscall\.(Flock|Kill)\(|^\s*fs\.Parse\(|json\.NewEncoder\([^)]*\)\.Encode\('
      # tools/ 子模块：浏览器自动化、进程管理中的不可恢复操作
      - linters:
          - errcheck
        path: tools/
        source: '(?:\.(?:Run|StartRecording|StopRecording|CloseSession|CloseTab|ReapOrphans|Signal|StopScreencast|Do|runABCommand|HandleDialog|SetDeadline|Wait|WalkDir)\(|fmt\.(?:Sscanf|Scanln)\(|os\.(?:WriteFile|MkdirAll)\(|session\.(?:recorder|cloudProvider|camofoxClient)\.|tempFile\.Write\(|conn\.Write\(|\b(?:osaKeyImpl|winKey|xdoKey)\()'
      # gosec G101: 中文文本被误报为硬编码凭据
      - linters:
          - gosec
        path: domains/rules/slop_engine\.go
        text: G101
      # gosec G115: 图形渲染/Unix 权限转换中整数截断是有意为之
      - linters:
          - gosec
        path: tui/|mcp/config_discovery_owner_unix\.go
        text: G115
      # gosec G118: 后台 goroutine 是正常的服务器模式
      - linters:
          - gosec
        path: cmd/mady/server\.go|memory/extension\.go
        text: G118
      # gosec G122: filepath.Walk 遍历文件系统是必要的
      - linters:
          - gosec
        path: knowledge/loader/wiki\.go
        text: G122
      # gosec G201/G202: 参数化 SQL 占位符使用了安全的拼接方式
      - linters:
          - gosec
        path: memory/sqlite_store\.go|knowledge/sqlite/store\.go
        text: G201|G202
      # gosec G204: MCP 客户端需要启动外部进程（NewStdioClient + tryReconnect）
      - linters:
          - gosec
        path: mcp/client\.go|mcp/client_reconnect\.go
        text: G204
      # gosec G404: 非密码学场景使用 math/rand 可接受
      - linters:
          - gosec
        path: memory/compiler/
        text: G404
      # gosec G602: range 循环保证索引安全，误报
      - linters:
          - gosec
        path: retrieval/domain/base\.go
        text: G602
      # gosec G703: 受控路径（命令行参数/配置文件），taint 分析误报
      - linters:
          - gosec
        path: cmd/mady/|mcp/config_discovery|mcp/config_trust\.go|tui/theme/global\.go
        text: G703
      # gosec G704: A2A 客户端需要连接远程 agent，非 SSRF
      - linters:
          - gosec
        path: a2a/server\.go
        text: G704
      # gosec G704: push.go 的 webhook URL 已通过 ssrfSafeDialer 在 connect 时
      # 校验解析 IP（消除 DNS rebinding TOCTOU），gosec taint 分析无法识别运行时防护
      - linters:
          - gosec
        path: a2a/push\.go
        text: G704
      # tools/ 子模块 gosec: 工具的核心功能就是执行命令/管理进程
      - linters:
          - gosec
        path: tools/
        text: G204|G702|G703
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
