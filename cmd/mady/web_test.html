<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mady Chat Test</title>
<style>
  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --text: #e0e0e0;
    --accent: #0f3460;
    --border: #333;
    --chat-bg: #0a0a1a;
    --user-msg: #1a3a5c;
    --ai-msg: #16213e;
    --domain-chat: #4caf50;
    --domain-assistant: #2196f3;
    --domain-patent: #ff9800;
    --domain-legal: #f44336;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }
  header { background: var(--surface); padding: 12px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 18px; }
  #domain-badge { padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: bold; background: #333; }
  #chat { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; background: var(--chat-bg); }
  .msg { padding: 10px 14px; border-radius: 8px; max-width: 85%; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
  .msg.user { align-self: flex-end; background: var(--user-msg); }
  .msg.ai { align-self: flex-start; background: var(--ai-msg); border: 1px solid var(--border); }
  .msg.system { align-self: center; font-size: 12px; color: #888; background: transparent; }
  .msg .meta { font-size: 10px; color: #888; margin-bottom: 4px; }
  #input-area { display: flex; gap: 8px; padding: 12px 20px; background: var(--surface); border-top: 1px solid var(--border); }
  #input { flex: 1; padding: 10px 14px; background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 6px; font-size: 14px; outline: none; }
  #input:focus { border-color: var(--accent); }
  #send { padding: 10px 20px; background: var(--accent); color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
  #send:hover { opacity: 0.9; }
  .typing { color: #888; font-style: italic; padding: 10px; }
  .badge-chat { background: var(--domain-chat); }
  .badge-assistant { background: var(--domain-assistant); }
  .badge-patent { background: var(--domain-patent); }
  .badge-legal { background: var(--domain-legal); }
</style>
</head>
<body>
<header>
  <h1>🧠 Mady Chat Test</h1>
  <span id="domain-badge">router</span>
  <span style="font-size:12px;color:#888">SSE streaming · multi-domain routing</span>
</header>
<div id="chat"></div>
<div id="input-area">
  <input id="input" type="text" placeholder="输入消息... (输入 '专利' / '法律' / '代码' 测试路由)" autofocus>
  <button id="send">发送</button>
</div>

<script>
const chat = document.getElementById('chat');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send');
const badge = document.getElementById('domain-badge');
const threadId = 'web-test-' + Date.now();

function addMsg(role, text, meta) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  if (meta) {
    const m = document.createElement('div');
    m.className = 'meta';
    m.textContent = meta;
    div.appendChild(m);
  }
  div.appendChild(document.createTextNode(text));
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function addSystem(text) {
  addMsg('system', text);
}

function updateBadge(domain) {
  badge.textContent = domain;
  badge.className = '';
  if (domain === 'chat') badge.className = 'badge-chat';
  else if (domain === 'assistant') badge.className = 'badge-assistant';
  else if (domain === 'patent') badge.className = 'badge-patent';
  else if (domain === 'legal') badge.className = 'badge-legal';
  else badge.className = '';
}

async function send() {
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';
  addMsg('user', msg);

  const typing = addMsg('ai', '...');
  typing.className = 'msg ai typing';

  try {
    const resp = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        thread_id: threadId,
        message: msg,
        stream: true,
      }),
    });

    if (!resp.ok) {
      typing.remove();
      addSystem('Error: ' + resp.status + ' ' + (await resp.text()));
      return;
    }

    // Read SSE stream
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let fullText = '';
    let firstChunk = true;
    typing.textContent = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        try {
          const data = JSON.parse(line.slice(6));
          if (data.type === 'content' || data.type === 'delta') {
            const delta = data.delta || data.content || '';
            fullText += delta;
            typing.textContent = fullText;
          } else if (data.type === 'handoff_start') {
            updateBadge(data.target_agent || data.TargetAgent || '');
            addSystem('→ Handoff to: ' + (data.target_agent || data.TargetAgent || '?'));
          } else if (data.type === 'done') {
            updateBadge(data.domain || '');
          }
        } catch (e) {
          // ignore parse errors
        }
      }
      chat.scrollTop = chat.scrollHeight;
    }

    if (!fullText) typing.textContent = '(空响应)';
    typing.className = 'msg ai';
  } catch (err) {
    typing.remove();
    addSystem('Fetch error: ' + err.message);
  }
}

sendBtn.addEventListener('click', send);
input.addEventListener('keydown', e => { if (e.key === 'Enter') send(); });

addSystem('Mady Web 测试页面就绪 · thread: ' + threadId);
addSystem('试试：你好 | 帮我写个排序算法 | 专利检索 | 法律咨询');
</script>
</body>
</html>
