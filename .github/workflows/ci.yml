name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  GO_VERSION: "1.25"

jobs:
  commitlint:
    # 仅在 PR 上运行：对 PR 内每个 commit 单独校验 Conventional Commits。
    # 直接 push 到 main 的提交通常是 squash-merge 的产物，不再逐条校验。
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    name: commitlint
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Run commitlint
        uses: wagoid/commitlint-github-action@v6
        with:
          configFile: commitlint.config.js

  lint:
    runs-on: ubuntu-latest
    name: lint
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: golangci-lint (root)
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          working-directory: .

      - name: golangci-lint (tools)
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          working-directory: tools

  eval:
    runs-on: ubuntu-latest
    name: eval-benchmark
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run Golden Benchmark
        run: go test -count=1 -v ./agentcore/evaluate/benchmark/ -run 'TestEvalSuite_'
        env:
          MADY_LIVE_EVAL: ""

      - name: Verify baseline report exists
        run: test -f docs/evaluation-baseline-v0.3.md && echo "Baseline OK"

  mod-tidy:
    runs-on: ubuntu-latest
    name: mod-tidy
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: go mod tidy (root)
        run: |
          go mod tidy -diff
          if [ $? -ne 0 ]; then
            echo "::error::go.mod is not tidy. Run 'go mod tidy' locally."
            exit 1
          fi

      - name: go mod tidy (tools)
        working-directory: tools
        run: |
          go mod tidy -diff
          if [ $? -ne 0 ]; then
            echo "::error::tools/go.mod is not tidy. Run 'go mod tidy' in tools/ locally."
            exit 1
          fi

  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        module:
          - path: "."
            name: root
          - path: "tools"
            name: tools
    name: test (${{ matrix.module.name }}, ${{ matrix.os }})
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: |
            go.sum
            tools/go.sum

      - name: go vet
        working-directory: ${{ matrix.module.path }}
        run: go vet ./...

      - name: go build
        working-directory: ${{ matrix.module.path }}
        run: go build ./...

      - name: go test
        working-directory: ${{ matrix.module.path }}
        run: go test -count=1 -coverprofile=coverage.out ./...

      - name: go test (race)
        working-directory: ${{ matrix.module.path }}
        run: go test -race -count=1 -short ./...

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.module.name == 'root'
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage.out
          flags: unittests
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  integration:
    runs-on: ubuntu-latest
    name: integration
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run integration e2e tests
        run: go test -tags integration -count=1 -timeout 10m ./integration/...
